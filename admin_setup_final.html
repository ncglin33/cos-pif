<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員權限設定</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f8f9fa; }
        .container { text-align: center; background: white; padding: 2rem 3rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        p { color: #666; }
        button { font-size: 1rem; padding: .6rem 1.2rem; border-radius: .375rem; cursor: pointer; border: 1px solid #ccc; font-weight: 500; transition: all .2s; background-color: #fff; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }
        #btn-login { background-color: #4285F4; color: white; border-color: #4285F4; }
        #btn-grant { background-color: #34A853; color: white; border-color: #34A853; display: none; margin-top: 1rem; }
        #status { margin-top: 1.5rem; font-weight: 500; }
    </style>
</head>
<body>

    <div class="container">
        <h1>一次性管理員設定工具</h1>
        <p id="instruction">請點擊下方按鈕登入，然後授予自己管理員權限。</p>
        <button id="btn-login">使用 Google 登入</button>
        <button id="btn-grant">授予我管理員權限</button>
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwlaU1as4KQQABJYCfudKCwUt38TbaNek",
            authDomain: "my-pif-64857823-900de.firebaseapp.com",
            projectId: "my-pif-64857823-900de",
            storageBucket: "my-pif-64857823-900de.appspot.com",
            messagingSenderId: "143235873399",
            appId: "1:143235873399:web:536efc772d9c29706c6472"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        const btnLogin = document.getElementById('btn-login');
        const btnGrant = document.getElementById('btn-grant');
        const statusDiv = document.getElementById('status');
        const instructionP = document.getElementById('instruction');

        btnLogin.addEventListener('click', () => {
            signInWithRedirect(auth, provider);
        });
        
        btnGrant.addEventListener('click', async () => {
             if (!currentUser) {
                statusDiv.textContent = '錯誤：未登入，請先登入。';
                statusDiv.style.color = '#dc3545';
                return;
            }

            btnGrant.disabled = true;
            statusDiv.textContent = '正在設定權限...';

            try {
                const userDocRef = doc(db, "users", currentUser.uid);
                await setDoc(userDocRef, {
                    email: currentUser.email,
                    role: 'admin',
                    status: 'approved',
                    createdAt: new Date()
                });

                statusDiv.innerHTML = '<b>成功！</b> 您現在是管理員了。<br>請點擊 <a href="/pifs.html">這裡</a> 進入主系統。';
                statusDiv.style.color = '#28a745';
                btnGrant.textContent = '設定完成';

            } catch (error) {
                console.error("權限設定失敗:", error);
                statusDiv.textContent = `權限設定失敗: ${error.message}`;
                statusDiv.style.color = '#dc3545';
                btnGrant.disabled = false;
            }
        });

        async function handleRedirect() {
            try {
                statusDiv.textContent = "正在驗證登入狀態...";
                const result = await getRedirectResult(auth);
                if (result && result.user) {
                    currentUser = result.user;
                    
                    statusDiv.innerHTML = `已登入: ${currentUser.email}<br>User ID: ${currentUser.uid}`;
                    statusDiv.style.color = '#333';
                    
                    instructionP.textContent = "登入成功！請點擊下方按鈕完成設定。";
                    btnLogin.style.display = 'none';
                    btnGrant.style.display = 'inline-block';
                } else {
                   statusDiv.textContent = "";
                }
            } catch (error) {
                console.error("處理重導向登入失敗:", error);
                statusDiv.textContent = `登入驗證失敗: ${error.message}`;
                statusDiv.style.color = '#dc3545';
            }
        }
        
        handleRedirect();

    </script>
</body>
</html>
