<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIF 授權書 Authorization for Product Information File</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="./pif01-3.css">

<style>
  body {
    background-color: #f0f2f5;
  }
  .app-wrap {
    max-width: 210mm;
    margin: 1.5rem auto 2rem;
    padding: 1.5rem 2rem 2rem;
    background-color: #ffffff;
    box-shadow: 0 0 6px rgba(0,0,0,0.08);
    min-height: 297mm;
    box-sizing: border-box;
  }

  .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
  }
  .page-header-main {
      flex: 1;
  }
  .page-main-title {
      margin-bottom: 0.25rem;
  }
  .page-en-subtitle {
      font-size: 1.1rem;
      color: #6c757d;
      margin-top: 0;
  }
  .page-header-meta {
      flex-shrink: 0;
      margin-left: 2rem;
      font-size: 0.9rem;
      color: #495057;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.4rem 0.5rem;
      align-items: baseline;
  }
  .meta-item-label {
      grid-column: 1;
      font-weight: 600;
      text-align: left;
  }
  .meta-item-value {
      grid-column: 2;
      min-width: 160px;
      text-align: left;
  }

  #upload-status {
      display: none;
      padding: 0.75rem 1.25rem;
      margin-top: 1rem;
      border-radius: 8px;
      font-weight: 500;
      text-align: center;
  }
  .status-info { background-color: #e0e7ff; color: #3730a3; }
  .status-success { background-color: #dcfce7; color: #166534; }
  .status-error { background-color: #fee2e2; color: #991b1b; }
  #upload-status i { margin-right: 0.5rem; }

  /* 授權書內文 */
  .authorization-container {
    margin-top: 2.5rem;
  }
  .authorization-card {
    max-width: 650px;
    margin: 0 auto;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    padding: 1.5rem 1.75rem;
    box-shadow: 0 4px 12px rgba(15,23,42,.04);
    font-size: 0.95rem;
    line-height: 1.7;
  }
  .authorization-card h2 {
    margin: 0 0 0.3rem;
    font-size: 1.3rem;
    text-align: center;
  }
  .authorization-card .en-subtitle {
    text-align: center;
    color: #6b7280;
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }
  .authorization-body p {
    margin: 0 0 0.6rem;
    text-align: justify;
  }
  .authorization-body ol {
    padding-left: 1.1rem;
    margin: 0 0 0.6rem;
  }
  .authorization-body li {
    margin-bottom: 0.4rem;
  }

  .auth-identity-grid {
    margin-top: 1.2rem;
    border-top: 1px dashed #e5e7eb;
    padding-top: 1rem;
    display: grid;
    grid-template-columns: 1fr;
    row-gap: 0.6rem;
  }
  .auth-field-row {
    display: grid;
    grid-template-columns: 120px 1fr;
    column-gap: 0.8rem;
    align-items: center;
  }
  .auth-field-label {
    color: #4b5563;
    white-space: nowrap;
  }
  .auth-field-value {
    min-height: 1.5rem;
  }
  .auth-input, .auth-textarea {
    width: 100%;
    font-size: 0.92rem;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    padding: 0.3rem 0.4rem;
    box-sizing: border-box;
  }
  .auth-input:focus, .auth-textarea:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 1px rgba(99,102,241,.2);
  }
  .auth-textarea {
    min-height: 60px;
    resize: vertical;
  }
  .auth-confirm-row {
    margin-top: 1rem;
    padding: 0.75rem 0.75rem;
    border-radius: 8px;
    background: #f9fafb;
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    font-size: 0.9rem;
  }
  .auth-confirm-row input[type="checkbox"] {
    margin-top: 0.15rem;
  }
  .auth-status {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: #6b7280;
  }
  .auth-status strong {
    color: #111827;
  }
@media print {
    body {
      background-color: #ffffff;
    }
    .app-wrap {
      max-width: none;
      min-height: 0;
      margin: 0;
      padding: 1rem;
      box-shadow: none;
    }
    .no-print, .toolbar, .status-bar, .page-header {
      display: none !important;
    }

    .authorization-card {
      box-shadow: none;
      border-color: #d1d5db;
    }
    .auth-input, .auth-textarea {
      border: none !important;
      padding: 0;
    }
  
    .auth-status, .auth-notes-row {
      display: none !important;
    }
}
</style>
</head>
<body>

<div id="app-container" style="display:none;">
  <div class="toolbar no-print">
    <a id="back-link" href="#" class="btn"><i class="fa-solid fa-arrow-left"></i> 返回 PIF 列表</a>
    <button id="btnSaveChanges" class="btn primary"><i class="fa-solid fa-file-signature"></i> 確認送出授權</button>
    <div class="right">
      <div id="user-info" style="display:inline-block;margin-right:1rem;font-size:.9rem;"></div>
      <button id="btnSignOut" class="btn danger">登出</button>
    </div>
  </div>

  <div class="app-wrap">
    <!-- 螢幕顯示用頁首 -->
    <header class="page-header">
      <div class="page-header-main">
        <h1 class="page-main-title"><i class="fa-solid fa-file-signature"></i> PIF 授權書</h1>
        <h2 class="page-en-subtitle">Authorization for Product Information File</h2>
      </div>
      <div id="page-header-meta-container" class="page-header-meta"></div>
    </header>

    <div class="status-bar no-print">
      <div>
        <span id="status-light" class="status-light"></span>
        <span id="status-text">正在初始化...</span>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <button id="btnUploadPdf" class="btn"><i class="fa-solid fa-file-arrow-up"></i> 上傳簽名授權書 PDF</button>
        <input type="file" id="pdfUploader" accept="application/pdf" style="display:none;">
        <button onclick="window.print()" class="btn"><i class="fa-solid fa-print"></i> 列印 / 匯出 PDF</button>
      </div>
    </div>
    <div id="upload-status" class="no-print"></div>

    <div id="authorization-container" class="authorization-container"></div>
  </div>
</div>

<div id="global-error" style="display:none;"></div>

<script type="module">
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { doc, getDoc, setDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { ref, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";
  import { auth, db, storage } from './firebase-config.js';

  const $ = sel => document.querySelector(sel);

  let pifDocRef;
  let pageContext = {};
  let hasUnsavedChanges = false;
  let authorizationLocked = false;
  let currentUser = null;
  let currentAuthData = {};
  let currentRootData = {};

  const status = {
    light: $("#status-light"),
    text: $("#status-text"),
    set(state, msg) {
      if (!this.light || !this.text) return;
      this.light.className = `status-light ${state}`;
      this.text.textContent = msg;
      if (state === 'syncing') {
        $('#btnSaveChanges').disabled = true;
      } else if (!authorizationLocked) {
        $('#btnSaveChanges').disabled = !hasUnsavedChanges;
      }
      if (state === 'synced' || state === 'error') {
        setTimeout(() => {
          if (hasUnsavedChanges) {
            this.set('syncing', '有未送出的變更');
          } else {
            this.set('ready', authorizationLocked ? '授權書已送出（唯讀）' : '就緒');
          }
        }, 3000);
      }
    },
    markUnsaved() {
      if (authorizationLocked) return;
      hasUnsavedChanges = true;
      this.set('syncing', '有未送出的變更');
      $('#btnSaveChanges').disabled = false;
    }
  };

  function startAuthFlow() {
    onAuthStateChanged(auth, user => {
      if (user) {
        currentUser = user;
        try {
          pageContext = setupPageContext();
          pifDocRef = doc(db, 'pifs', pageContext.pifId);
          setupUIForUser(user);
          initializeData();
          $('#app-container').style.display = 'block';
        } catch (e) {
          $('#global-error').textContent = `啟動錯誤：${e.message}。請確認網址是否正確。`;
          $('#global-error').style.display = 'block';
        }
      } else {
        window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
      }
      document.body.style.opacity = '1';
    });
  }

  function setupPageContext() {
    const urlParams = new URLSearchParams(window.location.search);
    const ctx = {
      pifId: urlParams.get('id'),
      companyName: urlParams.get('companyName'),
      productName: urlParams.get('productName')
    };
    if (!ctx.pifId) throw new Error('網址中缺少專案 ID');
    return ctx;
  }

  function setupUIForUser(user) {
    $('#user-info').textContent = user.email;
    $('#btnSignOut').addEventListener('click', () => signOut(auth));

    const params = new URLSearchParams({
      id: pageContext.pifId,
      companyName: pageContext.companyName || '',
      productName: pageContext.productName || ''
    });
    $('#back-link').href = `pif-i.html?${params.toString()}`;

    $('#btnSaveChanges').addEventListener('click', saveAuthorization);
    $('#btnSaveChanges').disabled = true;

    $('#btnUploadPdf').addEventListener('click', () => $('#pdfUploader').click());
    $('#pdfUploader').addEventListener('change', handlePdfUpload);

    window.addEventListener('beforeunload', e => {
      if (hasUnsavedChanges && !authorizationLocked) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  }

  async function initializeData() {
    status.set('syncing', '正在從雲端讀取授權資料...');
    try {
      const snap = await getDoc(pifDocRef);
      if (snap.exists()) {
        currentRootData = snap.data() || {};
        currentAuthData = currentRootData.authorization || {};
      } else {
        currentRootData = {};
        currentAuthData = {};
      }
      renderAuthorizationForm(currentAuthData, currentRootData);
      authorizationLocked = !!currentAuthData.submitted;
      hasUnsavedChanges = false;
      $('#btnSaveChanges').disabled = authorizationLocked;
      status.set('ready', authorizationLocked ? '授權書已送出（唯讀）' : '請確認內容後送出授權');
    } catch (err) {
      console.error('初始化授權資料失敗：', err);
      status.set('error', `讀取失敗：${err.message}`);
    }
  }

  function renderAuthorizationForm(authData, rootData) {
    const escape = str =>
      str ? String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])) : '';

    const companyName =
      authData.companyName || rootData.companyName || pageContext.companyName || '';
    const productName =
      authData.productName || rootData.productName || pageContext.productName || '';
    const authPerson = authData.authorizedPerson || '';
    const authTitle = authData.title || '';
    const authTel = authData.tel || '';
    const authDate =
      authData.date ||
      new Date().toISOString().slice(0, 10);
    const authNotes = authData.notes || '';
    const confirmed = !!authData.confirmed;
    const submittedAt = authData.submittedAt && authData.submittedAt.toDate
      ? authData.submittedAt.toDate()
      : null;

    // 螢幕頁首 meta
    const metaContainer = $('#page-header-meta-container');
    if (metaContainer) {
      metaContainer.innerHTML = `
        <span class="meta-item-label">廠商名稱:</span>
        <span class="meta-item-value">${escape(companyName)}</span>
        <span class="meta-item-label">產品名稱:</span>
        <span class="meta-item-value">${escape(productName)}</span>
        <span class="meta-item-label">PIF ID:</span>
        <span class="meta-item-value">${escape(pageContext.pifId)}</span>
      `;
    }
    const container = $('#authorization-container');
    container.innerHTML = `
      <div class="authorization-card">
        <h2>授權聲明書</h2>
        <div class="en-subtitle">Authorization Statement for Product Information File (PIF)</div>
        <div class="authorization-body">
          <p>本公司（以下稱「廠商」）茲就貴單位及 PIF 製作人員協助建立「產品資訊檔案 Product Information File（PIF）」一事，特此聲明並授權如下：</p>
          <ol>
            <li>本公司保證：提供予 PIF 製作人員及 CosPIF 系統之所有資料，包括但不限於產品配方、使用原料、檢驗報告、標示內容、宣稱文字及其他相關文件，均為真實、正確且盡可能完整。如日後經主管機關或其他單位認定有不實、遺漏或違反相關法令規定之情事，其法律責任概由本公司自行負擔。</li>
            <li>本產品之 PIF 內容係 <strong>完全依據本公司所提供之資料</strong> 進行彙整與編製，PIF 製作人員並無義務就資料之正確性及合法性另行查證或替本公司作任何保證。</li>
            <li>倘若因本公司所提供之原始資料錯誤、不實或不完整，而致主管機關稽查、裁罰、產品下架、民刑事爭議或其他損害時，本公司確認並同意：相關責任均由本公司自行承擔，與 PIF 製作人員及其協力單位無涉，並同意免除其所有民事與行政上之賠償及連帶責任。</li>
            <li>本授權僅限於本公司之產品資訊彙整與 PIF 製作及後續必要之修訂使用，並不構成對產品品質或功效之任何保證；產品實際安全性與符合法規之最終責任，仍由本公司負責。</li>
          </ol>
          <p>本公司已充分了解上述內容，並同意依本授權書所載條款辦理。</p>
        </div>

        <div class="auth-identity-grid">
          <div class="auth-field-row">
            <div class="auth-field-label">廠商名稱</div>
            <div class="auth-field-value">
              <input id="auth-company" class="auth-input" type="text" value="${escape(companyName)}">
            </div>
          </div>
          <div class="auth-field-row">
            <div class="auth-field-label">產品名稱</div>
            <div class="auth-field-value">
              <input id="auth-product" class="auth-input" type="text" value="${escape(productName)}">
            </div>
          </div>
          <div class="auth-field-row auth-pifid-row">
            <div class="auth-field-label">PIF ID</div>
            <div class="auth-field-value">
              <input id="auth-pifid" class="auth-input" type="text" value="${escape(pageContext.pifId || '')}" readonly>
            </div>
          </div>
          <div class="auth-field-row">
            <div class="auth-field-label">授權人 / 負責人</div>
            <div class="auth-field-value">
              <input id="auth-person" class="auth-input" type="text" value="${escape(authPerson)}">
            </div>
          </div>
          <div class="auth-field-row">
            <div class="auth-field-label">職稱</div>
            <div class="auth-field-value">
              <input id="auth-title" class="auth-input" type="text" value="${escape(authTitle)}">
            </div>
          </div>
          <div class="auth-field-row">
            <div class="auth-field-label">聯絡電話</div>
            <div class="auth-field-value">
              <input id="auth-tel" class="auth-input" type="text" value="${escape(authTel)}">
            </div>
          </div>
          <div class="auth-field-row">
            <div class="auth-field-label">授權日期</div>
            <div class="auth-field-value">
              <input id="auth-date" class="auth-input" type="date" value="${escape(authDate)}">
            </div>
          </div>
          <div class="auth-field-row auth-notes-row">
            <div class="auth-field-label">備註</div>
            <div class="auth-field-value">
              <textarea id="auth-notes" class="auth-textarea" placeholder="（選填）例如：此授權同時適用於同系列多個品項等。">${escape(authNotes)}</textarea>
            </div>
          </div>
        </div>

        <div class="auth-confirm-row">
          <input type="checkbox" id="auth-confirm" ${confirmed ? 'checked' : ''}>
          <label for="auth-confirm">
            本人/本公司已詳閱並同意本授權書全部內容，並確認上述填寫之公司及聯絡資料正確無誤。
          </label>
        </div>

        <div class="auth-status" id="auth-status-text">
          ${authData.submitted
            ? `<strong>狀態：</strong>授權書已於 ${submittedAt ? submittedAt.toLocaleString() : ''} 由 ${authData.submittedBy || ''} 送出，資料僅供閱覽，無法再修改。`
            : `<strong>狀態：</strong>尚未正式送出授權。請確認資料與內容無誤後，勾選上方同意方塊並點選「確認送出授權」。`}
        </div>
      </div>
    `;

    const readOnly = !!authData.submitted;
    authorizationLocked = readOnly;
    bindAuthInputs(readOnly);
  }

  function bindAuthInputs(readOnly) {
    const ids = ['auth-company','auth-product','auth-person','auth-title','auth-tel','auth-date','auth-notes'];
    const pifIdEl = $('#auth-pifid');
    if (pifIdEl) {
      pifIdEl.readOnly = true;
      pifIdEl.disabled = true;
    }
    ids.forEach(id => {
      const el = $('#' + id);
      if (!el) return;
      el.readOnly = readOnly;
      el.disabled = readOnly;
      if (!readOnly) {
        el.addEventListener('input', () => status.markUnsaved());
      }
    });
    const chk = $('#auth-confirm');
    if (chk) {
      chk.disabled = readOnly;
      if (!readOnly) {
        chk.addEventListener('change', () => status.markUnsaved());
      }
    }
    if (readOnly) {
      $('#btnSaveChanges').disabled = true;
    }
  }

  async function saveAuthorization() {
    if (authorizationLocked) return;

    const company = $('#auth-company')?.value.trim() || '';
    const product = $('#auth-product')?.value.trim() || '';
    const person = $('#auth-person')?.value.trim() || '';
    const title = $('#auth-title')?.value.trim() || '';
    const tel = $('#auth-tel')?.value.trim() || '';
    const date = $('#auth-date')?.value.trim() || '';
    const notes = $('#auth-notes')?.value.trim() || '';
    const confirmed = $('#auth-confirm')?.checked || false;

    if (!company || !person || !confirmed) {
      alert('請至少填寫「廠商名稱」、「授權人/負責人」，並勾選「已閱讀並同意」後再送出。');
      return;
    }

    if (!window.confirm('送出後授權書將鎖定為唯讀，無法再次修改。\n\n確定要送出嗎？')) {
      return;
    }

    status.set('syncing', '正在送出授權並寫入雲端...');
    try {
      const payload = {
        companyName: company,
        productName: product,
        authorizedPerson: person,
        title,
        tel,
        date,
        notes,
        confirmed: true,
        submitted: true,
        submittedAt: Timestamp.now(),
        submittedBy: currentUser ? currentUser.email : '',
      };

      await setDoc(pifDocRef, { authorization: payload }, { merge: true });

      hasUnsavedChanges = false;
      authorizationLocked = true;
      await initializeData(); // 重新 render 成唯讀
      status.set('synced', '授權書已成功送出並鎖定（唯讀）。');
    } catch (err) {
      console.error('儲存授權資料失敗：', err);
      status.set('error', `儲存失敗：${err.message}`);
    }
  }

  function handlePdfUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.type !== 'application/pdf') {
      alert('請選擇一個 PDF 檔案。');
      return;
    }
    uploadFile(file, `pifs/${pageContext.pifId}/auth.pdf`);
  }

  function uploadFile(file, storagePath) {
    const uploadTask = uploadBytesResumable(ref(storage, storagePath), file);
    const button = $('#btnUploadPdf');
    button.disabled = true;

    uploadTask.on(
      'state_changed',
      snapshot => {
        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
        setUploadStatus(
          `<i class="fa-solid fa-upload"></i> 正在上傳簽名授權書 PDF... ${Math.round(progress)}%`,
          'status-info'
        );
      },
      error => {
        console.error('Upload failed:', error);
        setUploadStatus(
          `<i class="fa-solid fa-triangle-exclamation"></i> 上傳失敗: ${error.code}`,
          'status-error'
        );
        button.disabled = false;
      },
      () => {
        setUploadStatus(
          '<i class="fa-solid fa-check-circle"></i> PDF 已成功上傳！',
          'status-success'
        );
        button.disabled = false;
        $('#pdfUploader').value = '';
        setTimeout(() => setUploadStatus('', 'none'), 5000);
      }
    );
  }

  function setUploadStatus(msg, styleClass) {
    const statusEl = $('#upload-status');
    if (!statusEl) return;
    if (!msg || styleClass === 'none') {
      statusEl.style.display = 'none';
    } else {
      statusEl.innerHTML = msg;
      statusEl.className = `no-print ${styleClass}`;
      statusEl.style.display = 'block';
    }
  }

  startAuthFlow();
</script>
</body>
</html>
