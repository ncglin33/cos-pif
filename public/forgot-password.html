<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 - CosPIF 智慧科技整合系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <nav>
                <a href="/" class="logo"><i class="fa-solid fa-shield-alt"></i> CosPIF</a>
                <ul class="nav-links">
                    <li><a href="index.html#features">核心功能</a></li>
                    <li><a href="index.html#">關於我們</a></li>
                    <li><a href="contact.html">聯絡我們</a></li>
                </ul>
                <a href="/login.html" class="btn-login">登入系統</a>
            </nav>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">重設您的密碼</h1>
            <p style="text-align: center; margin-top: -1.5rem; margin-bottom: 2rem; color: var(--muted-color);">請輸入您的電子郵件，我們將會寄送重設連結給您。</p>
            <form id="reset-form">
                <div class="form-group">
                    <label for="email">電子郵件</label>
                    <input type="email" id="email" class="form-control" required autocomplete="email">
                </div>
                <button type="submit" id="submit-btn" class="btn-submit" style="width: 100%;">傳送重設郵件</button>
            </form>
            <div id="status" style="margin-top: 1.5rem; text-align: center; padding: 10px; border-radius: 8px; display: none;"></div>
            <div class="auth-switch">
                <p>記得密碼了？ <a href="/login.html">返回登入</a></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 CosPIF 化妝品智慧科技. All Rights Reserved.</p>
        </div>
    </footer>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

        const form = document.getElementById('reset-form');
        const statusEl = document.getElementById('status');
        const submitBtn = document.getElementById('submit-btn');

        function showStatus(message, type = 'info') {
            statusEl.textContent = message;
            statusEl.style.display = 'block';
            if (type === 'error') {
                statusEl.style.backgroundColor = '#fee2e2';
                statusEl.style.color = '#991b1b';
            } else {
                statusEl.style.backgroundColor = '#e0f2fe';
                statusEl.style.color = '#0c4a6e';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = '傳送中...';
            showStatus('正在處理您的請求...', 'info');

            const email = document.getElementById('email').value;

            try {
                await sendPasswordResetEmail(auth, email);
                showStatus('密碼重設郵件已成功寄出！請檢查您的收件匣。您現在可以關閉此頁面。', 'info');
            } catch (error) {
                console.error("Password Reset Error:", error);
                let errorMessage = '傳送失敗。請確認您輸入的電子郵件是否正確。';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = '此電子郵件尚未註冊，請檢查或註冊新帳戶。';
                }
                showStatus(errorMessage, 'error');
            } finally {
                // Keep the button disabled on success to prevent re-sending
                if (statusEl.style.color !== 'rgb(12, 74, 110)') { // not info color
                    submitBtn.disabled = false;
                    submitBtn.textContent = '傳送重設郵件';
                }
            }
        });
    </script>
</body>
</html>
