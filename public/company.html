<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>申請新增廠商</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f9fafb;
        }
        .card-footer {
            text-align: right;
        }
        .btn-submit {
            background-color: var(--primary-color, #6d28d9);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: var(--border-radius, 0.5rem);
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }
        .btn-submit:hover {
            background-color: var(--primary-color-dark, #5b21b6);
        }
        .btn-submit:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }       
    </style>
</head>
<body>

    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><i class="fa-solid fa-shield-halved"></i> CosPIF</a>
                <ul id="nav-links" class="nav-links">
                    <li><a href="pif-i.html">我的專案</a></li>
                    <li><a href="company.html" class="active">申請新增廠商</a></li>
                </ul>
                <div class="nav-actions" style="display: flex; align-items: center;">
                    <span id="user-info" style="margin-right: 1.5rem; color: var(--text-muted);"></span>
                    <button id="btnSignOut" class="btn-login btn-danger">登出</button>
                </div>
            </nav>
        </div>
    </header>

    <div class="main-content">
        <div class="page-header">
            <div>
                <h1><i class="fa-solid fa-building-user"></i> 申請新增廠商</h1>
                <p class="text-muted">您可以在此提交新的廠商資料，送出後將由管理員審核，並加入中央廠商資料庫。</p>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h2 class="card-title">新廠商資料</h2></div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="newTaxId">統一編號 (必填)</label>
                        <input type="text" id="newTaxId" class="form-input" placeholder="8 位數字">
                    </div>
                    <div class="form-group">
                        <label for="newCompanyName">廠商名稱 (必填)</label>
                        <input type="text" id="newCompanyName" class="form-input" placeholder="請輸入完整公司名稱">
                    </div>
                    <div class="form-group">
                        <label for="newAddress">地址</label>
                        <input type="text" id="newAddress" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="newPhone">電話</label>
                        <input type="tel" id="newPhone" class="form-input">
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <button id="btnSubmit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> 送出審核</button>
            </div>
        </div>

        <div id="submission-status" class="card" style="margin-top: 2rem; display: none;">
             <div class="card-body" style="text-align: center;"></div>
        </div>
    </div>

<script type="module">
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { auth, db } from './firebase-config.js';

    const $ = sel => document.querySelector(sel);

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            $('#user-info').textContent = `歡迎, ${user.displayName || user.email}`;
            $('#btnSignOut').addEventListener('click', () => signOut(auth).then(() => { window.location.href = 'login.html'; }));

            try {
                const idTokenResult = await user.getIdTokenResult();
                const isAdmin = idTokenResult.claims.admin === true;
                setupNavLinks(isAdmin);
            } catch (error) {
                console.error("Error getting user token:", error);
                setupNavLinks(false); // Fallback to non-admin
            }

        } else {
            window.location.href = 'login.html';
        }
    });

    function setupNavLinks(isAdmin) {
        if (isAdmin) {
            const navLinks = document.getElementById('nav-links');
            const adminLinks = `
                <li><a href="companies.html">廠商資料庫</a></li>
                <li><a href="review.html">審核申請</a></li>
            `;
            navLinks.insertAdjacentHTML('beforeend', adminLinks);
        }
    }

    $('#btnSubmit').addEventListener('click', submitForReview);

    async function submitForReview() {
        if (!currentUser) {
            alert('請先登入後再提交。');
            return;
        }

        const taxId = $('#newTaxId').value.trim();
        const companyName = $('#newCompanyName').value.trim();

        if (!/^\d{8}$/.test(taxId)) {
            alert('「統一編號」格式錯誤，請輸入 8 位數字。');
            return;
        }
        if (!companyName) {
            alert('「廠商名稱」為必填欄位。');
            return;
        }

        const btn = $('#btnSubmit');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 提交中...';

        const statusDiv = $('#submission-status');
        const statusBody = statusDiv.querySelector('.card-body');

        try {
            const submissionRef = doc(db, "vendor_submissions", taxId);
            
            await setDoc(submissionRef, {
                taxId: taxId,
                companyName: companyName,
                address: $('#newAddress').value.trim(),
                phone: $('#newPhone').value.trim(),
                submittedBy: currentUser.uid,
                submittedAt: serverTimestamp(),
                status: 'pending' 
            });

            // Clear fields
            $('#newTaxId').value = '';
            $('#newCompanyName').value = '';
            $('#newAddress').value = '';
            $('#newPhone').value = '';
            
            statusBody.innerHTML = `<p style="color: var(--success-color); font-weight: 600; font-size: 1.2rem;">
                <i class="fa-solid fa-check-circle"></i> 提交成功！
            </p>
            <p>您的廠商資料（${taxId} - ${companyName}）已成功送出，請靜待管理員審核。</p>`;
            statusDiv.style.display = 'block';

        } catch (error) {
            console.error("Submission failed: ", error);
            statusBody.innerHTML = `<p style="color: var(--danger-color); font-weight: 500;">提交失敗: ${error.message}</p>`;
            statusDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> 送出審核';
        }
    }

</script>
</body>
</html>
