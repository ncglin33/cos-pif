<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIF 封面預覽與編輯</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="./style.css">
<style>
  :root {
    --pif-cover-text: #212529;
    --pif-cover-label: #495057;
    --pif-cover-border: #dee2e6;
  }
  body {
    font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background: #f5f5f5;
    margin: 0;
    color: #212529;
  }
  #app-container {
    max-width: 1024px;
    margin: 1.5rem auto;
    padding: 0 1rem 3rem;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .75rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .toolbar-left,
  .toolbar-right {
    display: flex;
    align-items: center;
    gap: .5rem;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    padding: .4rem .9rem;
    border-radius: 999px;
    border: 1px solid #ced4da;
    background: #fff;
    font-size: .9rem;
    cursor: pointer;
    color: #333;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn.primary {
    background: #4f46e5;
    border-color: #4f46e5;
    color: #fff;
  }
  .btn[disabled] {
    opacity: .5;
    cursor: default;
  }
  .btn i {
    font-size: .9em;
  }
  .status-bar {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-size: .8rem;
    color: #6c757d;
  }
  .status-light {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background-color: #ced4da;
  }
  .status-light.ready { background-color: #22c55e; }
  .status-light.syncing { background-color: #fbbf24; }
  .status-light.error { background-color: #ef4444; }
  .status-light.synced { background-color: #16a34a; }

  .status-badge {
    font-size: .8rem;
    padding: .15rem .55rem;
    border-radius: 999px;
    background: #e9ecef;
    color: #495057;
  }
  .status-badge.synced {
    background: #e6fffa;
    color: #0f766e;
  }
  .status-badge.syncing {
    background: #fff7ed;
    color: #c05621;
  }
  .status-badge.error {
    background: #fee2e2;
    color: #b91c1c;
  }

  .a4-page-container {
    background: #fff;
    margin: 0 auto;
    padding: 18mm 22mm 20mm;
    box-shadow: 0 0 0 1px rgba(0,0,0,.05),0 10px 35px rgba(15,23,42,.12);
    border-radius: 8px;
    min-height: calc(297mm * 0.9);
    display: flex;
    flex-direction: column;
  }
  .cover-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--pif-cover-border);
    padding-bottom: .75rem;
  }
  .logo-area {
    display: flex;
    align-items: center;
    gap: .75rem;
  }
  .logo-mark {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    background: radial-gradient(circle at 20% 20%, #f97316, #4f46e5);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-weight: 700;
    font-size: 1.1rem;
    box-shadow: 0 5px 12px rgba(79,70,229,.35);
  }
  .logo-text {
    display: flex;
    flex-direction: column;
  }
  .logo-text-main {
    font-weight: 600;
    letter-spacing: .04em;
    font-size: .9rem;
    text-transform: uppercase;
  }
  .logo-text-sub {
    font-size: .8rem;
    color: #868e96;
  }
  .pif-meta {
    text-align: right;
    font-size: .88rem;
  }
  .pif-meta-row {
    display: flex;
    justify-content: flex-end;
    gap: .5rem;
  }
  .pif-id-label {
    color: #868e96;
  }
  .pif-id-value {
    font-weight: 600;
    letter-spacing: .06em;
  }

  .cover-main {
    flex: 1;
    padding-top: 3.25rem;
  }
  .cover-main h1 {
    font-size: 2rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin: 0;
    color: #222;
  }
  .cover-main h1 span {
    font-weight: 300;
  }
  .cover-main h2 {
    font-size: 1.4rem;
    font-weight: 400;
    margin: .25rem 0 3.5rem;
    color: #444;
  }
  .cover-info-grid {
    display: grid;
    grid-template-columns: repeat(2,minmax(0,1fr));
    gap: 1.5rem 2.5rem;
  }
  .info-item {
    display: flex;
    flex-direction: column;
  }
  .info-item .label {
    font-size: .85rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--pif-cover-label);
    margin-bottom: .35rem;
  }
  .info-item .value {
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--pif-cover-text);
    min-height: 1.2em;
  }
  .cover-info-grid .value-input {
    width: 100%;
    border: none;
    background: transparent;
    padding: 4px 0;
    font-size: 1.05rem;
    font-weight: 500;
    color: var(--pif-cover-text);
    border-bottom: 1px dashed #999;
  }
  .cover-info-grid .value-input:focus {
    outline: none;
    border-bottom: 1px solid #6d28d9;
  }

  .cover-footer {
    padding-top: 2rem;
    margin-top: auto; /* 將頁尾推到底部 */
    font-size: 0.9rem;
  }
  .cover-footer .muted {
    background: transparent;
    color: var(--pif-cover-label);
    text-align: center;
    padding-top: 0.25rem;
    margin: 0;
    border-radius: 0;
  }
  .vendor-block-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--pif-cover-border);
  }
  .vendor-details {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.5rem 1rem;
  }
  .vendor-details .label {
    font-size: .8rem;
    color: #868e96;
  }
  .vendor-details .value {
    font-size: .9rem;
    color: #343a40;
  }

  #global-error {
    max-width: 900px;
    margin: 2rem auto;
    padding: 1rem 1.25rem;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #b91c1c;
    border-radius: 8px;
    font-size: .9rem;
  }

  .status-info { background-color: #eff6ff; color: #1d4ed8; }
  .status-success { background-color: #dcfce7; color: #166534; }
  .status-error { background-color: #fee2e2; color: #991b1b; }

  @media (max-width: 768px) {
    #app-container {
      padding: .5rem;
    }
    .a4-page-container {
      padding: 12mm 10mm;
      border-radius: 0;
      box-shadow: none;
    }
    .cover-info-grid {
      grid-template-columns: 1fr;
    }
    .vendor-details {
      grid-template-columns: 1fr;
    }
  }

  @media print {
    @page {
      size: A4;
      margin: 0;
    }
    body {
      background-color: #ffffff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .no-print, .toolbar, .status-bar, pif-nav {
      display: none !important;
    }
    #app-container {
      margin: 0;
      padding: 0;
      max-width: none;
    }
    .a4-page-container {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      border-radius: 0;
      box-shadow: none;
      padding: 15mm 18mm;
    }
    .cover-main {
       padding-top: 3.5rem;
    }
    .cover-info-grid .value-input {
      border-bottom: none;
      padding: 0;
    }
    .cover-footer {
      background: none; /* 移除任何可能的背景 */
      border-top: 1px solid var(--pif-cover-border); /* 保持頁尾分隔線 */
    }
    .cover-footer .muted {
      background: transparent;
      color: var(--pif-cover-label);
      text-align: center;
      padding-top: 0.25rem;
      margin: 0;
      border-radius: 0;
    }
  }
</style>
</head>
<body>
<pif-nav class="no-print"></pif-nav>

<div id="app-container">
  <div class="toolbar no-print">
    <div class="toolbar-left">
      <a id="back-link" href="#" class="btn">
        <i class="fa-solid fa-arrow-left"></i>
        返回 PIF 主頁
      </a>
    </div>
    <div class="toolbar-right">
      <button id="btnSaveChanges" class="btn primary" disabled>
        <i class="fa-solid fa-floppy-disk"></i>
        儲存變更
      </button>
      <button id="btnPrint" class="btn">
        <i class="fa-solid fa-print"></i>
        列印封面
      </button>
      <span id="syncStatus" class="status-badge">尚未載入</span>
      <span id="autosaveHint" class="status-hint"></span>
    </div>
  </div>

  <div id="global-error" style="display:none;"></div>

  <div class="a4-page-container" id="page">
    <header class="cover-header">
      <div class="logo-area">
        <div class="logo-mark">P</div>
        <div class="logo-text">
          <span class="logo-text-main">CosPIF</span>
          <span class="logo-text-sub">Cosmetic Product Information File</span>
        </div>
      </div>
      <div class="pif-meta">
        <div class="pif-meta-row">
          <span class="pif-id-label">PIF 編號</span>
          <span class="pif-id-value" id="cover-pif-id">—</span>
        </div>
      </div>
    </header>

    <main class="cover-main">
      <h1>COSMETIC <span>PRODUCT</span></h1>
      <h2>INFORMATION FILE</h2>

      <div class="cover-info-grid">
        <div class="info-item">
          <span class="label">產品名稱</span>
          <input type="text" id="cover-productName" class="value-input">
        </div>
        <div class="info-item">
          <span class="label">產品英文名稱</span>
          <input type="text" id="cover-productNameEn" class="value-input">
        </div>
        <div class="info-item">
          <span class="label">產品類別</span>
          <input type="text" id="cover-category" class="value-input">
        </div>
        <div class="info-item">
          <span class="label">產品劑型</span>
          <input type="text" id="cover-form" class="value-input">
        </div>
        <div class="info-item">
          <span class="label">PIF 製作人員</span>
          <input type="text" id="cover-pifMaker" class="value-input">
        </div>
        <div class="info-item">
          <span class="label">安全評估人員</span>
          <input type="text" id="cover-safetyAssessor" class="value-input">
        </div>
        <div class="info-item">
          <span class="label">PIF 版本</span>
          <input type="text" id="cover-pifVersion" class="value-input">
        </div>
        <div class="info-item">
          <span class="label">製作日期</span>
          <input type="text" id="cover-pifDate" class="value-input">
        </div>
      </div>
    </main>

    <footer class="cover-footer">
      <div id="responsible-vendor-container"></div>
    </footer>
  </div>
</div>

<script type="module">
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { auth, db } from "./firebase-config.js";
  import "./components.js";

  const $ = (id) => document.getElementById(id);
  let pifDocRef;
  let pageContext = {};
  let hasUnsavedChanges = false;

  const status = {
    light: null,
    text: null,
    set(state, msg) {
      const badge = $("syncStatus");
      badge.classList.remove("synced","syncing","error");
      if (state === "synced") badge.classList.add("synced");
      if (state === "syncing") badge.classList.add("syncing");
      if (state === "error") badge.classList.add("error");
      badge.textContent = msg;
    },
    markUnsaved() {
      if (hasUnsavedChanges) return;
      hasUnsavedChanges = true;
      this.set("syncing","有未儲存的變更");
      $("btnSaveChanges").disabled = false;
    }
  };

  function showGlobalError(message) {
    const el = $("global-error");
    el.textContent = message;
    el.style.display = "block";
    $("page").style.display = "none";
  }

  function setAutosaveHint(text, color="#6c757d") {
    const el = $("autosaveHint");
    el.textContent = text || "";
    el.style.color = color;
  }

  function setupPageContext() {
    const urlParams = new URLSearchParams(window.location.search);
    const context = { pifId: urlParams.get("id") };
    if (!context.pifId) throw new Error("網址中缺少專案 ID");
    context.productName = urlParams.get("productName") || "";
    context.companyName = urlParams.get("companyName") || "";
    context.productNameEn = urlParams.get("productNameEn") || "";
    return context;
  }

  function bindUIEvents() {
    $("btnPrint").addEventListener("click", () => window.print());

    $("btnSaveChanges").addEventListener("click", () => {
      saveData();
    });

    $("back-link").addEventListener("click",(e)=>{
      e.preventDefault();
      if (pageContext.companyName) {
        window.location.href =
          `pif01.html?id=${encodeURIComponent(pageContext.pifId)}&productName=${encodeURIComponent(pageContext.productName)}&companyName=${encodeURIComponent(pageContext.companyName)}&productNameEn=${encodeURIComponent(pageContext.productNameEn)}`;
      } else {
        window.location.href = "index.html";
      }
    });

    const editableIds = [
      "cover-productName","cover-productNameEn","cover-category","cover-form",
      "cover-pifMaker","cover-safetyAssessor","cover-pifVersion","cover-pifDate"
    ];
    editableIds.forEach(id=>{
      const el = $(id);
      if (!el) return;
      el.addEventListener("input", ()=>status.markUnsaved());
    });
  }

  function startAuthFlow() {
    onAuthStateChanged(auth, async (user)=>{
      if (!user) {
        window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
        return;
      }
      try {
        pageContext = setupPageContext();
        pifDocRef = doc(db, "pifs", pageContext.pifId);   // ★ 保持和 pif01 一樣的路徑
        bindUIEvents();
        await initializeData();
        $("app-container").style.opacity = "1";
      } catch (e) {
        console.error(e);
        showGlobalError(`啟動錯誤：${e.message}。請確認網址是否正確。`);
      }
    });
  }

  async function initializeData() {
    status.set("syncing","讀取中…");
    setAutosaveHint("");
    try {
      const docSnap = await getDoc(pifDocRef);
      if (docSnap.exists()) {
        renderCover(docSnap.data());
        status.set("synced","資料讀取成功");
        setAutosaveHint("已載入雲端資料");
      } else {
        status.set("error","找不到專案");
        showGlobalError(`錯誤：在資料庫中找不到 PIF ID 為 "${pageContext.pifId}" 的資料。`);
      }
    } catch (err) {
      console.error("Initialization failed:", err);
      status.set("error",`讀取失敗: ${err.message}`);
      showGlobalError("載入 PIF 資料時發生錯誤，請稍後再試。");
    }
  }

  function renderCover(pifData) {
    const pif01 = pifData.pif01 || {};
    const basic = pif01.basic || {};

    const fields = {
      "cover-pif-id": pifData.pifId,
      "cover-productName": pifData.productName,
      "cover-productNameEn": pifData.productNameEn,
      "cover-category": basic.category,
      "cover-form": basic.form,
      "cover-pifMaker": basic.pifMaker,
      "cover-safetyAssessor": basic.safetyAssessor,
      "cover-pifVersion": basic.pifVersion,
      "cover-pifDate": basic.pifDate || new Date().toISOString().split("T")[0]
    };

    for (const [id,value] of Object.entries(fields)) {
      const el = $(id);
      if (!el) continue;
      if (el.tagName === "INPUT") el.value = value || "";
      else el.textContent = value || "—";
    }

    // ★ 這裡調整：改用 companyName + 保留 name 相容性
    const maker = pif01.maker || {};
    const vendorContainer = $("responsible-vendor-container");
    if (maker && (maker.companyName || maker.name)) {
      const name = maker.companyName || maker.name;
      const createDetail = (label,value) =>
        value ? `<div class="label">${label}</div><div class="value">${value}</div>` : "";
      vendorContainer.innerHTML = `
        <h3 class="vendor-block-title">責任廠商資訊</h3>
        <div class="vendor-details">
          ${createDetail("名稱", name)}
          ${createDetail("地址", maker.addr)}
          ${createDetail("電話", maker.tel)}
          ${createDetail("統一編號", maker.tax)}
        </div>`;
    } else {
      vendorContainer.innerHTML = '<div class="muted">未提供責任廠商資訊。</div>';
    }
  }

  async function saveData() {
    status.set("syncing","正在儲存至雲端…");
    try {
      const dataToSave = {
        "pif01.basic.pifMaker": $("cover-pifMaker").value,
        "pif01.basic.safetyAssessor": $("cover-safetyAssessor").value,
        "pif01.basic.pifVersion": $("cover-pifVersion").value,
        "pif01.basic.pifDate": $("cover-pifDate").value,
        "productName": $("cover-productName").value,
        "productNameEn": $("cover-productNameEn").value,
        "pif01.basic.category": $("cover-category").value,
        "pif01.basic.form": $("cover-form").value
      };

      await setDoc(pifDocRef, dataToSave, { merge: true });

      status.set("synced","已同步");
      setAutosaveHint("變更已儲存到雲端","#16a34a");
      hasUnsavedChanges = false;
      $("btnSaveChanges").disabled = true;
    } catch (err) {
      console.error(err);
      status.set("error","儲存失敗");
      setAutosaveHint("儲存失敗，請稍後重試。","#b91c1c");
    }
  }

  startAuthFlow();
</script>
</body>
</html>
