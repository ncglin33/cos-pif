<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KB 後台｜名詞卡片編輯（kb_terms）</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    .container{ max-width: 1750px; }
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:.85rem 1rem; background:#fff;
      border:1px solid var(--line); border-radius:16px;
      margin:.9rem 0 1rem;
    }
    .topbar .left{ display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; }
    .topbar a{ text-decoration:none; color:var(--ink); font-weight:800; }
    .badge{
      display:inline-flex; align-items:center; gap:.35rem;
      border:1px solid var(--line); border-radius:999px;
      padding:.25rem .6rem; font-size:.82rem; background:#fff; color:var(--muted);
    }

    .layout{
      display:grid;
      grid-template-columns: 430px 1fr;
      gap: 1rem;
      align-items:start;
    }
    @media (max-width: 1100px){ .layout{ grid-template-columns: 1fr; } }

    .card{
      background:#fff; border:1px solid var(--line);
      border-radius:16px; box-shadow:0 1px 3px rgba(0,0,0,.05);
      padding: 1rem 1rem;
    }

    .row{ display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
    .grow{ flex: 1 1 auto; min-width: 180px; }

    .input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:.5rem .6rem;
      font-size:.95rem;
      outline:none;
      background:#fff;
    }
    textarea{ min-height: 110px; resize: vertical; }
    .input:focus, select:focus, textarea:focus{
      border-color:#bfdbfe; box-shadow:0 0 0 3px rgba(59,130,246,.15);
    }

    .btnx{
      border:1px solid var(--line);
      background:#fff;
      border-radius: 12px;
      padding:.48rem .7rem;
      cursor:pointer;
      font-weight:800;
      display:inline-flex; align-items:center; gap:.4rem;
    }
    .btnx:hover{ background:#eff6ff; border-color:#bfdbfe; color:#1d4ed8; }
    .btn-danger{ border-color:#fecaca; }
    .btn-danger:hover{ background:#fff1f2; border-color:#fca5a5; color:#b91c1c; }

    .muted{ color:var(--muted); }
    .small{ font-size:.86rem; }
    .kbd{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size:.85rem; }

    .hr{ border:none; border-top:1px solid #eef2f7; margin: .9rem 0; }
    .warn{
      padding:.6rem .7rem;
      border:1px solid #fde68a;
      background:#fffbeb;
      border-radius:12px;
      color:#92400e;
    }
    .ok{
      padding:.6rem .7rem;
      border:1px solid #bbf7d0;
      background:#f0fdf4;
      border-radius:12px;
      color:#166534;
    }
    .disabled{ opacity:.55; pointer-events:none; }

    /* left list */
    .list{ display:flex; flex-direction:column; gap:.45rem; margin-top:.6rem; }
    .item{
      border:1px solid var(--line);
      border-radius:12px;
      padding:.55rem .65rem;
      cursor:pointer;
      background:#fff;
    }
    .item:hover{ background:#eff6ff; border-color:#bfdbfe; }
    .item .t{ font-weight:900; }
    .item .m{ color:var(--muted); font-size:.85rem; margin-top:.15rem; line-height:1.35; }

    .twoCol{
      display:grid; grid-template-columns: 1fr 1fr; gap:.8rem;
    }
    @media (max-width: 980px){ .twoCol{ grid-template-columns: 1fr; } }

    /* preview */
    .preview{
      border:1px solid var(--line);
      border-radius:16px;
      padding:1rem 1rem;
      background:#fff;
      overflow:auto;
      max-height: 55vh;
    }
    .pv .title{ font-size: 1.35rem; font-weight: 900; margin:.2rem 0 .35rem; }
    .pv .meta{ color:var(--muted); font-size:.9rem; display:flex; gap:.35rem; flex-wrap:wrap; }
    .chip{
      display:inline-flex; align-items:center; gap:.35rem;
      border:1px solid #e7e7ef; border-radius:999px;
      padding:.28rem .55rem;
      background:#fafafe;
      font-size:.86rem;
      user-select:none;
    }
    .pv .sec{ margin-top:.85rem; }
    .pv .sec .h{ font-weight:900; margin-bottom:.25rem; }
    .pv .sec .b{ line-height:1.7; white-space:pre-wrap; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="left">
        <a href="index.html"><i class="fa-solid fa-house"></i> 首頁</a>
        <span class="badge" id="authBadge">未登入</span>
        <span class="badge" id="roleBadge">role: —</span>
      </div>
      <div class="row">
        <span class="muted small" id="userInfo"></span>
        <button class="btnx" id="btnSignOut"><i class="fa-solid fa-right-from-bracket"></i> 登出</button>
      </div>
    </div>

    <div class="layout">
      <!-- LEFT: term list -->
      <aside class="card">
        <h2 style="margin:.1rem 0 .35rem;">名詞卡片後台</h2>
        <div class="muted small">
          編輯 <code>kb_terms</code> 名詞卡片資料：供文章內 <span class="kbd">[[...]]</span> 點擊彈出卡片使用。
        </div>

        <div class="hr"></div>

        <div class="row">
          <input class="input grow" id="qTerms" placeholder="搜尋：docId / nameZh / nameEn / aliases / topic / category…" />
          <select id="statusFilter" style="width:160px;">
            <option value="all" selected>all</option>
            <option value="published">published</option>
            <option value="draft">draft</option>
            <option value="archived">archived</option>
          </select>
          <button class="btnx" id="btnReload" title="重新載入"><i class="fa-solid fa-rotate"></i></button>
        </div>

        <div class="row" style="margin-top:.55rem;">
          <input class="input grow" id="newTermId" placeholder="新名詞 termId（docId）例：t_iso_18861" />
          <button class="btnx" id="btnNewTerm"><i class="fa-solid fa-plus"></i> 新增</button>
        </div>

        <div class="list" id="termList"></div>
        <div id="msg" style="margin-top:.7rem;"></div>
      </aside>

      <!-- RIGHT: editor -->
      <main class="card" id="editorWrap">
        <div class="row" style="justify-content:space-between;">
          <h2 style="margin:.1rem 0;">名詞卡片編輯</h2>
          <div class="row">
            <button class="btnx" id="btnCopyMarkup" title="複製文章內引用語法"><i class="fa-solid fa-clipboard"></i> 複製引用</button>
            <button class="btnx" id="btnNormalize" title="把 nameEn 內誤放的 t_xxx 移到 aliases"><i class="fa-solid fa-wand-magic-sparkles"></i> 修正 t_</button>
            <button class="btnx" id="btnSave"><i class="fa-solid fa-floppy-disk"></i> 儲存</button>
            <button class="btnx btn-danger" id="btnDelete"><i class="fa-solid fa-trash"></i> 刪除</button>
          </div>
        </div>

        <div class="muted small" id="currentIdLine" style="margin-top:.3rem;">termId: —</div>

        <div class="hr"></div>

        <div class="twoCol">
          <div>
            <label class="muted small">termId（docId）</label>
            <input class="input" id="termId" placeholder="例如：t_iso_18861（建議用 t_ 前綴）" />
          </div>
          <div>
            <label class="muted small">status</label>
            <select id="status">
              <option value="draft">draft</option>
              <option value="published">published</option>
              <option value="archived">archived</option>
            </select>
          </div>
        </div>

        <div class="twoCol" style="margin-top:.65rem;">
          <div>
            <label class="muted small">topic（主題）</label>
            <input class="input" id="topic" placeholder="例如：防曬 / 美白 / GMP / 毒理…" />
          </div>
          <div>
            <label class="muted small">category（分類）</label>
            <input class="input" id="category" placeholder="例如：測試/標準 / 成分 / 法規 / 風險…" />
          </div>
        </div>

        <div class="twoCol" style="margin-top:.65rem;">
          <div>
            <label class="muted small">type（預設 term）</label>
            <input class="input" id="type" placeholder="term" />
          </div>
          <div>
            <label class="muted small">label（可選：顯示用名稱）</label>
            <input class="input" id="label" placeholder="可空（通常用 nameZh / nameEn）" />
          </div>
        </div>

        <div class="twoCol" style="margin-top:.65rem;">
          <div>
            <label class="muted small">nameEn（正常英文名稱；不要放 t_xxx）</label>
            <input class="input" id="nameEn" placeholder="例如：ISO 18861" />
          </div>
          <div>
            <label class="muted small">nameZh（中文名稱）</label>
            <input class="input" id="nameZh" placeholder="例如：ISO 18861" />
          </div>
        </div>

        <div style="margin-top:.65rem;">
          <label class="muted small">aliases（別名；一行一個或逗號分隔；可放 t_xxx）</label>
          <textarea id="aliases" placeholder="例如：&#10;t_iso_18861&#10;ISO18861&#10;PPD test standard"></textarea>
        </div>

        <div style="margin-top:.65rem;">
          <label class="muted small">keywords（關鍵字；一行一個或逗號分隔）</label>
          <textarea id="keywords" placeholder="例如：&#10;UVA-PF&#10;in vivo&#10;PPD"></textarea>
        </div>

        <div class="twoCol" style="margin-top:.65rem;">
          <div>
            <label class="muted small">definition（定義／說明）</label>
            <textarea id="definition" placeholder="簡要定義：用途、測試方法或概念…"></textarea>
          </div>
          <div>
            <label class="muted small">regulation（法規／限制／注意）</label>
            <textarea id="regulation" placeholder="例如：使用情境、標示門檻、互補標準…"></textarea>
          </div>
        </div>


        <div style="margin-top:.65rem;">
          <label class="muted small">refIds（參考文獻 refId；一行一個或逗號分隔）</label>
          <textarea id="refIds" placeholder="例如：&#10;r_iso_18416_2015&#10;r_bam_ch23&#10;r_ra03m001_004"></textarea>
        </div>

        <div style="margin-top:.65rem;">
          <label class="muted small">notes（補充；可空）</label>
          <textarea id="notes" placeholder="補充、延伸閱讀、注意事項…"></textarea>
        </div>

        <div class="twoCol" style="margin-top:.65rem;">
          <div>
            <div class="muted small">createdAt</div>
            <div class="mono" id="createdAt">—</div>
          </div>
          <div>
            <div class="muted small">updatedAt</div>
            <div class="mono" id="updatedAt">—</div>
          </div>
        </div>

        <div class="hr"></div>

        <div class="row" style="justify-content:space-between;">
          <h3 style="margin:.2rem 0;">即時預覽（名詞卡片）</h3>
          <span class="chip"><i class="fa-solid fa-link"></i> 引用：<span class="mono" id="markupPreview">[[t_xxx|label]]</span></span>
        </div>
        <div class="preview pv" id="preview"></div>
      </main>
    </div>
  </div>

  <script type="module">
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      collection, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { db, auth } from "./firebase-config.js";

    const $ = (s) => document.querySelector(s);

    const COL_TERMS = "kb_terms";

    let canEdit = false;
    let termsAll = [];
    let currentId = "";
    let currentData = null;

    // ---- utils
    function esc(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }
    function msg(html, kind="ok"){
      $("#msg").innerHTML = `<div class="${kind === "ok" ? "ok" : "warn"}">${html}</div>`;
      setTimeout(() => { if ($("#msg").innerHTML) $("#msg").innerHTML = ""; }, 3800);
    }
    function clone(obj){ return JSON.parse(JSON.stringify(obj || {})); }
    function normalizeId(s){ return String(s || "").trim(); }

    function fmtTs(ts){
      if (!ts) return "";
      try{
        if (typeof ts === "string") return ts;
        if (typeof ts?.toDate === "function") return ts.toDate().toISOString();
        if (typeof ts?.seconds === "number"){
          return new Date(ts.seconds * 1000).toISOString();
        }
      }catch{}
      return "";
    }

    function parseList(text){
      const s = String(text || "");
      const parts = s
        .split(/\n|,/g)
        .map(x => x.trim())
        .filter(Boolean);
      const seen = new Set();
      const out = [];
      for (const p of parts){
        const k = p.toLowerCase();
        if (seen.has(k)) continue;
        seen.add(k);
        out.push(p);
      }
      return out;
    }

    function listToText(arr){
      const a = Array.isArray(arr) ? arr : (arr ? [String(arr)] : []);
      return a.map(x => String(x||"").trim()).filter(Boolean).join("\n");
    }

    function computeMarkup(d){
      const id = (d.termId || currentId || "").trim();
      const label = (d.label || d.nameZh || d.nameEn || "").trim();
      if (!id) return "[[t_xxx|label]]";
      if (label) return `[[${id}|${label}]]`;
      return `[[${id}]]`;
    }

    function refreshMarkupPreview(){
      const d = getEditorData();
      $("#markupPreview").textContent = computeMarkup(d);
    }

    // ---- auth + role (supports claims.admin OR claims.roles.admin)
    async function evaluateRoles(user){
      canEdit = false;

      if (!user){
        $("#authBadge").textContent = "未登入";
        $("#roleBadge").textContent = "role: —";
        $("#userInfo").textContent = "";
        $("#editorWrap").classList.add("disabled");
        return;
      }

      $("#authBadge").textContent = "已登入";
      $("#userInfo").textContent = user.email || "";

      if (typeof window.__termForcedRefresh === "undefined") window.__termForcedRefresh = false;

      try{
        const token = await user.getIdTokenResult(!window.__termForcedRefresh);
        window.__termForcedRefresh = true;

        const claims = token?.claims || {};
        const rolesObj = (claims.roles && typeof claims.roles === "object") ? claims.roles : {};
        const roles = {
          admin: !!claims.admin,
          systemAdmin: !!claims.systemAdmin,
          secretary: !!claims.secretary,
          editor: !!claims.editor,
          reviewer: !!claims.reviewer,
          client: !!claims.client,
          ...rolesObj
        };

        const ok = !!(roles.admin || roles.systemAdmin || roles.editor || roles.secretary);
        canEdit = ok;

        const roleKeys = ["admin","systemAdmin","secretary","editor","reviewer","client"];
        const roleList = roleKeys.filter(k => !!roles[k]).join(", ");
        $("#roleBadge").textContent = `role: ${roleList || "（none）"}`;

        if (!ok){
          $("#editorWrap").classList.add("disabled");
          msg("你已登入，但缺少 admin/systemAdmin/editor/secretary 權限（已鎖定編輯）。", "warn");
        } else {
          $("#editorWrap").classList.remove("disabled");
        }
      }catch(e){
        console.error(e);
        $("#roleBadge").textContent = "role: （讀取失敗）";
        $("#editorWrap").classList.add("disabled");
        msg("無法讀取使用者權限（請確認自訂 claims 與 Firestore Rules）。", "warn");
      }
    }

    $("#btnSignOut").addEventListener("click", async () => {
      try{ await signOut(auth); }catch(e){ console.error(e); }
    });

    // ---- load list
    async function loadTerms(){
      $("#termList").innerHTML = `<div class="muted small">讀取名詞清單中…</div>`;
      try{
        const snaps = await getDocs(collection(db, COL_TERMS));
        termsAll = snaps.docs.map(d => ({ id: d.id, ...d.data() }));

        termsAll.sort((a,b) => {
          const ua = Number(a.updatedAt?.seconds || 0);
          const ub = Number(b.updatedAt?.seconds || 0);
          if (ua !== ub) return ub - ua;
          const ca = Number(a.createdAt?.seconds || 0);
          const cb = Number(b.createdAt?.seconds || 0);
          return cb - ca;
        });

        renderTermList();
      }catch(e){
        console.error(e);
        $("#termList").innerHTML = `<div class="warn">讀取失敗：${esc(e.message || e)}</div>`;
      }
    }

    function termText(t){
      const aliases = Array.isArray(t.aliases) ? t.aliases.join(" ") : (t.aliases || "");
      return `${t.id} ${t.termId||""} ${t.nameZh||""} ${t.nameEn||""} ${t.label||""} ${aliases} ${t.topic||""} ${t.category||""} ${t.status||""}`.toLowerCase();
    }

    function renderTermList(){
      const q = ($("#qTerms").value || "").trim().toLowerCase();
      const stf = ($("#statusFilter").value || "all").trim().toLowerCase();

      const filtered = termsAll.filter(t => {
        if (stf !== "all"){
          const st = String(t.status || "").toLowerCase();
          if (st !== stf) return false;
        }
        if (!q) return true;
        return termText(t).includes(q);
      });

      const box = $("#termList");
      box.innerHTML = "";
      if (!filtered.length){
        box.innerHTML = `<div class="muted small">沒有符合的名詞</div>`;
        return;
      }

      filtered.slice(0, 400).forEach(t => {
        const div = document.createElement("div");
        div.className = "item";
        const title = t.label || t.nameZh || t.nameEn || t.id;
        const meta = [
          t.topic ? `topic:${t.topic}` : "",
          t.category ? `cat:${t.category}` : "",
          t.status ? `status:${t.status}` : "",
          `id:${t.id}`
        ].filter(Boolean).join(" · ");

        div.innerHTML = `<div class="t">${esc(title)}</div><div class="m">${esc(meta)}</div>`;
        div.addEventListener("click", () => openTerm(t.id));
        box.appendChild(div);
      });

      if (filtered.length > 400){
        const more = document.createElement("div");
        more.className = "muted small";
        more.style.marginTop = ".5rem";
        more.textContent = `（顯示前 400 筆；請再縮小搜尋條件）`;
        box.appendChild(more);
      }
    }

    async function openTerm(id){
      const tid = normalizeId(id);
      if (!tid) return;

      try{
        const snap = await getDoc(doc(db, COL_TERMS, tid));
        if (!snap.exists()){
          msg(`找不到名詞：<span class="kbd">${esc(tid)}</span>`, "warn");
          return;
        }
        currentId = tid;
        currentData = { id: tid, ...snap.data() };
        $("#currentIdLine").textContent = `termId: ${currentId}`;
        setEditorData(currentData);
      }catch(e){
        console.error(e);
        msg(`讀取失敗：${esc(e.message || e)}`, "warn");
      }
    }

    function setEditorData(d){
      const x = clone(d || {});
      x.termId = x.termId || x.id || currentId || "";
      x.type = x.type || "term";
      x.status = x.status || "draft";
      x.refIds = Array.isArray(x.refIds) ? x.refIds : (x.refIds ? [String(x.refIds)] : []);

      $("#termId").value = x.termId || "";
      $("#status").value = x.status || "draft";
      $("#topic").value = x.topic || "";
      $("#category").value = x.category || "";
      $("#type").value = x.type || "term";
      $("#label").value = x.label || "";
      $("#nameEn").value = x.nameEn || "";
      $("#nameZh").value = x.nameZh || "";
      $("#aliases").value = listToText(x.aliases);
      $("#keywords").value = listToText(x.keywords);
      $("#refIds").value = listToText(x.refIds);
      $("#definition").value = x.definition || "";
      $("#regulation").value = x.regulation || "";
      $("#notes").value = x.notes || "";

      $("#createdAt").textContent = fmtTs(x.createdAt) || "—";
      $("#updatedAt").textContent = fmtTs(x.updatedAt) || "—";

      refreshPreview();
      refreshMarkupPreview();
    }

    function getEditorData(){
      const d = clone(currentData || {});
      d.termId = normalizeId($("#termId").value) || currentId || "";
      d.status = ($("#status").value || "draft").trim();
      d.topic = ($("#topic").value || "").trim();
      d.category = ($("#category").value || "").trim();
      d.type = ($("#type").value || "term").trim() || "term";
      d.label = ($("#label").value || "").trim();
      d.nameEn = ($("#nameEn").value || "").trim();
      d.nameZh = ($("#nameZh").value || "").trim();
      d.aliases = parseList($("#aliases").value);
      d.keywords = parseList($("#keywords").value);
      d.refIds = parseList($("#refIds").value);
      d.definition = ($("#definition").value || "").trim();
      d.regulation = ($("#regulation").value || "").trim();
      d.notes = ($("#notes").value || "").trim();
      return d;
    }

    function refreshPreview(){
      const d = getEditorData();
      const title = d.label || d.nameZh || d.nameEn || d.termId || currentId || "（未命名）";
      const meta = [
        d.type ? `type: ${d.type}` : "",
        d.topic ? `topic: ${d.topic}` : "",
        d.category ? `category: ${d.category}` : "",
        d.status ? `status: ${d.status}` : "",
        (d.termId || currentId) ? `id: ${(d.termId || currentId)}` : ""
      ].filter(Boolean);

      const aliases = (Array.isArray(d.aliases) && d.aliases.length) ? d.aliases : [];
      const keywords = (Array.isArray(d.keywords) && d.keywords.length) ? d.keywords : [];
      const refIds = (Array.isArray(d.refIds) && d.refIds.length) ? d.refIds : [];

      $("#preview").innerHTML = `
        <div class="title">${esc(title)}</div>
        <div class="meta">
          ${meta.map(x => `<span class="chip">${esc(x)}</span>`).join("")}
        </div>

        ${aliases.length ? `
          <div class="sec">
            <div class="h">aliases</div>
            <div class="b">${esc(aliases.join(" · "))}</div>
          </div>` : ""}

        ${keywords.length ? `
          <div class="sec">
            <div class="h">keywords</div>
            <div class="b">${esc(keywords.join(" · "))}</div>
          </div>` : ""}

        ${refIds.length ? `
          <div class="sec">
            <div class="h">references (refIds)</div>
            <div class="b">${esc(refIds.join(" · "))}</div>
          </div>` : ""}

        <div class="sec">
          <div class="h">definition</div>
          <div class="b">${esc(d.definition || "—")}</div>
        </div>

        <div class="sec">
          <div class="h">regulation</div>
          <div class="b">${esc(d.regulation || "—")}</div>
        </div>

        ${d.notes ? `
          <div class="sec">
            <div class="h">notes</div>
            <div class="b">${esc(d.notes)}</div>
          </div>` : ""}
      `;
    }

    // ---- actions
    async function newTerm(){
      if (!canEdit) return msg("你沒有編輯權限", "warn");

      const id = normalizeId($("#newTermId").value);
      if (!id) return msg("termId 不可為空", "warn");

      try{
        const ref = doc(db, COL_TERMS, id);
        const snap = await getDoc(ref);
        if (snap.exists()){
          msg(`已存在：<span class="kbd">${esc(id)}</span>（已開啟）`);
          await openTerm(id);
          return;
        }

        const data = {
          termId: id,
          type: "term",
          status: "draft",
          topic: "",
          category: "",
          label: "",
          nameEn: "",
          nameZh: "",
          aliases: [id],
          keywords: [],
          refIds: [],
          definition: "",
          regulation: "",
          notes: "",
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        };

        await setDoc(ref, data, { merge: true });
        currentId = id;
        currentData = { id, ...data };
        $("#currentIdLine").textContent = `termId: ${currentId}`;
        setEditorData(currentData);
        msg("已新增（draft）");
        $("#newTermId").value = "";
        await loadTerms();
        await openTerm(currentId);
      }catch(e){
        console.error(e);
        msg(`新增失敗：${esc(e.message || e)}`, "warn");
      }
    }

    async function saveTerm(){
      if (!canEdit) return msg("你沒有編輯權限", "warn");

      const d = getEditorData();
      const newId = normalizeId(d.termId || currentId);
      if (!newId) return msg("termId 不可為空", "warn");

      const renaming = (currentId && newId !== currentId);

      try{
        d.updatedAt = serverTimestamp();
        d.termId = newId;

        const aliases = Array.isArray(d.aliases) ? d.aliases : [];
        if (!aliases.some(x => String(x).trim().toLowerCase() === newId.toLowerCase())){
          aliases.unshift(newId);
        }
        d.aliases = aliases;

        if (!currentId){
          d.createdAt = serverTimestamp();
          await setDoc(doc(db, COL_TERMS, newId), d, { merge: true });
          currentId = newId;
        } else if (renaming){
          const oldId = currentId;
          d.createdAt = currentData?.createdAt || serverTimestamp();
          await setDoc(doc(db, COL_TERMS, newId), d, { merge: true });
          await deleteDoc(doc(db, COL_TERMS, oldId));
          currentId = newId;
        } else {
          await updateDoc(doc(db, COL_TERMS, currentId), d);
        }

        $("#currentIdLine").textContent = `termId: ${currentId}`;
        msg("已儲存");
        await loadTerms();
        await openTerm(currentId);
      }catch(e){
        console.error(e);
        msg(`儲存失敗：${esc(e.message || e)}`, "warn");
      }
    }

    async function deleteTerm(){
      if (!canEdit) return msg("你沒有編輯權限", "warn");
      if (!currentId) return msg("尚未選取名詞", "warn");
      if (!confirm(`確定刪除名詞：${currentId}？此動作不可復原。`)) return;

      try{
        await deleteDoc(doc(db, COL_TERMS, currentId));
        msg("已刪除");
        currentId = "";
        currentData = null;
        $("#currentIdLine").textContent = "termId: —";
        setEditorData({ termId:"", status:"draft", type:"term", topic:"", category:"", label:"", nameEn:"", nameZh:"", aliases:[], keywords:[], refIds:[], definition:"", regulation:"", notes:"" });
        await loadTerms();
      }catch(e){
        console.error(e);
        msg(`刪除失敗：${esc(e.message || e)}`, "warn");
      }
    }

    async function copyMarkup(){
      const d = getEditorData();
      const text = computeMarkup(d);
      try{
        await navigator.clipboard.writeText(text);
        msg(`已複製：<span class="kbd">${esc(text)}</span>`);
      }catch{
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        msg(`已複製：<span class="kbd">${esc(text)}</span>`);
      }
    }

    function normalizeT(){
      const d = getEditorData();
      let nameEn = (d.nameEn || "").trim();
      if (!nameEn) return msg("nameEn 目前是空的，無需修正。", "warn");

      const tokens = nameEn.split(/[\s,;|]+/g).filter(Boolean);
      const tTokens = tokens.filter(x => /^t_[a-z0-9_]+$/i.test(x));
      if (!tTokens.length){
        msg("nameEn 沒有發現 t_xxx。");
        return;
      }

      const aliasList = parseList($("#aliases").value);
      for (const t of tTokens){
        if (!aliasList.some(x => x.toLowerCase() === t.toLowerCase())) aliasList.unshift(t);
      }
      $("#aliases").value = listToText(aliasList);

      nameEn = tokens.filter(x => !/^t_[a-z0-9_]+$/i.test(x)).join(" ").trim();
      $("#nameEn").value = nameEn;

      refreshPreview();
      refreshMarkupPreview();
      msg(`已把 ${tTokens.length} 個 t_xxx 移到 aliases。`);
    }

    // bind UI
    $("#btnReload").addEventListener("click", loadTerms);
    $("#btnNewTerm").addEventListener("click", newTerm);
    $("#btnSave").addEventListener("click", saveTerm);
    $("#btnDelete").addEventListener("click", deleteTerm);
    $("#btnCopyMarkup").addEventListener("click", copyMarkup);
    $("#btnNormalize").addEventListener("click", normalizeT);

    $("#qTerms").addEventListener("input", renderTermList);
    $("#statusFilter").addEventListener("change", renderTermList);

    ["termId","status","topic","category","type","label","nameEn","nameZh","aliases","keywords","refIds","definition","regulation","notes"]
      .forEach(id => {
        const el = document.getElementById(id);
        el?.addEventListener("input", () => { refreshPreview(); refreshMarkupPreview(); });
        el?.addEventListener("change", () => { refreshPreview(); refreshMarkupPreview(); });
      });

    // ---- init
    onAuthStateChanged(auth, async (user) => {
      await evaluateRoles(user);

      const params = new URLSearchParams(location.search);
      const termId = normalizeId(params.get("termId") || params.get("id"));
      await loadTerms();

      if (termId){
        await openTerm(termId);
      } else {
        setEditorData({ termId:"", status:"draft", type:"term", topic:"", category:"", label:"", nameEn:"", nameZh:"", aliases:[], keywords:[], refIds:[], definition:"", regulation:"", notes:"" });
      }
    });

  </script>
</body>
</html>
