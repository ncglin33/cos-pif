<style>
:root{--bg:#fff;--ink:#111;--muted:#666;--line:#ddd;--brand:#2563eb;--ok:#16a34a;--warn:#b45309;--err:#dc2626;--accent:#4f46e5;}
*{box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC",Helvetica,Arial,sans-serif;
  color:var(--ink);
  background-color:#f9fafb;
  padding:0;
  line-height:1.5;
  opacity:0;
  transition:opacity .4s ease-in-out;
}
.app-wrap{max-width:1600px;margin:0 auto;padding:24px;}
header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:16px}
h1{font-size:1.5rem;margin:0}
.controls{display:flex;gap:1rem;align-items:center;}
.badge{font-size:.8rem;padding:2px 8px;border-radius:9999px;background:#eef2ff;color:#3730a3}
.toolbar{
  position:sticky;
  top:0;
  background:rgba(249,250,251,.9);
  backdrop-filter:blur(8px);
  z-index:10;
  border-bottom:1px solid var(--line);
  padding:8px 16px;
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
  align-items:center;
}
.btn{padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--ink);}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand);}
.btn.accent{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
button:disabled{opacity:.5;cursor:not-allowed;}
.meta{font-size:.85rem;color:var(--muted)}
.pif-id-display{font-size:.8rem;font-weight:500;padding:4px 10px;border-radius:8px;background:#eee;color:#555;font-family:monospace;}
.table-wrap{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:16px;background:#fff;box-shadow:0 1px 2px 0 rgb(0 0 0 / .05);}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
th{background:#f8fafc;text-align:left;font-size:.9rem;color:#374151}
tr:hover td{background:#fafafa}
input[type="number"],input[type="text"],textarea{
  width:100%;
  padding:8px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  font-family:inherit;
  font-size:14px;
  transition:all .2s;
}
input:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 2px rgba(37,99,235,.2);outline:none;}
textarea{resize:vertical}
.tfoot{background:#fcfcff}
.right{margin-left:auto;display:flex;align-items:center;gap:1rem;}
.status-bar{padding:12px 0;display:flex;align-items:center;justify-content:space-between;font-size:.9rem;color:var(--muted);}
.status-light{display:inline-block;width:10px;height:10px;border-radius:50%;background-color:#9ca3af;margin-right:8px;}
.status-light.syncing{background-color:#f59e0b;animation:pulse 1.5s infinite;}
.status-light.synced{background-color:#22c55e;}
.status-light.error{background-color:#ef4444;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#global-error{text-align:center;padding:2rem;color:red;}
.drag-handle{cursor:grab;color:#ccc;}
.dragging{background:#eef2ff;}
.print-pif-id{display:none;}
/* 列印用純文字區塊（對應 textarea） */
.print-text{display:none;white-space:pre-wrap;}
.print-total{display:none;text-align:right;margin-top:8px;font-weight:bold;}
/* PDF 上傳狀態列 */
#upload-status-pdf{
  display:none;
  padding:0.75rem 1.25rem;
  margin-top:1rem;
  border-radius:8px;
  font-weight:500;
  text-align:center;
}
.status-info{background-color:#e0e7ff;color:#3730a3;}
.status-success{background-color:#dcfce7;color:#166534;}
.status-error{background-color:#fee2e2;color:#991b1b;}
#upload-status-pdf i{margin-right:0.5rem;}

/* 導覽用／列印用 */
.print-only{display:none;}
.noprint{}

/* 列印專用頂端區（比照 PIF07 / PIF02） */
#print-header{
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:10px 12px;
  margin:0 0 12px 0;
  background:#fff;
}
.print-header-grid{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}
.ph-left{flex:1;min-width:0;}
.ph-right{text-align:right;min-width:220px;}
.ph-title{
  font-size:1.28rem;
  font-weight:800;
  letter-spacing:.3px;
  color:#111827;
  margin:0 0 4px 0;
  line-height:1.2;
}
.ph-sub{
  font-size:.98rem;
  color:#111827;
  line-height:1.35;
  margin:0;
  white-space:nowrap;
}
.ph-label{
  font-weight:700;
  color:#374151;
}

/* 頁面自己的產品資訊文字，為避免和 top-bar 重複，直接隱藏 */
#project-subtitle{
  display:none;
}

@media print{
  body{background-color:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .no-print{display:none!important;}
  .noprint,.noprint *{display:none!important;}
  .app-wrap{max-width:100%;padding:0;}
  header{border:0;flex-direction:column;align-items:flex-start;page-break-after:avoid;}
  .badge{display:none;}
  .print-pif-id{display:none!important;}
  .print-only{display:block!important;}

  .table-wrap{border:0;box-shadow:none;margin-top:1rem;page-break-before:auto;}
  table{table-layout:auto;}
  tr{page-break-inside:avoid;page-break-after:auto;}
  table,thead,tbody,th,td,tr{border-color:#aaa;}
  th{background:#eee!important;}
  td{word-break:break-word;}

  /* 列印時把 textarea 隱藏，改用 print-text 顯示內容 */
  textarea.cell-input{display:none!important;}
  .print-text{display:block;padding:0;margin:0;}

  /* 數值欄位 input 去框線 */
  input{
    border:none!important;
    box-shadow:none!important;
    background:transparent!important;
    resize:none;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }

  /* 項目編號欄位加寬避免斷行 */
  th:nth-child(2),
  td:nth-child(2){
    width:60px!important;

  /* 合計列只在頁面底部顯示一次 */
  tfoot{display:none;}
  .print-total{display:block;}
}

<body>

<script type="module">
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { doc, getDoc, setDoc, Timestamp, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { ref, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";
import { auth, db, storage } from "./firebase-config.js";
import "/components.js";

const $ = sel => document.querySelector(sel);
  const uuid = () => {
  try {
    return (globalThis.crypto && typeof crypto.randomUUID === "function")
      ? crypto.randomUUID()
      : `id_${Date.now()}_${Math.random().toString(16).slice(2)}`;
  } catch (e) {
    return `id_${Date.now()}_${Math.random().toString(16).slice(2)}`;
  }
};

let pifDocRef;
let ingredients = [];
let pageContext = {};
let hasUnsavedChanges = false;
let globalPropertiesCache = new Map();
const GLOBAL_DATA_COLLECTION = "rms";

const status = {
  light: $("#status-light"),
  text: $("#status-text"),
  set(state,msg){
    this.light.className = `status-light ${state}`;
    this.text.textContent = msg;
    if(state==="synced"||state==="error"||state==="ready"){
      setTimeout(()=>this.set("ready","就緒"),3000);
    }
  },
  markUnsaved(){
    this.set("syncing","有未儲存的變更");
    hasUnsavedChanges = true;
  }
};

async function startAuthFlow(){
  onAuthStateChanged(auth, async user=>{
    if(user){
      try{
        pageContext = setupPageContext();
        pifDocRef = doc(db,"pifs",pageContext.pifId);
        await loadGlobalPropertiesData();
        setupUIForUser(user);
        await initializeData();
        $("#app-container").style.display = "block";
        setupTopBarAndPrintHeader(user);
      }catch(e){
        $("#global-error").innerHTML = `<strong>啟動錯誤：</strong> ${e.message}。`;
      }
      document.body.style.opacity = "1";
    }else{
      window.location.href = "login.html";
    }
  });
}

function setupPageContext(){
  const urlParams = new URLSearchParams(window.location.search);
  const context = {
    pifId: urlParams.get("id"),
    companyName: decodeURIComponent(urlParams.get("companyName") || ""),
    productName: decodeURIComponent(urlParams.get("productName") || "")
  };
  if(!context.pifId) throw new Error("網址中缺少專案ID");
  return context;
}

function setupUIForUser(user){
  // 只在本頁顯示 PIFID，不再顯示使用者資訊（避免和 top-bar 重複）
  $("#pif-id-display").textContent = `PIF ID: ${pageContext.pifId}`;
  const printPif = $("#print-pif-id");
  if (printPif) {
    printPif.textContent = `PIF ID: ${pageContext.pifId}`;
  }

  const backLinkParams = new URLSearchParams({
    id: pageContext.pifId,
    companyName: pageContext.companyName,
    productName: pageContext.productName
  });
  $("#back-link").href = `pifs.html?${backLinkParams.toString()}`;

  // 頁面自己的產品資訊文字隱藏，避免和 top-bar 重複
  const subtitleEl = $("#project-subtitle");
  if (subtitleEl) subtitleEl.style.display = "none";

  $("#btnAdd").addEventListener("click",addIngredient);
  $("#btnSort").addEventListener("click",sortByPct);
  $("#btnExport").addEventListener("click",exportIngredients);
  $("#btnPrint").addEventListener("click",()=>window.print());
  $("#imp").addEventListener("change",e=>importIngredients(e.target.files));
  $("#btnSaveChanges").addEventListener("click",savePif03Data);

  // PDF 上傳事件
  $("#btnUploadPdf").addEventListener("click",()=>$("#pdfUploader").click());
  $("#pdfUploader").addEventListener("change",handlePdfUpload);

  window.addEventListener("beforeunload",e=>{
    if(hasUnsavedChanges){
      e.preventDefault();
      e.returnValue = "";
    }
  });
}

function setupTopBarAndPrintHeader(user){
  const { pifId, companyName, productName } = pageContext || {};

  const topBarEl = document.querySelector("top-bar");
  if (topBarEl && typeof customElements !== "undefined") {
    customElements.whenDefined("top-bar").then(() => {
      if (typeof topBarEl.setInfo === "function") {
        topBarEl.setInfo(
          pifId || "",
          companyName || "",
          productName || "",
          "PIF 03 全成分及含量"
        );
      }
      if (typeof topBarEl.setUser === "function") {
        topBarEl.setUser(user);
      }
    }).catch(() => {});
  }

  const titleEl = document.getElementById("printTitle");
  if (titleEl) {
    titleEl.textContent = "PIF03 全成分名稱及其各別含量";
  }
  const pifIdEl = document.getElementById("printPifId");
  if (pifIdEl) pifIdEl.textContent = pifId || "";

  const prodEl = document.getElementById("printProductName");
  if (prodEl) prodEl.textContent = productName || "";

  const compEl = document.getElementById("printCompanyName");
  if (compEl) compEl.textContent = companyName || "";
}

async function loadGlobalPropertiesData(){
  const querySnapshot = await getDocs(collection(db,GLOBAL_DATA_COLLECTION));
  querySnapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const keys = new Set();
    if(docSnap.id) keys.add(docSnap.id.trim().toLowerCase());
    if(data.inci) keys.add(data.inci.trim().toLowerCase());
    if(data.common_name) keys.add(data.common_name.trim().toLowerCase());
    if(data.inciName) keys.add(data.inciName.trim().toLowerCase());
    keys.forEach(key=>{ if(key) globalPropertiesCache.set(key,data); });
  });
}

async function initializeData(){
  try{
    status.set("syncing","正在從雲端讀取配方...");
    const docSnap = await getDoc(pifDocRef);
    let recipe = [];
    if(docSnap.exists() && docSnap.data().pif03 && docSnap.data().pif03.recipe){
      recipe = docSnap.data().pif03.recipe;
      status.set("synced","配方讀取成功，正在校正資料...");
    }else{
      status.set("ready","尚未建立配方，請新增成分");
    }

    ingredients = recipe.map(item=>{
      const correctedItem = {...item,id:uuid()};
      if(correctedItem.inci){
        const globalData = globalPropertiesCache.get(correctedItem.inci.trim().toLowerCase());
        if(globalData){
          if(globalData.cas) correctedItem.cas = globalData.cas;
          if(globalData.function && !correctedItem.func) correctedItem.func = globalData.function;
        }
      }
      return correctedItem;
    });

    if(recipe.length>0) status.set("ready","資料校正完成");
    render();
  }catch(err){
    console.error("Initialization failed: ",err);
    status.set("error",`讀取失敗: ${err.message}`);
  }
}

function createRowHtml(item,index){
  return `
    <td class="drag-handle no-print"><i class="fa-solid fa-grip-vertical"></i></td>
    <td>${index}</td>
    <td>
      <textarea class="cell-input" data-field="inci" rows="1" placeholder="例如：Aqua">${item.inci || ""}</textarea>
      <div class="print-text" data-field="inci"></div>
    </td>
    <td>
      <textarea class="cell-input" data-field="cas" rows="1" placeholder="例如：7732-18-5">${item.cas || ""}</textarea>
      <div class="print-text" data-field="cas"></div>
    </td>
    <td>
      <textarea class="cell-input" data-field="func" rows="1" placeholder="請依原料實際用途填寫">${item.func || ""}</textarea>
      <div class="print-text" data-field="func"></div>
    </td>
    <td>
      <input type="number" class="cell-input" data-field="pct" min="0" max="100" step="0.0001" value="${(parseFloat(item.pct) || 0).toFixed(4)}">
    </td>
    <td class="no-print"><button class="btn del"><i class="fa-solid fa-trash"></i> </button></td>
  `;
}

function syncPrintTextForRow(tr){
  tr.querySelectorAll("textarea.cell-input").forEach(ta=>{
    const field = ta.dataset.field;
    const printDiv = tr.querySelector(`.print-text[data-field="${field}"]`);
    if(printDiv) printDiv.textContent = ta.value || "";
  });
}

function render(){
  const tbody = $("#rows");
  tbody.innerHTML = "";
  ingredients.forEach((item,index)=>{
    const tr = document.createElement("tr");
    tr.dataset.id = item.id;
    tr.innerHTML = createRowHtml(item,index+1);
    tbody.appendChild(tr);
    syncPrintTextForRow(tr);
  });
  attachRowListeners();
  updateSum();
}

function attachRowListeners(){
  $("#rows").querySelectorAll("tr").forEach(tr=>{
    const id = tr.dataset.id;
    tr.querySelectorAll(".cell-input").forEach(input=>{
      input.addEventListener("input",e=>{
        const field = e.target.dataset.field;
        const value = e.target.value;
        const idx = ingredients.findIndex(item=>item.id===id);
        if(idx>-1){
          ingredients[idx][field] = value;

          if(field==="inci"){
            const globalData = globalPropertiesCache.get(value.trim().toLowerCase());
            const casValue = (globalData && globalData.cas) ? globalData.cas : "";
            const funcValue = (globalData && globalData.function) ? globalData.function : "";

            ingredients[idx].cas = casValue;
            const casInput = tr.querySelector('textarea[data-field="cas"]');
            if(casInput) casInput.value = casValue;

            if(funcValue && !ingredients[idx].func){
              ingredients[idx].func = funcValue;
              const funcInput = tr.querySelector('textarea[data-field="func"]');
              if(funcInput) funcInput.value = funcValue;
            }
          }

          syncPrintTextForRow(tr);
          updateSum();
          status.markUnsaved();
        }
      });
    });
    const delBtn = tr.querySelector(".del");
    if (delBtn) {
      delBtn.addEventListener("click",()=>deleteIngredient(id));
    }
  });
}

function addIngredient(){
  const newItem = {id:uuid(),inci:"",cas:"",func:"",pct:0};
  ingredients.push(newItem);
  render();
  status.markUnsaved();
}

function deleteIngredient(id){
  if(!confirm("確定要刪除此成分嗎？")) return;
  ingredients = ingredients.filter(item=>item.id!==id);
  render();
  status.markUnsaved();
}

async function savePif03Data(){
  status.set("syncing","正在儲存配方至雲端...");
  const recipeToSave = ingredients.map(({id,...rest})=>rest);
  try{
    await setDoc(pifDocRef,{pif03:{recipe:recipeToSave,lastModified:Timestamp.now()}},{merge:true});
    status.set("synced","配方已成功儲存！");
    hasUnsavedChanges = false;
  }catch(err){
    console.error("Failed to save PIF 03 data: ",err);
    status.set("error",`儲存失敗: ${err.message}`);
  }
}

function sortByPct(){
  ingredients.sort((a,b)=>(parseFloat(b.pct)||0)-(parseFloat(a.pct)||0));
  render();
  status.markUnsaved();
}

function updateSum(){
  const sum = ingredients.reduce((acc,item)=>acc+(parseFloat(item.pct)||0),0);
  const formatted = `${sum.toFixed(4)}%`;
  const sumCell = $("#sumCell");
  if(sumCell) sumCell.textContent = formatted;
  const sumPrint = $("#sumPrintValue");
  if(sumPrint) sumPrint.textContent = formatted;
}

function exportIngredients(){
  const data = ingredients.map(({id,...rest})=>rest);
  const json = JSON.stringify(data,null,2);
  const blob = new Blob([json],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${pageContext.pifId}_pif03_recipe.json`;
  a.click();
  URL.revokeObjectURL(url);
}

async function importIngredients(files){
  if(!files.length) return;
  const file = files[0];
  try{
    const text = await file.text();
    let data = JSON.parse(text);
    if(!Array.isArray(data)) throw new Error("JSON 檔案必須是一個陣列");

    const correctedData = data.map(item=>{
      if(item.inci){
        const globalData = globalPropertiesCache.get(item.inci.trim().toLowerCase());
        if(globalData){
          if(globalData.cas) item.cas = globalData.cas;
          if(globalData.function && !item.func) item.func = globalData.function;
        }
      }
      return item;
    });

    if(!confirm(`即將從檔案匯入 ${correctedData.length} 種成分，這將覆蓋目前的列表。確定嗎？`)) return;

    ingredients = correctedData.map(item=>({...item,id:uuid()}));
    render();
    status.markUnsaved();
  }catch(err){
    alert(`匯入失敗: ${err.message}`);
  }finally{
    $("#imp").value = "";
  }
}

/* ---- PDF 上傳相關 ---- */

function handlePdfUpload(event){
  const file = event.target.files[0];
  if(!file) return;
  if(file.type !== "application/pdf"){
    alert("請僅上傳 PDF 檔案。");
    return;
  }
  uploadMainPdf(file,`pifs/${pageContext.pifId}/03.pdf`);
}

function uploadMainPdf(file,storagePath){
  const uploadTask = uploadBytesResumable(ref(storage,storagePath),file);
  const button = $("#btnUploadPdf");
  button.disabled = true;

  uploadTask.on("state_changed",
    snapshot=>{
      const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
      setUploadStatusPdf(`<i class="fa-solid fa-upload"></i> 正在上傳 PDF... ${Math.round(progress)}%`,"status-info");
    },
    error=>{
      console.error("Main PDF Upload failed:",error);
      setUploadStatusPdf(`<i class="fa-solid fa-triangle-exclamation"></i> PDF 上傳失敗: ${error.code}`,"status-error");
      button.disabled = false;
    },
    ()=>{
      setUploadStatusPdf('<i class="fa-solid fa-check-circle"></i> PDF 已成功上傳！',"status-success");
      button.disabled = false;
      $("#pdfUploader").value = "";
      setTimeout(()=>setUploadStatusPdf("","none"),5000);
    }
  );
}

function setUploadStatusPdf(msg,styleClass){
  const statusEl = $("#upload-status-pdf");
  if(!msg || styleClass === "none"){
    statusEl.style.display = "none";
  }else{
    statusEl.innerHTML = msg;
    statusEl.className = `no-print ${styleClass}`;
    statusEl.style.display = "block";
  }
}
