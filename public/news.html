<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>後台管理 - 最新消息</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f9fafb; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .news-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border: 1px solid var(--line);
            border-radius: .5rem;
            margin-bottom: 1rem;
            background: #fff;
        }
        .news-item-content h4 { margin: 0 0 .25rem 0; }
        .news-item-meta { font-size: .85rem; color: var(--muted); }
        .news-item-actions .btn { margin-left: .5rem; }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 700px;
            border-radius: .75rem;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--line);
        }
        .modal-header h2 { margin: 0; }
        .close-button {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 批次匯入區塊樣式 */
        .import-card {
            margin-top: 2rem;
            background: #ffffff;
            border-radius: .75rem;
            border: 1px solid var(--line);
            padding: 1.25rem 1.5rem;
        }
        .import-card h3 {
            margin-top: 0;
            margin-bottom: .5rem;
            font-size: 1.2rem;
        }
        .import-card p {
            margin: 0 0 .5rem;
            font-size: .9rem;
            color: var(--muted);
        }
        .import-card textarea {
            width: 100%;
            min-height: 130px;
            resize: vertical;
            border-radius: .5rem;
            border: 1px solid var(--line);
            padding: .5rem .75rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: .85rem;
        }
        .import-actions {
            margin-top: .5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: .75rem;
            flex-wrap: wrap;
        }
        .import-actions .btn {
            margin-top: .25rem;
        }
        .import-status {
            font-size: .85rem;
            color: var(--muted);
        }
        .import-status strong {
            color: #2563eb;
        }

        .import-preview {
            margin-top: 1rem;
            max-height: 260px;
            overflow: auto;
            border-radius: .5rem;
            border: 1px solid var(--line);
            background: #f9fafb;
        }
        .import-preview table {
            width: 100%;
            border-collapse: collapse;
            font-size: .85rem;
        }
        .import-preview th,
        .import-preview td {
            padding: .4rem .5rem;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: top;
        }
        .import-preview th {
            background: #eef2ff;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        .badge-status {
            display: inline-block;
            padding: 0 .45rem;
            border-radius: 999px;
            font-size: .75rem;
            border: 1px solid #d1d5db;
        }
        .badge-status.published { background: #dcfce7; border-color: #86efac; }
        .badge-status.draft { background: #fee2e2; border-color: #fecaca; }
        .badge-status.pinned { background: #fff7ed; border-color: #fdba74; }
        .text-muted-small { font-size: .8rem; color: var(--muted); }
    </style>
</head>
<body>

    <header>
        <div class="wrap">
            <h1><a href="dashboard.html" style="color: inherit; text-decoration: none;">管理後台</a></h1>
            <div class="controls header-right">
                <div id="user-info" style="display: inline-block; margin-left: 1rem;"></div>
                <button id="btnSignOut" class="btn btn-danger">登出</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="controls">
            <h2><i class="fa-solid fa-newspaper"></i> 最新消息管理</h2>
            <button id="btn-new-post" class="btn primary"><i class="fa-solid fa-plus"></i> 新增消息</button>
        </div>

        <div id="news-list"></div>

        <!-- 批次匯入區塊 -->
        <div class="import-card">
            <h3><i class="fa-solid fa-file-import"></i> 批次匯入最新消息（CSV）</h3>
            <p>請在下方貼上 CSV 內容，第一列需包含欄位名稱：<code>title,category,content,status,createdAt</code>（createdAt 可留空）。</p>
            <textarea id="import-text" placeholder="範例：
title,category,content,status,createdAt
新增 QA 功能,系統公告,說明 CosPIF 新增 QA 批次匯入與首頁搜尋功能。,published,2025-12-01
PIF16 範本更新,功能優化,說明 PIF16 新增 NOAEL-ref 與物種差異修正係數欄位。,published,2025-11-20"></textarea>
            <div class="import-actions">
                <div>
                    <button id="btn-load-sample" class="btn"><i class="fa-solid fa-wand-magic-sparkles"></i> 載入範例</button>
                    <button id="btn-parse-import" class="btn primary"><i class="fa-solid fa-magnifying-glass"></i> 解析文字為預覽</button>
                </div>
                <div>
                    <button id="btn-commit-import" class="btn success" disabled><i class="fa-solid fa-database"></i> 將預覽資料批次寫入資料庫</button>
                </div>
                <div class="import-status" id="import-status">
                    尚未解析任何資料。
                </div>
            </div>

            <div class="import-preview" id="import-preview" style="display:none;">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>標題</th>
                            <th>分類</th>
                            <th>狀態</th>
                            <th>建立日期</th>
                            <th>內容前 40 字</th>
                        </tr>
                    </thead>
                    <tbody id="import-preview-body"></tbody>
                </table>
            </div>
            <p class="text-muted-small">提醒：匯入後資料會直接新增到 <code>news</code> 集合，不會覆蓋既有資料；如需修改請在上方列表中個別編輯。</p>
        </div>
    </div>

    <!-- The Modal -->
    <div id="post-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">新增消息</h2>
                <span class="close-button">&times;</span>
            </div>
            <div class="card-body">
                <input type="hidden" id="post-id">
                <div class="form-group">
                    <label for="post-title">標題</label>
                    <input type="text" id="post-title" class="form-input" placeholder="消息標題">
                </div>
                <div class="form-group">
                    <label for="post-category">分類</label>
                    <input type="text" id="post-category" class="form-input" placeholder="例如：系統公告、法規更新">
                </div>
                <div class="form-group">
                    <label for="post-content">內容</label>
                    <textarea id="post-content" class="form-input" rows="10" placeholder="請輸入消息內容..."></textarea>
                </div>
                 <div class="form-group">
                    <label for="post-status">狀態</label>
                    <select id="post-status" class="form-input">
                        <option value="draft">草稿</option>
                        <option value="published">已發布</option>
                    </select>
                </div>
                <div class="form-group">
                    <label style="display:flex; align-items:center; gap:.5rem; cursor:pointer;">
                        <input type="checkbox" id="post-pin" />
                        置頂到首頁
                    </label>
                    <div class="text-muted-small">勾選後，首頁「最新消息」會優先顯示此則（最多顯示 3 則）。</div>
                </div>
            </div>
            <div class="card-footer" style="text-align:right; border-top: 1px solid var(--line); padding-top: 1rem; margin-top: 1rem;">
                <button id="btn-save-post" class="btn primary"><i class="fa-solid fa-save"></i> 儲存</button>
            </div>
        </div>
    </div>

<script type="module">
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, serverTimestamp, query, orderBy, getDoc, deleteField } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { auth, db } from './firebase-config.js';

    const $ = sel => document.querySelector(sel);
    let currentUser = null;

    // Modal elements
    const modal = $("#post-modal");
    const btnNewPost = $("#btn-new-post");
    const btnSavePost = $("#btn-save-post");
    const closeButton = $(".close-button");

    // 匯入相關元素與狀態
    const importText = $("#import-text");
    const btnLoadSample = $("#btn-load-sample");
    const btnParseImport = $("#btn-parse-import");
    const btnCommitImport = $("#btn-commit-import");
    const importStatus = $("#import-status");
    const importPreview = $("#import-preview");
    const importPreviewBody = $("#import-preview-body");
    let parsedNewsItems = [];  // 暫存解析後的資料

    onAuthStateChanged(auth, user => {
        if (user) {
            currentUser = user;
            $('#user-info').textContent = user.email;
            $('#btnSignOut').addEventListener('click', () => signOut(auth).then(() => window.location.href = 'login.html'));
            loadNews();
        } else {
            window.location.href = 'login.html';
        }
    });

    function loadNews() {
        const newsCollection = collection(db, 'news');
        const q = query(newsCollection, orderBy('createdAt', 'desc'));

        onSnapshot(q, (snapshot) => {
            const newsList = $('#news-list');
            newsList.innerHTML = '';
            if (snapshot.empty) {
                newsList.innerHTML = '<p>目前沒有任何最新消息。</p>';
                return;
            }
            snapshot.forEach(docSnap => {
                const news = docSnap.data();
                const newsId = docSnap.id;
                const createdAt = news.createdAt?.toDate?.().toLocaleDateString?.() || 'N/A';
                
                const item = document.createElement('div');
                item.className = 'news-item';
                item.innerHTML = `
                    <div class="news-item-content">
                        <h4>${news.title || '(未命名消息)'}</h4>
                        <div class="news-item-meta">
                            <span>分類: ${news.category || '-'}</span> | 
                            <span>狀態: ${news.status === 'published' ? '已發布' : '草稿'}</span> | 
                            ${news.pinned ? '<span class="badge-status pinned">置頂</span> | ' : ''}
                            <span>建立於: ${createdAt}</span>
                        </div>
                    </div>
                    <div class="news-item-actions">
                        <button class="btn btn-edit" data-id="${newsId}"><i class="fa-solid fa-pen-to-square"></i> 編輯</button>
                        <button class="btn btn-danger btn-delete" data-id="${newsId}"><i class="fa-solid fa-trash"></i> 刪除</button>
                    </div>
                `;
                newsList.appendChild(item);
            });

            // Add event listeners for new buttons
            document.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', handleEdit));
            document.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', handleDelete));
        });
    }

    function openModal(data = {}) {
        $('#post-id').value = data.id || '';
        $('#post-title').value = data.title || '';
        $('#post-category').value = data.category || '';
        $('#post-content').value = data.content || '';
        $('#post-status').value = data.status || 'draft';
        $('#post-pin').checked = data.pinned === true;
        $('#modal-title').textContent = data.id ? '編輯消息' : '新增消息';
        modal.style.display = "block";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    async function handleSave() {
        const id = $('#post-id').value;
        const data = {
            title: $('#post-title').value.trim(),
            category: $('#post-category').value.trim(),
            content: $('#post-content').value.trim(),
            status: $('#post-status').value,
            updatedAt: serverTimestamp(),
        };


        const pin = $('#post-pin').checked;
        data.pinned = pin;
        if (pin) {
            data.pinnedAt = serverTimestamp();
        } else if (id) {
            data.pinnedAt = deleteField();
        }

        if (!data.title) {
            alert('標題為必填欄位。');
            return;
        }

        btnSavePost.disabled = true;
        btnSavePost.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';

        try {
            if (id) {
                await setDoc(doc(db, "news", id), data, { merge: true });
            } else {
                data.createdAt = serverTimestamp();
                await addDoc(collection(db, "news"), data);
            }
            closeModal();
        } catch (error) {
            console.error("Error saving post: ", error);
            alert('儲存失敗: ' + error.message);
        }

        btnSavePost.disabled = false;
        btnSavePost.innerHTML = '<i class="fa-solid fa-save"></i> 儲存';
    }

    function handleEdit(e) {
        const id = e.currentTarget.dataset.id;
        const newsRef = doc(db, 'news', id);
        
        getDoc(newsRef).then(docSnap => {
            if (docSnap.exists()) {
                openModal({ id, ...docSnap.data() });
            }
        }).catch(err => {
            console.error('讀取消息內容失敗', err);
            alert('讀取消息內容失敗：' + err.message);
        });
    }

    async function handleDelete(e) {
        const id = e.currentTarget.dataset.id;
        if (confirm('確定要刪除這則消息嗎？此操作無法復原。')) {
            try {
                await deleteDoc(doc(db, "news", id));
            } catch (error) {
                console.error("Error deleting post: ", error);
                alert('刪除失敗: ' + error.message);
            }
        }
    }
    
    // Modal event listeners
    btnNewPost.addEventListener('click', () => openModal());
    btnSavePost.addEventListener('click', handleSave);
    closeButton.addEventListener('click', closeModal);
    window.addEventListener('click', (event) => {
        if (event.target == modal) {
            closeModal();
        }
    });

    // --------- 批次匯入相關邏輯 ---------

    // 載入範例 CSV
    btnLoadSample.addEventListener('click', () => {
        importText.value = `title,category,content,status,createdAt
新增 QA 功能,系統公告,說明 CosPIF 新增 QA 批次匯入與首頁搜尋功能。,published,2025-12-01
PIF16 範本更新,功能優化,說明 PIF16 新增 NOAEL-ref 與物種差異修正係數欄位。,published,2025-11-20
教學實作導入,教學應用,CosPIF 納入課程實作：讓學生實作 PIF 建置、原料毒理查詢與安全評估。 ,draft,`;
        importStatus.textContent = '已載入範例內容，請按「解析文字為預覽」。';
    });

    // 解析 CSV 文字成為預覽資料
    btnParseImport.addEventListener('click', () => {
        const raw = (importText.value || '').trim();
        parsedNewsItems = [];
        importPreviewBody.innerHTML = '';
        importPreview.style.display = 'none';
        btnCommitImport.disabled = true;

        if (!raw) {
            importStatus.textContent = '沒有可解析的內容，請先貼上 CSV 再試一次。';
            return;
        }

        const lines = raw.split(/\r?\n/).filter(l => l.trim() !== '');
        if (lines.length < 2) {
            importStatus.textContent = '資料行數不足，至少需要標題列 + 1 筆資料。';
            return;
        }

        // 解析欄位名稱
        const header = lines[0].split(',').map(h => h.trim());
        const idxTitle = header.indexOf('title');
        const idxCategory = header.indexOf('category');
        const idxContent = header.indexOf('content');
        const idxStatus = header.indexOf('status');
        const idxCreatedAt = header.indexOf('createdAt');

        if (idxTitle === -1 || idxCategory === -1 || idxContent === -1) {
            importStatus.innerHTML = '欄位錯誤：第一列必須至少包含 <code>title, category, content</code> 欄位。';
            return;
        }

        const rows = lines.slice(1);
        let rowNumber = 0;

        for (const line of rows) {
            rowNumber++;
            if (!line.trim()) continue;

            // 簡易 CSV 切割（沒有處理引號包住的逗號；如需更複雜格式可以之後再升級）
            const cols = line.split(',').map(c => c.trim());

            const title = cols[idxTitle] || '';
            const category = idxCategory >= 0 ? (cols[idxCategory] || '') : '';
            const content = idxContent >= 0 ? (cols[idxContent] || '') : '';
            const status = idxStatus >= 0 ? (cols[idxStatus] || 'draft') : 'draft';
            const createdAtRaw = idxCreatedAt >= 0 ? (cols[idxCreatedAt] || '') : '';

            if (!title && !content) {
                // 忽略完全空白的列
                continue;
            }

            let createdAtDate = null;
            if (createdAtRaw) {
                // 嘗試用 YYYY-MM-DD 解析
                const d = new Date(createdAtRaw);
                if (!isNaN(d.getTime())) {
                    createdAtDate = d;
                }
            }

            parsedNewsItems.push({
                _row: rowNumber,
                title,
                category,
                content,
                status: status === 'published' ? 'published' : 'draft',
                createdAt: createdAtDate,   // 保留 Date 物件或 null
            });
        }

        if (!parsedNewsItems.length) {
            importStatus.textContent = '解析完成，但沒有有效資料列。請確認內容是否正確。';
            return;
        }

        // 填入預覽表格
        parsedNewsItems.forEach((item, idx) => {
            const tr = document.createElement('tr');
            const previewContent = (item.content || '').slice(0, 40).replace(/\s+/g, ' ');
            const dateText = item.createdAt
                ? item.createdAt.toISOString().slice(0, 10)
                : '(匯入時以現在時間)';

            tr.innerHTML = `
                <td>${idx + 1}</td>
                <td>${item.title || '&nbsp;'}</td>
                <td>${item.category || '&nbsp;'}</td>
                <td><span class="badge-status ${item.status === 'published' ? 'published' : 'draft'}">${item.status === 'published' ? '已發布' : '草稿'}</span></td>
                <td>${dateText}</td>
                <td>${previewContent}</td>
            `;
            importPreviewBody.appendChild(tr);
        });

        importPreview.style.display = 'block';
        btnCommitImport.disabled = false;
        importStatus.innerHTML = `解析完成，預計匯入 <strong>${parsedNewsItems.length}</strong> 筆資料。請確認預覽後按下「將預覽資料批次寫入資料庫」。`;
    });

    // 將預覽資料實際寫入 Firestore
    btnCommitImport.addEventListener('click', async () => {
        if (!parsedNewsItems.length) {
            importStatus.textContent = '目前沒有可匯入的資料，請先解析 CSV。';
            return;
        }

        if (!confirm(`確定要將 ${parsedNewsItems.length} 筆最新消息寫入資料庫嗎？`)) {
            return;
        }

        btnCommitImport.disabled = true;
        btnCommitImport.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 匯入中...';

        let successCount = 0;
        let failCount = 0;

        for (const item of parsedNewsItems) {
            const data = {
                title: item.title || '',
                category: item.category || '',
                content: item.content || '',
                status: item.status || 'draft',
                updatedAt: serverTimestamp(),
            };

            if (item.createdAt) {
                // 若 CSV 有提供可解析的日期，就另外塞一個固定值；否則在後面用 serverTimestamp
                data.createdAt = item.createdAt;
            } else {
                data.createdAt = serverTimestamp();
            }

            try {
                await addDoc(collection(db, "news"), data);
                successCount++;
            } catch (err) {
                console.error('匯入某筆消息失敗：', err);
                failCount++;
            }
        }

        btnCommitImport.disabled = false;
        btnCommitImport.innerHTML = '<i class="fa-solid fa-database"></i> 將預覽資料批次寫入資料庫';

        importStatus.innerHTML = `匯入完成：成功 <strong>${successCount}</strong> 筆，失敗 <strong>${failCount}</strong> 筆。`;
    });
</script>
</body>
</html>
