<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIF 製作人員免責聲明書 PIF Author Disclaimer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="./pif01-3.css">

<style>
  body {
    background-color: #f0f2f5;
  }
  .app-wrap {
    max-width: 210mm;
    margin: 1.5rem auto 2rem;
    padding: 1.5rem 2rem 2rem;
    background-color: #ffffff;
    box-shadow: 0 0 6px rgba(0,0,0,0.08);
    min-height: 297mm;
    box-sizing: border-box;
  }

  .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
  }
  .page-header-main {
      flex: 1;
  }
  .page-main-title {
      margin-bottom: 0.25rem;
  }
  .page-en-subtitle {
      font-size: 1.1rem;
      color: #6c757d;
      margin-top: 0;
  }
  .page-header-meta {
      flex-shrink: 0;
      margin-left: 2rem;
      font-size: 0.9rem;
      color: #495057;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.4rem 0.5rem;
      align-items: baseline;
  }
  .meta-item-label {
      grid-column: 1;
      font-weight: 600;
      text-align: left;
  }
  .meta-item-value {
      grid-column: 2;
      min-width: 160px;
      text-align: left;
  }

  #upload-status {
      display: none;
      padding: 0.75rem 1.25rem;
      margin-top: 1rem;
      border-radius: 8px;
      font-weight: 500;
      text-align: center;
  }
  .status-info { background-color: #e0e7ff; color: #3730a3; }
  .status-success { background-color: #dcfce7; color: #166534; }
  .status-error { background-color: #fee2e2; color: #991b1b; }
  #upload-status i { margin-right: 0.5rem; }

  /* 內文卡片 */
  .authorization-container {
    margin-top: 2.2rem;
  }
  .authorization-card {
    max-width: 650px;
    margin: 0 auto;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    padding: 1.4rem 1.7rem;
    box-shadow: 0 4px 12px rgba(15,23,42,.04);
    font-size: 0.95rem;
    line-height: 1.7;
  }
  .authorization-card h2 {
    margin: 0 0 0.25rem;
    font-size: 1.3rem;
    text-align: center;
  }
  .authorization-card .en-subtitle {
    text-align: center;
    color: #6b7280;
    font-size: 0.9rem;
    margin-bottom: 0.8rem;
  }
  .authorization-body p {
    margin: 0 0 0.55rem;
    text-align: justify;
  }
  .authorization-body ol {
    padding-left: 1.1rem;
    margin: 0 0 0.55rem;
  }
  .authorization-body li {
    margin-bottom: 0.35rem;
  }

  /* 下方欄位：適度放鬆版 */
  .auth-identity-grid {
    margin-top: 0.9rem;
    border-top: 1px dashed #e5e7eb;
    padding-top: 0.7rem;
    display: grid;
    grid-template-columns: 1fr;
    row-gap: 0.4rem;
    font-size: 0.9rem;
  }
  .auth-field-row {
    display: grid;
    grid-template-columns: 130px 1fr;
    column-gap: 0.7rem;
    align-items: center;
  }
  .auth-field-label {
    color: #4b5563;
    white-space: nowrap;
  }
  .auth-field-value {
    min-height: 1.3rem;
  }
  .auth-input {
    width: 100%;
    font-size: 0.9rem;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    padding: 0.25rem 0.35rem;
    box-sizing: border-box;
  }
  .auth-input:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 1px rgba(99,102,241,.2);
  }

  .auth-confirm-row {
    margin-top: 0.8rem;
    padding: 0.65rem 0.8rem;
    border-radius: 8px;
    background: #f9fafb;
    display: flex;
    align-items: flex-start;
    gap: 0.45rem;
    font-size: 0.86rem;
  }
  .auth-confirm-row input[type="checkbox"] {
    margin-top: 0.15rem;
  }
  .auth-status {
    margin-top: 0.7rem;
    font-size: 0.8rem;
    color: #6b7280;
  }
  .auth-status strong {
    color: #111827;
  }

  /* 右上角 print-header 改為完全不使用 */
  .print-header {
    display: none !important;
  }

  @media print {
    body {
      background-color: #ffffff;
    }
    .app-wrap {
      max-width: none;
      min-height: 0;
      margin: 0;
      padding: 0.8rem 1rem 1rem;
      box-shadow: none;
    }
    .no-print, .toolbar, .status-bar, .page-header {
      display: none !important;
    }

    .authorization-container {
      margin-top: 1.2rem;
    }

    .authorization-card {
      box-shadow: none;
      border-color: #d1d5db;
      padding: 1.05rem 1.25rem;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .authorization-card h2 {
      margin-bottom: 0.28rem;
      font-size: 1.45rem;
    }
    .authorization-card .en-subtitle {
      margin-bottom: 2.55rem;
      font-size: 1.2rem;
    }
    .authorization-body p {
      margin-bottom: 0.45rem;
    }
    .authorization-body li {
      margin-bottom: 0.8rem;
    }

    .auth-identity-grid {
      margin-top: 1.2rem;
      padding-top: 0.45rem;
      row-gap: 0.8rem;
      font-size: 0.82rem;
    }
    .auth-field-row {
      grid-template-columns: 120px 1fr;
    }
    .auth-input {
      border: none !important;
      padding: 0;
      font-size: 0.82rem;
    }

    .auth-confirm-row {
      margin-top: 0.55rem;
      padding: 0.5rem 0.6rem;
      font-size: 0.8rem;
    }

    /* 列印時隱藏「狀態」提醒 */
    .auth-status {
      display: none !important;
    }
  }
</style>
</head>
<body>

<div id="app-container" style="display:none;">
  <div class="toolbar no-print">
    <a id="back-link" href="#" class="btn"><i class="fa-solid fa-arrow-left"></i> 返回 PIF 列表</a>
    <button id="btnSaveChanges" class="btn primary"><i class="fa-solid fa-file-shield"></i> 確認送出 PIF 製作人員免責聲明</button>
    <div class="right">
      <div id="user-info" style="display:inline-block;margin-right:1rem;font-size:.9rem;"></div>
      <button id="btnSignOut" class="btn danger">登出</button>
    </div>
  </div>

  <div class="app-wrap">
    <!-- 已停用的 print-header（不再顯示） -->
    <div class="print-header">
      <div class="print-header-top-right">
        <strong>PIF ID：</strong><span id="print-pif-id"></span>
      </div>
    </div>

    <!-- 螢幕顯示用頁首 -->
    <header class="page-header">
      <div class="page-header-main">
        <h1 class="page-main-title"><i class="fa-solid fa-file-pen"></i> PIF 製作人員免責聲明書</h1>
        <h2 class="page-en-subtitle">Disclaimer Statement for PIF Preparation Personnel</h2>
      </div>
      <div id="page-header-meta-container" class="page-header-meta"></div>
    </header>

    <div class="status-bar no-print">
      <div>
        <span id="status-light" class="status-light"></span>
        <span id="status-text">正在初始化...</span>
      </div>
      <div style="display:flex;gap:0.5rem;">
        <button id="btnUploadPdf" class="btn"><i class="fa-solid fa-file-arrow-up"></i> 上傳簽名 PIF 製作人員免責聲明 PDF</button>
        <input type="file" id="pdfUploader" accept="application/pdf" style="display:none;">
        <button onclick="window.print()" class="btn"><i class="fa-solid fa-print"></i> 列印 / 匯出 PDF</button>
      </div>
    </div>
    <div id="upload-status" class="no-print"></div>

    <div id="authorization-container" class="authorization-container"></div>
  </div>
</div>

<div id="global-error" style="display:none;"></div>

<script type="module">
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { doc, getDoc, setDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { ref, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";
  import { auth, db, storage } from './firebase-config.js';

  const $ = sel => document.querySelector(sel);

  let pifDocRef;
  let pageContext = {};
  let hasUnsavedChanges = false;
  let authorizationLocked = false;
  let currentUser = null;
  let currentMakerData = {};
  let currentRootData = {};

  const status = {
    light: $("#status-light"),
    text: $("#status-text"),
    set(state, msg) {
      if (!this.light || !this.text) return;
      this.light.className = `status-light ${state}`;
      this.text.textContent = msg;
      if (state === 'syncing') {
        $('#btnSaveChanges').disabled = true;
      } else if (!authorizationLocked) {
        $('#btnSaveChanges').disabled = !hasUnsavedChanges;
      }
      if (state === 'synced' || state === 'error') {
        setTimeout(() => {
          if (hasUnsavedChanges) {
            this.set('syncing', '有未送出的變更');
          } else {
            this.set('ready', authorizationLocked ? 'PIF 製作人員免責聲明已送出（唯讀）' : '就緒');
          }
        }, 3000);
      }
    },
    markUnsaved() {
      if (authorizationLocked) return;
      hasUnsavedChanges = true;
      this.set('syncing', '有未送出的變更');
      $('#btnSaveChanges').disabled = false;
    }
  };

  function startAuthFlow() {
    onAuthStateChanged(auth, user => {
      if (user) {
        currentUser = user;
        try {
          pageContext = setupPageContext();
          pifDocRef = doc(db, 'pifs', pageContext.pifId);
          setupUIForUser(user);
          initializeData();
          $('#app-container').style.display = 'block';
        } catch (e) {
          $('#global-error').textContent = `啟動錯誤：${e.message}。請確認網址是否正確。`;
          $('#global-error').style.display = 'block';
        }
      } else {
        window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
      }
      document.body.style.opacity = '1';
    });
  }

  function setupPageContext() {
    const urlParams = new URLSearchParams(window.location.search);
    const ctx = {
      pifId: urlParams.get('id'),
      companyName: urlParams.get('companyName'),
      productName: urlParams.get('productName')
    };
    if (!ctx.pifId) throw new Error('網址中缺少專案 ID');
    return ctx;
  }

  function setupUIForUser(user) {
    $('#user-info').textContent = user.email;
    $('#btnSignOut').addEventListener('click', () => signOut(auth));

    const params = new URLSearchParams({
      id: pageContext.pifId,
      companyName: pageContext.companyName || '',
      productName: pageContext.productName || ''
    });
    $('#back-link').href = `pif-i.html?${params.toString()}`;

    $('#btnSaveChanges').addEventListener('click', saveAuthorization);
    $('#btnSaveChanges').disabled = true;

    $('#btnUploadPdf').addEventListener('click', () => $('#pdfUploader').click());
    $('#pdfUploader').addEventListener('change', handlePdfUpload);

    window.addEventListener('beforeunload', e => {
      if (hasUnsavedChanges && !authorizationLocked) {
        e.preventDefault();
        e.returnValue = '';
      }
    });
  }

  async function initializeData() {
    status.set('syncing', '正在從雲端讀取 PIF 製作人員免責聲明資料...');
    try {
      const snap = await getDoc(pifDocRef);
      if (snap.exists()) {
        currentRootData = snap.data() || {};
        currentMakerData = currentRootData.pifMakerDisclaimer || {};
      } else {
        currentRootData = {};
        currentMakerData = {};
      }
      renderAuthorizationForm(currentMakerData, currentRootData);
      authorizationLocked = !!currentMakerData.submitted;
      hasUnsavedChanges = false;
      $('#btnSaveChanges').disabled = authorizationLocked;
      status.set('ready', authorizationLocked ? 'PIF 製作人員免責聲明已送出（唯讀）' : '請確認內容後送出 PIF 製作人員免責聲明');
    } catch (err) {
      console.error('初始化 PIF 製作人員免責聲明失敗：', err);
      status.set('error', `讀取失敗：${err.message}`);
    }
  }

  function renderAuthorizationForm(makerData, rootData) {
    const escape = str =>
      str ? String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])) : '';

    const companyName =
      rootData.companyName || pageContext.companyName || '';
    const productName =
      rootData.productName || pageContext.productName || '';

    const makerPerson = makerData.makerPerson || '';
    const makerDate =
      makerData.makerDate ||
      new Date().toISOString().slice(0, 10);
    const confirmed = !!makerData.confirmed;
    const submittedAt = makerData.submittedAt && makerData.submittedAt.toDate
      ? makerData.submittedAt.toDate()
      : null;

    // 螢幕頁首 meta（僅螢幕顯示，列印已隱藏）
    const metaContainer = $('#page-header-meta-container');
    if (metaContainer) {
      metaContainer.innerHTML = `
        <span class="meta-item-label">廠商名稱:</span>
        <span class="meta-item-value">${escape(companyName)}</span>
        <span class="meta-item-label">產品名稱:</span>
        <span class="meta-item-value">${escape(productName)}</span>
        <span class="meta-item-label">PIF ID:</span>
        <span class="meta-item-value">${escape(pageContext.pifId)}</span>
      `;
    }

    // 仍設定 print-pif-id（雖然 print-header 已隱藏，保留以防之後需要）
    $('#print-pif-id').textContent = pageContext.pifId || '';

    const container = $('#authorization-container');
    container.innerHTML = `
      <div class="authorization-card">
        <h2>PIF 製作人員免責聲明書</h2>
        <div class="en-subtitle">Disclaimer Statement for Product Information File (PIF) Preparation</div>
        <div class="authorization-body">
          <p>本聲明書係由負責本產品「產品資訊檔案 Product Information File（PIF）」之撰寫與彙整者（下稱「PIF 製作人員」）出具，用以說明 PIF 製作人員之服務範圍與責任界線如下：</p>
          <ol>
            <li>PIF 製作係以廠商及其指定單位所提供之各項資料為基礎，包括但不限於：產品與原料之基本資料、配方表及全成分表、原料規格書、SDS／COA／測試報告、安定性與微生物檢測結果、防腐挑戰試驗（Preservative Efficacy Test, PET）報告、各原料毒理學文獻與 MOS 計算資料、標示與宣稱內容及相關法規文件等（以下合稱「原始資料」）。</li>
            <li>PIF 製作人員之工作內容為：就前述原始資料進行彙整、編排、格式化與必要之文字整理，並依現行化粧品法規架構，協助整理成符合 PIF 結構之文件。PIF 製作人員得就文件缺漏或可能之法規風險提出提醒或建議，但並無義務對原始資料之真實性、完整性或最新性進行獨立查證或背書。</li>
            <li>廠商就所有提供之原始資料及其真實性、完整性與合法性負全部責任。若原始資料有錯誤、遺漏、過期或遭隱匿，致主管機關稽查、行政處分、產品回收、消費者爭議或任何民刑事訴訟發生，其法律責任概由廠商及／或產品責任人自行承擔，與 PIF 製作人員及其服務單位無涉，並同意免除 PIF 製作人員及其服務單位一切民事與行政賠償及連帶責任。</li>
            <li>PIF 製作人員就 PIF 內容所提出之建議、註記、風險提醒或改善方向，係基於現行可取得之資料與一般性法規理解所做之專業意見，僅供廠商決策參考；是否採納、如何調整配方與標示、是否進行或追加檢測及最終申報或上市決策，仍由廠商及／或產品責任人自行決定並負完全責任。</li>
            <li>本免責聲明書之目的，在於釐清 PIF 製作人員所提供服務之性質屬文件整理與專業諮詢，並不取代廠商或產品責任人依各國化粧品相關法令所應負之任何法定義務與責任。</li>
          </ol>
          <p>PIF 製作人員已充分了解上開條款，並於此範圍內，善盡合理之專業注意義務，協助廠商就其所提供之原始資料完成 PIF 之彙整與文件化作業。</p>
        </div>

        <div class="auth-identity-grid">
          <div class="auth-field-row">
            <div class="auth-field-label">廠商名稱</div>
            <div class="auth-field-value">
              <span>${escape(companyName)}</span>
            </div>
          </div>
          <div class="auth-field-row">
            <div class="auth-field-label">產品名稱</div>
            <div class="auth-field-value">
              <span>${escape(productName)}</span>
            </div>
          </div>
          <div class="auth-field-row">
            <div class="auth-field-label">PIF ID</div>
            <div class="auth-field-value">
              <span>${escape(pageContext.pifId)}</span>
            </div>
          </div>
          <div class="auth-field-row">
            <div class="auth-field-label">PIF 製作人員</div>
            <div class="auth-field-value">
              <input id="maker-person" class="auth-input" type="text" value="${escape(makerPerson)}">
            </div>
          </div>
          <div class="auth-field-row">
            <div class="auth-field-label">製作 / 完成日期</div>
            <div class="auth-field-value">
              <input id="maker-date" class="auth-input" type="date" value="${escape(makerDate)}">
            </div>
          </div>
        </div>

        <div class="auth-confirm-row">
          <input type="checkbox" id="auth-confirm" ${confirmed ? 'checked' : ''}>
          <label for="auth-confirm">
            本人／本單位已詳閱並同意本《PIF 製作人員免責聲明書》全部內容，並確認上述資料正確無誤。
          </label>
        </div>

        <div class="auth-status" id="auth-status-text">
          ${makerData.submitted
            ? `<strong>狀態：</strong>PIF 製作人員免責聲明已於 ${submittedAt ? submittedAt.toLocaleString() : ''} 由 ${makerData.submittedBy || ''} 送出，資料僅供閱覽，無法再修改。`
            : `<strong>狀態：</strong>尚未正式送出 PIF 製作人員免責聲明。請確認內容無誤後，勾選上方同意方塊並點選「確認送出 PIF 製作人員免責聲明」。`}
        </div>
      </div>
    `;

    const readOnly = !!makerData.submitted;
    authorizationLocked = readOnly;
    bindMakerInputs(readOnly);
  }

  function bindMakerInputs(readOnly) {
    const ids = ['maker-person','maker-date'];
    ids.forEach(id => {
      const el = $('#' + id);
      if (!el) return;
      el.readOnly = readOnly;
      el.disabled = readOnly;
      if (!readOnly) {
        el.addEventListener('input', () => status.markUnsaved());
      }
    });
    const chk = $('#auth-confirm');
    if (chk) {
      chk.disabled = readOnly;
      if (!readOnly) {
        chk.addEventListener('change', () => status.markUnsaved());
      }
    }
    if (readOnly) {
      $('#btnSaveChanges').disabled = true;
    }
  }

  async function saveAuthorization() {
    if (authorizationLocked) return;

    const companyName =
      currentRootData.companyName || pageContext.companyName || '';
    const productName =
      currentRootData.productName || pageContext.productName || '';

    const makerPerson = $('#maker-person')?.value.trim() || '';
    const makerDate = $('#maker-date')?.value.trim() || '';
    const confirmed = $('#auth-confirm')?.checked || false;

    if (!makerPerson || !confirmed) {
      alert('請至少填寫「PIF 製作人員」，並勾選「已閱讀並同意」後再送出。');
      return;
    }

    if (!window.confirm('送出後 PIF 製作人員免責聲明將鎖定為唯讀，無法再次修改。\n\n確定要送出嗎？')) {
      return;
    }

    status.set('syncing', '正在送出 PIF 製作人員免責聲明並寫入雲端...');
    try {
      const payload = {
        companyName,
        productName,
        makerPerson,
        makerDate,
        confirmed: true,
        submitted: true,
        submittedAt: Timestamp.now(),
        submittedBy: currentUser ? currentUser.email : '',
      };

      await setDoc(pifDocRef, { pifMakerDisclaimer: payload }, { merge: true });

      hasUnsavedChanges = false;
      authorizationLocked = true;
      await initializeData(); // 重新 render 成唯讀
      status.set('synced', 'PIF 製作人員免責聲明已成功送出並鎖定（唯讀）。');
    } catch (err) {
      console.error('儲存 PIF 製作人員免責聲明失敗：', err);
      status.set('error', `儲存失敗：${err.message}`);
    }
  }

  function handlePdfUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.type !== 'application/pdf') {
      alert('請選擇一個 PDF 檔案。');
      return;
    }
    // PIF 製作人員免責聲明 PDF 路徑
    uploadFile(file, `pifs/${pageContext.pifId}/m-doc.pdf`);
  }

  function uploadFile(file, storagePath) {
    const uploadTask = uploadBytesResumable(ref(storage, storagePath), file);
    const button = $('#btnUploadPdf');
    button.disabled = true;

    uploadTask.on(
      'state_changed',
      snapshot => {
        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
        setUploadStatus(
          `<i class="fa-solid fa-upload"></i> 正在上傳 PIF 製作人員免責聲明 PDF... ${Math.round(progress)}%`,
          'status-info'
        );
      },
      error => {
        console.error('Upload failed:', error);
        setUploadStatus(
          `<i class="fa-solid fa-triangle-exclamation"></i> 上傳失敗: ${error.code}`,
          'status-error'
        );
        button.disabled = false;
      },
      () => {
        setUploadStatus(
          '<i class="fa-solid fa-check-circle"></i> PIF 製作人員免責聲明 PDF 已成功上傳！',
          'status-success'
        );
        button.disabled = false;
        $('#pdfUploader').value = '';
        setTimeout(() => setUploadStatus('', 'none'), 5000);
      }
    );
  }

  function setUploadStatus(msg, styleClass) {
    const statusEl = $('#upload-status');
    if (!statusEl) return;
    if (!msg || styleClass === 'none') {
      statusEl.style.display = 'none';
    } else {
      statusEl.innerHTML = msg;
      statusEl.className = `no-print ${styleClass}`;
      statusEl.style.display = 'block';
    }
  }

  startAuthFlow();
</script>
</body>
</html>
