          <div class="shareWrap">

</div>

          規則：需登入；同一帳號每一期只保留一份投票（可於投票期間內更新）。<br/>
          若看不到候選主題，請主辦單位先到「主辦設定」建立本期 poll 與候選清單。

      <!-- right: candidates -->
      <section class="card">
        <div style="display:flex; align-items:end; justify-content:space-between; gap:.75rem; flex-wrap:wrap;">
          <div>
            <h2 style="margin:.1rem 0 .2rem;">候選主題</h2>
            <div class="muted small">點選卡片勾選；超過上限會提示。</div>
          </div>
          <div class="muted small" id="hintRight"></div>

  <script type="module">
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { doc, getDoc, setDoc, serverTimestamp, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { db, auth } from "./firebase-config.js";

    const $ = (s)=>document.querySelector(s);

    // Ensure login link returns back to this page (keeps same origin, keeps poll/query)
    const _backTo = (location.pathname.replace(/^\//,"") || "topic-poll.html") + location.search + location.hash;
    const _loginA = document.getElementById("btnLogin");
    if (_loginA) _loginA.href = `login.html?redirect=${encodeURIComponent(_backTo)}`;


    // Collections
    const POLLS = "kb_topic_polls";

    // URL params
    const params = new URLSearchParams(location.search);
    const forcedPoll = (params.get("poll") || "").trim();

    // Public config: which poll is "published" to front as default
    const PUBLIC_CFG_COL = "kb_public_config";
    const PUBLIC_CFG_DOC = "topic_poll";
    const PUBLIC_CFG_REF = doc(db, PUBLIC_CFG_COL, PUBLIC_CFG_DOC);

    function pad2(n){ return String(n).padStart(2,"0"); }
    function nextMonthId(){
      const d = new Date();
      const y = d.getFullYear();
      const m = d.getMonth()+1;
      const ny = (m === 12) ? (y+1) : y;
      const nm = (m === 12) ? 1 : (m+1);
      return `${ny}-${pad2(nm)}`;
    }

    let pollId = forcedPoll || "";
    async function resolveDefaultPollId(u){
      // Ensure ID token is ready before Firestore reads (avoids fallback to wrong pollId)
      try{ if(u) await u.getIdToken(); }catch(_){ }

      if (pollId) return pollId;

      // 1) read published/default pollId from public config
      try{
        const csnap = await getDoc(PUBLIC_CFG_REF);
        const data = csnap.exists() ? (csnap.data() || {}) : {};
        const active = (typeof data.activePollId === "string") ? data.activePollId.trim() : "";
        if (active) return active;
      }catch(e){
        console.warn("public config read failed:", e);
      }

      // 2) otherwise, auto-pick the latest poll by pollId (YYYY-MM) desc
      try{
        const qs = query(collection(db, POLLS), orderBy("pollId","desc"), limit(1));
        const ds = await getDocs(qs);
        if (!ds.empty){
          const d0 = ds.docs[0];
          const pid = String((d0.data()?.pollId || d0.id || "")).trim();
          if (pid) return pid;
        }
      }catch(e){
        console.warn("poll list query failed:", e);
      }

      // 3) fallback: next calendar month
      return nextMonthId();
    }

    async function ensurePollId(){
      pollId = await resolveDefaultPollId(user);
      $("#pollBadge").textContent = `poll: ${pollId}`;
    }

    // state
    let user = null;
    let poll = null; // poll doc data
    let myVote = null; // vote doc data
    let picks = new Set();
    let maxSelections = 3;
    let isOpen = false;

    // helper
    function esc(s){
      return String(s ?? "")
        .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
        .replaceAll('"',"&quot;").replaceAll("'","&#39;");
    }
    function fmtTs(ts){
      try{
        if (!ts) return "—";
        const d = ts.toDate ? ts.toDate() : (ts instanceof Date ? ts : null);
        if (!d) return "—";
        const y = d.getFullYear();
        const mo = pad2(d.getMonth()+1);
        const da = pad2(d.getDate());
        const hh = pad2(d.getHours());
        const mm = pad2(d.getMinutes());
        return `${y}-${mo}-${da} ${hh}:${mm}`;
      }catch(_){ return "—"; }
    }
    function setMsg(kind, text){
      const box = $("#msgBox");
      if (!text){
        box.innerHTML = "";
        return;
      }
      const cls = kind === "ok" ? "msgOk" : kind === "warn" ? "msgWarn" : "msgBad";
      box.innerHTML = `<div class="${cls}">${esc(text)}</div>`;
    }

    function computeOpenState(){
      const now = new Date();
      const from = poll?.openFrom?.toDate?.() || null;
      const until = poll?.openUntil?.toDate?.() || null;

      if (from && now < from) return { state: "notyet", open:false };
      if (until && now > until) return { state: "closed", open:false };
      return { state: "open", open:true };
    }

    function applyOpenUI(){
      const s = computeOpenState();
      isOpen = s.open;

      const pillOpen = $("#pillOpen");
      const pillWindow = $("#pillWindow");

      const fromTxt = fmtTs(poll?.openFrom);
      const untilTxt = fmtTs(poll?.openUntil);

      $("#pollTitle").textContent = poll?.title || `CosPIF化妝品智慧月刊-下期月刊主題票選（${pollId}）`;
      $("#pollDesc").textContent = poll?.desc || "請登入後投票。你可以從候選主題中勾選（最多 N 個），並可補充建議主題。"
        .replace("N", String(maxSelections));

      $("#pillMax").textContent = `可選：${maxSelections} 個`;
      $("#kpiMax").textContent = String(maxSelections);

      pillWindow.textContent = `投票期間：${fromTxt} ～ ${untilTxt}`;
      if (s.state === "open"){
        pillOpen.textContent = "狀態：開放投票中";
        pillOpen.className = "pill ok";
        $("#hintRight").textContent = "✅ 開放中：可勾選候選主題並送出。";
        setMsg("", "");
      }else if (s.state === "notyet"){
        pillOpen.textContent = "狀態：尚未開放";
        pillOpen.className = "pill warn";
        $("#hintRight").textContent = "⏳ 尚未開放：投票開始後才能送出。";
        setMsg("warn", "目前尚未到投票開始時間。");
      }else{
        pillOpen.textContent = "狀態：已結束";
        pillOpen.className = "pill bad";
        $("#hintRight").textContent = "🔒 已結束：僅可查看你當時的投票內容。";
        setMsg("warn", "投票已結束。你仍可查看自己的投票內容。");
      }

      // enable/disable actions
      const disableAll = !user || !poll || !isOpen;
      $("#btnSubmit").disabled = disableAll;
      $("#btnClear").disabled = disableAll;
      $("#suggest").disabled = !user || !poll || !isOpen;
      $("#candGrid").classList.toggle("disabledAll", !poll);
    }

    function renderCandidates(){
      const grid = $("#candGrid");
      grid.innerHTML = "";

      const candidates = Array.isArray(poll?.candidates) ? poll.candidates : [];
      $("#kpiCand").textContent = String(candidates.length);

      if (!candidates.length){
        grid.innerHTML = `<div class="muted small">尚未設定候選主題。請主辦單位到「主辦設定」建立候選清單。</div>`;
        return;
      }

      candidates.forEach((c, idx) => {
        const id = (c.id || c.key || `cand_${idx+1}`).trim();
        const title = (c.title || c.name || id).trim();
        const desc = (c.desc || c.description || "").trim();

        const div = document.createElement("div");
        div.className = "cand";
        div.dataset.id = id;
        div.innerHTML = `
          <div class="chk"><i class="fa-solid fa-check" style="font-size:.85rem; opacity:${picks.has(id) ? 1 : 0};"></i></div>
          <div>
            <div class="t">${esc(title)}</div>
            ${desc ? `<div class="d">${esc(desc)}</div>` : ``}
          </div>
        `;

        function updateCard(){
          const checked = picks.has(id);
          div.classList.toggle("checked", checked);
          const icon = div.querySelector(".chk i");
          if (icon) icon.style.opacity = checked ? "1" : "0";
        }

        div.addEventListener("click", () => {
          if (!user){ setMsg("warn","請先登入後投票。"); return; }
          if (!isOpen){ setMsg("warn","目前非投票期間，無法更新投票。"); return; }

          if (picks.has(id)){
            picks.delete(id);
          }else{
            if (picks.size >= maxSelections){
              setMsg("warn", `最多只能勾選 ${maxSelections} 個主題。`);
              return;
            }
            picks.add(id);
          }
          updateCard();
          syncPickKpi();
        });

        updateCard();
        grid.appendChild(div);
      });
    }

    function syncPickKpi(){
      $("#kpiPick").textContent = String(picks.size);
    }

    async function loadPoll(){
      poll = null;
      const ref = doc(db, POLLS, pollId);
      const snap = await getDoc(ref);
      if (!snap.exists()){
        setMsg("warn", `尚未建立本期投票設定（pollId=${pollId}）。請主辦單位到「主辦設定」建立。`);
        $("#pollTitle").textContent = `下期月刊主題票選（${pollId}）`;
        $("#pillWindow").textContent = "投票期間：—";
        $("#pillMax").textContent = "可選：—";
        $("#kpiCand").textContent = "0";
        $("#kpiMax").textContent = "0";
        $("#kpiMy").textContent = "—";
        $("#candGrid").innerHTML = `<div class="muted small">尚未建立本期 poll。</div>`;
        applyOpenUI();
        return;
      }
      poll = snap.data() || {};
      maxSelections = Number(poll.maxSelections || 3);
      applyOpenUI();
      renderCandidates();
    }

    async function loadMyVote(){
      myVote = null;
      picks = new Set();
      $("#suggest").value = "";
      $("#kpiMy").textContent = user ? "未投票" : "—";
      syncPickKpi();

      if (!user) return;
      if (!poll) return;

      const vref = doc(db, POLLS, pollId, "votes", user.uid);
      const vsnap = await getDoc(vref);
      if (!vsnap.exists()) {
        $("#kpiMy").textContent = "未投票";
        return;
      }
      myVote = vsnap.data() || {};
      const arr = Array.isArray(myVote.picks) ? myVote.picks : [];
      arr.forEach(x => picks.add(String(x)));
      $("#suggest").value = myVote.suggestion || "";
      $("#kpiMy").textContent = "已投票";
      syncPickKpi();

      // re-render to reflect checks
      renderCandidates();
    }

    async function submitVote(){
      if (!user){ setMsg("warn","請先登入。"); return; }
      if (!poll){ setMsg("warn","尚未建立本期 poll。"); return; }
      if (!isOpen){ setMsg("warn","目前非投票期間，無法送出。"); return; }

      const pickArr = Array.from(picks);
      const suggestion = ($("#suggest").value || "").trim();

      if (pickArr.length === 0 && !suggestion){
        setMsg("warn", "請至少勾選 1 個候選主題，或輸入一個建議新主題。");
        return;
      }
      if (pickArr.length > maxSelections){
        setMsg("warn", `最多只能勾選 ${maxSelections} 個主題。`);
        return;
      }
      if (suggestion.length > 200){
        setMsg("warn", "建議主題最多 200 字。");
        return;
      }

      setMsg("", "");
      $("#btnSubmit").disabled = true;

      try{
        const vref = doc(db, POLLS, pollId, "votes", user.uid);
        const payload = {
          uid: user.uid,
          email: user.email || "",
          displayName: user.displayName || "",
          picks: pickArr,
          suggestion,
          updatedAt: serverTimestamp(),
        };
        if (!myVote) payload.createdAt = serverTimestamp();

        await setDoc(vref, payload, { merge:true });
        setMsg("ok", "✅ 已送出你的投票（可於投票期間內再更新）。");
        await loadMyVote();
      }catch(e){
        console.error(e);
        setMsg("bad", "送出失敗：可能是權限或投票期間限制。\n" + (e?.message || String(e)));
      }finally{
        $("#btnSubmit").disabled = !isOpen;
      }
    }

    function clearPicks(){
      picks.clear();
      syncPickKpi();
      renderCandidates();
      setMsg("", "");
    }

    // ---- login/logout UI
    $("#btnLogout").addEventListener("click", async () => {
      try{ await signOut(auth); }catch(e){ console.error(e); }
    });

    // determine whether admin link visible (claims)
    async function refreshAdminLink(u){
      $("#adminLink").style.display = "none";
      if (!u) return;
      try{
        const token = await u.getIdTokenResult(true);
        const claims = token?.claims || {};
        const rolesObj = (claims.roles && typeof claims.roles === "object") ? claims.roles : {};
        const roles = {
          admin: !!claims.admin,
          systemAdmin: !!claims.systemAdmin,
          secretary: !!claims.secretary,
          editor: !!claims.editor,
          ...rolesObj
        };
        const ok = !!(roles.admin || roles.systemAdmin || roles.editor || roles.secretary);
        if (ok) $("#adminLink").style.display = "inline-flex";
      }catch(_){}
    }

    // bind
    $("#btnSubmit").addEventListener("click", (e)=>{ e.preventDefault(); submitVote(); });
    $("#btnClear").addEventListener("click", (e)=>{ e.preventDefault(); clearPicks(); });

// share
const DEFAULT_PUBLIC_BASE = "https://cos-pif.web.app"; // 若你有自訂網域，改成你的公開網域
function getPublicBase(){
  const qp = new URLSearchParams(location.search).get("publicBase");
  if(qp) return qp.replace(/\/+$/,"");
  const ls = localStorage.getItem("PUBLIC_BASE_URL");
  if(ls) return String(ls).replace(/\/+$/,"");
  if(location.hostname.includes("cloudworkstations") || location.hostname.includes("cloud.google.com")){
    return DEFAULT_PUBLIC_BASE;
  }
  return location.origin;
}
function buildShareUrl(){
  const base = getPublicBase();
  const u = new URL(base.replace(/\/+$/,"") + "/topic-poll.html");
  if(pollId) u.searchParams.set("poll", pollId);
  return u.toString();
}
function shareTitleText(){
  const t = (poll && poll.title) ? poll.title : (pollId ? `下期月刊主題票選（${pollId}）` : "下期月刊主題票選");
  const maxN = poll && poll.maxSelections ? poll.maxSelections : maxSelections || 3;
  return { title: t, text: `${t}｜歡迎投票（最多 ${maxN} 個）` };
}
function closeShareMenu(){ $("#shareMenu")?.classList?.remove("open"); }
function toggleShareMenu(){
  const m = $("#shareMenu");
  if(!m) return;
  m.classList.toggle("open");
}
async function doShare(){
  const url = buildShareUrl();
  const { title, text } = shareTitleText();
  // Native Web Share (手機最順)
  if(navigator.share){
    try{
      await navigator.share({ title, text, url });
      return;
    }catch(e){
      // 使用者取消時不顯示錯誤
      if(String(e?.name || "").toLowerCase().includes("abort")) return;
    }
  }
  // Desktop fallback: open menu
  toggleShareMenu();
}
async function doCopyLink(){
  const url = buildShareUrl();
  try{
    await navigator.clipboard.writeText(url);
    setMsg("ok", "✅ 已複製分享連結");
  }catch(_){
    window.prompt("複製這個連結：", url);
  }
}
function openShare(kind){
  const url = buildShareUrl();
  const { title, text } = shareTitleText();
  const enc = encodeURIComponent;
  let shareUrl = "";
  if(kind==="fb") shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${enc(url)}`;
  else if(kind==="line") shareUrl = `https://social-plugins.line.me/lineit/share?url=${enc(url)}`;
  else if(kind==="x") shareUrl = `https://twitter.com/intent/tweet?text=${enc(text)}&url=${enc(url)}`;
  if(shareUrl) window.open(shareUrl, "_blank", "noopener,noreferrer,width=720,height=720");
}

$("#btnShare")?.addEventListener("click", (e)=>{ e.preventDefault(); doShare(); });

// share menu actions
$("#shareMenu")?.addEventListener("click", (e)=>{
  const btn = e.target.closest("button[data-act]");
  if(!btn) return;
  const act = btn.getAttribute("data-act");
  if(act==="copy") return void(doCopyLink(), closeShareMenu());
  if(act==="fb" || act==="line" || act==="x"){ openShare(act); closeShareMenu(); return; }
});

// click outside closes menu
document.addEventListener("click", (e)=>{
  const inWrap = e.target.closest(".shareWrap");
  if(!inWrap) closeShareMenu();
});

    // init
    
    onAuthStateChanged(auth, async (u) => {
      user = u || null;

      // If no ?poll= is provided, always follow the admin-published month (kb_public_config/topic_poll.activePollId)
      if (!forcedPoll) pollId = "";
      if (!user){
        $("#authBadge").textContent = "未登入";
        $("#userBadge").textContent = "請登入後投票";
        $("#btnLogin").style.display = "inline-flex";
        $("#btnLogout").style.display = "none";
        $("#pollBadge").textContent = "poll: —";
        $("#candGrid").innerHTML = `<div class="muted small">請先登入後查看候選主題並投票。</div>`;
        setMsg("warn", "此頁已設定為：需登入才可讀取候選主題與投票。請先登入。");
        applyOpenUI();
        return; // ★ 未登入時不進行任何 Firestore 讀取，避免 permission-denied
      }else{
        $("#authBadge").textContent = "已登入";
        $("#userBadge").textContent = user.email || user.uid;
        $("#btnLogin").style.display = "none";
        $("#btnLogout").style.display = "inline-flex";
        setMsg("", "");
      }

      await refreshAdminLink(user);

      await ensurePollId();
      await loadPoll();
      await loadMyVote();
      applyOpenUI();
    });

    setInterval(() => { if (poll) applyOpenUI(); }, 60 * 1000);

  </script>
