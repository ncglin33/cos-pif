<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIF 16｜產品安全資料（雲端整合版）</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
  :root{
    --fg:#111; --muted:#666; --line:#e5e7eb; --brand:#2563eb; --ok:#16a34a; --bad:#dc2626; --warn:#d97706;
  }
  html,body{background:#f8fafc;color:var(--fg);font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans TC","PingFang TC","Microsoft JhengHei",Segoe UI,Roboto,Arial,sans-serif;line-height:1.5}
  h1{font-size:1.4rem;margin:0 0 .25rem 0}
  .toolbar{position:sticky;top:0;background:rgba(255,255,255,.95);backdrop-filter:blur(4px);border-bottom:1px solid var(--line);z-index:50}
  .toolbar .wrap{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;padding:.6rem .8rem;justify-content:space-between;}
  .toolbar .auth-zone{display:none;align-items:center;gap:.6rem;font-size:.85rem;}
  button{border:1px solid var(--line);background:#fff;padding:.45rem .7rem;border-radius:.5rem;cursor:pointer; display:inline-flex; align-items:center; gap:.3rem;}
  button:disabled{opacity:0.6;cursor:not-allowed;}
  button.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  button.warn{background:var(--warn);border-color:var(--warn);color:#fff}
  .container{max-width:1280px;margin:0 auto;padding:1rem .8rem 3rem}
  .grid-top{display:grid;grid-template-columns:1.2fr .8fr;gap:.75rem;margin:.8rem 0}
  .top-left,.top-right{border:1px solid var(--line);border-radius:.75rem;padding:1.1rem; background:#fff;}
  label{display:block;font-size:.9rem;color:var(--muted); margin-bottom:.2rem;}
  input,textarea,select{width:100%;padding:.5rem .6rem;border:1px solid var(--line);border-radius:.5rem}
  input[readonly]{background:#f3f4f6;color:var(--muted); cursor:default;}
  .meta{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem}
  .card{border:1px solid var(--line);border-radius:.8rem;margin:1rem 0; background:#fff;}
  .card h3{margin:.8rem .9rem;font-size:1.05rem; display:flex; align-items:center; gap:.4rem;}
  .card .body{padding:.6rem .9rem .9rem}
  table{width:100%;border-collapse:collapse; table-layout:fixed;}
  th,td{border:1px solid var(--line);padding:.4rem .5rem;font-size:.88rem;vertical-align:top; word-break:break-word;}
  th{background:#f8fafc;text-align:left; font-weight:600;}
  td input, td select, td textarea{width:100%;border:1px solid var(--line);border-radius:.4rem;padding:.3rem .4rem; font-size:inherit;}
  textarea{resize:vertical; min-height:40px;}
  .pass{background:#ecfdf5}
  .warnbg{background:#fffbeb}
  .fail{background:#fef2f2}
  .center{text-align:center}
  .right{text-align:right}
  .small{font-size:.82rem}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
  .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem}
  .no-print{}
  
  @page {
    size: A4;
    margin: .8cm;
  }
  @media print{
    html, body { background: #fff; font-size: 9pt; }
    .toolbar, .no-print, .card h3 i {display:none!important}
    .container{width:100%; max-width:100%; padding:0; margin:0;}
    .card{border:1px solid #ccc; border-radius:0; box-shadow:none; margin: .8rem 0;}
    .card h3 { margin-bottom: .4rem; font-size: 11pt;}
    input, textarea, select {border:none!important; padding: 2px;}
    input[readonly] { background: #eee;}
    th,td{border-color:#bbb; padding: .25rem .4rem;}
    .grid-top, .two-col, .three-col {grid-template-columns: 1fr; gap:.5rem;}
    .top-left, .top-right { padding: .5rem; }
    .meta{grid-template-columns:repeat(2,1fr);}
    table { page-break-inside: auto; }
    tr { page-break-inside: avoid; page-break-after: auto; }
    thead { display: table-header-group; }
    .pass, .warnbg, .fail {background-color: #fff!important; border-left:3px solid;}
    .pass{border-left-color: var(--ok);}
    .warnbg{border-left-color: var(--warn);}
    .fail{border-left-color: var(--bad);}
  }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="wrap">
      <div style="display:flex; gap:.5rem;">
        <a href="/pifs.html" class="ghost no-print" style="text-decoration:none; color:inherit"><button><i class="fa-solid fa-chevron-left"></i> 回 PIF 列表</button></a>
        <button id="add-row-btn" class="ghost no-print"><i class="fa-solid fa-plus"></i> 新增成分</button>
      </div>
       <div style="display:flex; gap:.5rem;">
        <button id="ai-fill-btn" class="warn no-print"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 輔助填寫</button>
        <button onclick="window.print()" class="ghost no-print"><i class="fa-solid fa-print"></i> 列印</button>
        <button id="save-to-cloud-btn" class="primary no-print"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存至雲端</button>
      </div>
      <div class="auth-zone">
        <span id="user-info" class="muted"></span>
        <button id="logout-btn" class="ghost no-print">登出</button>
      </div>
      <span class="muted small" id="autosave-hint"></span>
    </div>
  </div>

  <div class="container">
    <h1>PIF 16｜產品安全資料</h1>
    <div class="grid-top">
      <div class="top-left">
        <label>產品名稱</label>
        <input data-path="product.name" type="text" readonly>
        <div class="two-col" style="margin-top:.6rem">
          <div>
            <label>產品型態</label>
            <select id="product-ptype" data-path="product.ptype">
              <option value="leaveon_face">留置：面部/眼周（一般成人）</option>
              <option value="leaveon_body">留置：身體（一般成人）</option>
              <option value="rinseoff">沖洗：沐浴/洗髮/潔面</option>
              <option value="custom">自訂</option>
            </select>
          </div>
          <div>
            <label>適用族群</label>
            <select data-path="product.population">
              <option value="adult">成人（BW 自動=60）</option>
              <option value="teen">青少年（BW 自動=50）</option>
              <option value="child">兒童（BW 自動=30）</option>
              <option value="infant">嬰幼兒（BW 自動=15）</option>
            </select>
          </div>
        </div>
      </div>
      <div class="top-right">
        <div class="meta">
          <div><label>PIF 編號</label><input data-path="product.pifId" type="text" readonly></div>
          <div><label>廠商名稱</label><input data-path="product.brandName" type="text" readonly></div>
          <div><label>報告日期</label><input data-path="product.rptDate" type="date"></div>
          <div><label>批號</label><input data-path="product.batch" type="text" placeholder="例如：A240901"></div>
          <div><label>樣品編號</label><input data-path="product.sampleNo" type="text" placeholder="例如：SUN-2025-01"></div>
          <div><label>安全評估人</label><input data-path="product.assessor" type="text" placeholder="姓名／資格"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>暴露假設（全域預設）</h3>
      <div class="body">
        <div class="three-col">
          <div><label>每次使用量 A (g/次)</label><input data-path="exp.A" type="number" step="0.01" min="0"></div>
          <div><label>每日使用頻率 F (次/日)</label><input data-path="exp.F" type="number" step="0.01" min="0"></div>
          <div><label>殘留因子 RF</label><input data-path="exp.RF" type="number" step="0.001" min="0"></div>
        </div>
        <div class="two-col" style="margin-top:.6rem">
          <div><label>MoS 門檻</label><input data-path="exp.mosTh" type="number" step="1" min="1"></div>
          <div><label class="muted">體重 BW</label><input data-path="exp.BW" type="number" readonly></div>
        </div>
      </div>
    </div>
    
    <div class="card no-print">
      <h3><i class="fa-solid fa-wand-magic-sparkles"></i> AI 輔助設定</h3>
      <div class="body">
        <div class="two-col">
          <div><label>預設 NOAEL (mg/kg/day)</label><input id="ai-noael" type="number" value="500"></div>
          <div><label>預設吸收率 DA(%)</label><input id="ai-da" type="number" step="0.1" value="1"></div>
        </div>
        <div class="small muted" style="margin-top: .5rem">按下「AI 輔助填寫」按鈕時，將會使用此處設定的值，自動填入下方表格中對應的空白欄位。</div>
      </div>
    </div>

    <div class="card">
      <h3>成分安全與 MoS 計算</h3>
      <div class="body" id="table-host"></div>
    </div>
    
    <div class="card">
      <h3>安全評估結論</h3>
      <div class="body">
        <textarea data-path="product.summary" rows="5" placeholder="可輸入整體結論"></textarea>
      </div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = JSON.parse(atob('eyJwcm9qZWN0SWQiOiJjb3MtcGlmIiwiYXBwSWQiOiIxOjk5MzMzMjIzNzgxNzpjZWI6M2JiMzNiOTdjNjBmZDAzMzQ0MTkyOCIsInN0b3JhZ2VCdWNrZXQiOiJjb3MtcGlmLmZpcmViYXNlc3RvcmFnZS5hcHAiLCJhcGlLZXkiOiJBSXphU3lBUEk3cmVSNmNtUmlJX1VKam5PelRXekdnaEpVTkFUUzAiLCJhdXRoRG9tYWluIjoiY29zLXBpZi5maXJlYmFzZWFwcC5jb20iLCJtZXNzYWdpbmdTZW5kZXJJZCI6Ijk5MzMzMjIzNzgxNyJ9'));
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const $ = sel => document.querySelector(sel);

  let state = {
    product:{ name:"", brandName:"", pifId:"", batch:"", sampleNo:"", rptDate:new Date().toISOString().slice(0,10), assessor:"", ptype:"leaveon_face", population:"adult", summary:"" },
    exp:{A:2.0, F:1, RF:1, BW:60, mosTh:100},
    rows: []
  };

  const toNum = (x) => {
    const s = String(x ?? '').trim();
    if (s === '') return null;
    const n = parseFloat(s.replace(/[^\d.\-]/g,''));
    return isNaN(n) ? null : n;
  }
  const fmt = (v) => v == null ? "" : v;

  function render() {
    document.querySelectorAll('[data-path]').forEach(el => {
      const path = el.dataset.path.split('.');
      let value = state;
      for (const key of path) {
        value = value?.[key];
      }
      if (el.type === 'date' && value) {
        el.value = new Date(value).toISOString().slice(0,10);
      } else {
        el.value = fmt(value);
      }
    });
    renderTable();
    const ts = localStorage.getItem(`${KEY_PREFIX}${state.product.pifId}_ts`);
    $("#autosave-hint").textContent = ts ? `本機草稿於 ${new Date(parseInt(ts)).toLocaleString()} 已自動保存` : "";
  }

  function renderTable() {
    const host = $("#table-host");
    const headers = `<tr>
        <th style="width:22%">成分名稱 / INCI</th>
        <th style="width:8%">含量 C(%)</th>
        <th style="width:10%">NOAEL (mg/kg/day)</th>
        <th style="width:8%">吸收率 DA(%)</th>
        <th style="width:11%">SED (mg/kg/day)</th>
        <th style="width:8%">MoS</th>
        <th style="width:8%">判定</th>
        <th style="width:19%">備註</th>
        <th style="width:6%" class="no-print">操作</th>
    </tr>`;
    const rows = state.rows.map((r,i) => {
      const calc = computeRow(r);
      return `<tr id="row-${i}">
        <td><textarea data-path="rows.${i}.name" placeholder="成分中文名 / INCI">${fmt(r.name)}</textarea></td>
        <td><input data-path="rows.${i}.C" value="${fmt(r.C)}" placeholder="%" readonly></td>
        <td><input data-path="rows.${i}.NOAEL" value="${fmt(r.NOAEL)}" placeholder="mg/kg/day"></td>
        <td><input data-path="rows.${i}.DA" value="${fmt(r.DA)}" placeholder="%"></td>
        <td class="right">${calc.SED.toFixed(4)}</td>
        <td class="right">${calc.MoSText}</td>
        <td class="center ${calc.okCls}">${calc.okText}</td>
        <td><textarea data-path="rows.${i}.note" placeholder="限制/警語/來源">${fmt(r.note)}</textarea></td>
        <td class="center no-print"><button class="remove-row-btn" data-idx="${i}">刪除</button></td>
      </tr>`;
    }).join("");
    host.innerHTML = `<div style="overflow-x:auto"><table><thead>${headers}</thead><tbody>${rows}</tbody></table></div>`;
  }
  
  const getExp = () => ({
    A: toNum(state.exp.A) ?? 0, F: toNum(state.exp.F) ?? 0, RF: toNum(state.exp.RF) ?? 0,
    BW: toNum(state.exp.BW) ?? 60, mosTh: toNum(state.exp.mosTh) ?? 100
  });

  function computeRow(r) {
    const C = (toNum(r.C) ?? 0) / 100;
    const NOAEL = toNum(r.NOAEL) ?? 0;
    const DA = (toNum(r.DA) ?? 100) / 100;
    const e = getExp();
    const mgPerDay = (e.A||0)*(e.F||0)*(e.RF||0) * C * DA * 1000;
    const SED = (e.BW > 0) ? (mgPerDay / e.BW) : 0;
    const MoS = (SED > 0 && NOAEL > 0) ? (NOAEL / SED) : null;
    const MoSText = MoS == null ? "—" : (MoS > 10000 ? ">10000" : MoS.toFixed(0));
    const ok = MoS != null && MoS >= e.mosTh;
    const okCls = MoS == null ? "warnbg" : (ok ? "pass" : "fail");
    const okText = MoS == null ? "待評估" : (ok ? "合格" : "不合格");
    return { SED, MoS, MoSText, okCls, okText };
  }

  function handleStateChange(e) {
    const el = e.target;
    const path = el.dataset.path;
    if (!path || el.readOnly) return;

    const keys = path.split('.');
    let target = state;
    for (let i = 0; i < keys.length - 1; i++) {
      target = target[keys[i]];
    }
    const finalKey = keys[keys.length - 1];
    
    target[finalKey] = el.value;

    if (path === 'product.ptype') {
      const presets = { leaveon_face: {A:2.0, F:1, RF:1}, leaveon_body: {A:8.0, F:1, RF:1}, rinseoff: {A:10.0, F:1, RF:0.02}, custom: {} };
      Object.assign(state.exp, presets[el.value] || {});
      updateAIDefaults(el.value); // Update AI default DA on ptype change
    } else if (path === 'product.population') {
      const weights = { adult: 60, teen: 50, child: 30, infant: 15 };
      state.exp.BW = weights[el.value] || 60;
    }
    
    saveLocal();
    render();
  }
  
  function updateAIDefaults(ptype) {
      const isLeaveOn = ptype.startsWith('leaveon');
      $('#ai-da').value = isLeaveOn ? 1 : 0.1;
  }

  async function loadCloudData(pifId) {
    if (!pifId) return;
    console.log(`Cloud Sync: Rebuilding data for PIF ID: ${pifId}`);
    try {
        const pifDoc = await getDoc(doc(db, "pifs", pifId));
        if (!pifDoc.exists()) throw new Error(`在雲端找不到 PIF ID 為 ${pifId} 的專案。`);
        
        const cloudData = pifDoc.data();
        const pif01 = cloudData.pif01 || {};
        const pif03 = cloudData.pif03 || {};
        const pif16_cloud = cloudData.pif16;

        // **Rebuild & Graft Logic (v3)**
        // 1. Base product info on pif16_cloud or pif01
        Object.assign(state.product, pif16_cloud?.product || {});
        Object.assign(state.product, pif01); // pif01 has authority on names
        Object.assign(state.exp, pif16_cloud?.exp || {});
        
        // 2. Rebuild rows from pif03 (authoritative recipe)
        if (pif03.recipe && pif03.recipe.length > 0) {
            console.log("Cloud Sync: Rebuilding rows from pif03 recipe.");
            state.rows = pif03.recipe.map(item => {
                // Graft saved pif16 data (NOAEL, DA, note) onto the recipe
                const savedRow = pif16_cloud?.rows?.find(r => r.name === item.inci);
                return {
                    name: item.inci || "",
                    C: item.pct || "", // CORRECTED: from pct
                    NOAEL: savedRow?.NOAEL || "",
                    DA: savedRow?.DA || "100",
                    note: savedRow?.note || ""
                };
            });
        } else {
             state.rows = pif16_cloud?.rows || [{name:"(此PIF無配方，請手動新增)", C:"", NOAEL:"", DA:"100", note:""}];
        }

        // 3. Always prioritize URL parameters for core identity
        const params = new URLSearchParams(window.location.search);
        state.product.pifId = params.get('id') || state.product.pifId;
        // URL params can override productName and companyName for display convenience
        state.product.name = params.get('productName') || state.product.name;
        state.product.brandName = params.get('companyName') || state.product.brandName;

        updateAIDefaults(state.product.ptype); // Also update AI defaults on load
        saveLocal(); 
        render();
        console.log("Cloud Sync: Data rebuilt, grafted, and rendered successfully.");

    } catch (error) {
        console.error("從 Firestore 載入資料時發生錯誤:", error);
        alert(`自動同步雲端資料時發生錯誤：${error.message}`);
    }
  }

  async function saveToCloud() {
    if (!state.product.pifId) return alert("錯誤：缺少 PIF ID，無法儲存至雲端。");
    const btn = $("#save-to-cloud-btn");
    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...`;
    
    try {
      const pifRef = doc(db, "pifs", state.product.pifId);
      await setDoc(pifRef, { 
        pif16: state, 
        lastModified: serverTimestamp() 
      }, { merge: true });
      
      alert("您的 PIF 16 安全評估報告已成功儲存至雲端！");
      localStorage.removeItem(KEY_PREFIX + state.product.pifId);
      localStorage.removeItem(`${KEY_PREFIX}${state.product.pifId}_ts`);
      $("#autosave-hint").textContent = `雲端同步於 ${new Date().toLocaleString()} 完成`;

    } catch (error) {
      console.error("儲存至雲端時發生錯誤:", error);
      alert(`儲存至雲端時發生嚴重錯誤：${error.message}`);
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> 儲存至雲端`;
    }
  }

  function aiFill(){
    const noaelVal = $('#ai-noael').value;
    const daVal = $('#ai-da').value;
    if(!confirm(`AI 輔助將使用以下設定，填入**所有**成分的對應欄位：\n\n- NOAEL: ${noaelVal}\n- 吸收率 (DA%): ${daVal}\n\n此操作會覆蓋現有數值，是否繼續？`)) return;
    
    state.rows.forEach(row => {
        if(row.NOAEL === '') row.NOAEL = noaelVal;
        row.DA = daVal;
    });
    
    saveLocal();
    render();
    alert(`AI 輔助填寫完成！`);
  }

  const KEY_PREFIX="pif16_state_v2.3_";
  function saveLocal(){
    if (!state.product.pifId) return;
    const key = KEY_PREFIX + state.product.pifId;
    try {
      localStorage.setItem(key, JSON.stringify(state));
      localStorage.setItem(`${key}_ts`, String(Date.now()));
       $("#autosave-hint").textContent = `本機草稿於 ${new Date().toLocaleString()} 已自動保存`;
    } catch(e) { console.warn("無法儲存本機草稿。"); }
  }
  
  function loadLocal(pifId){
    if (!pifId) return false;
    const key = KEY_PREFIX + pifId;
    const s = localStorage.getItem(key);
    if(s){
      try {
        const loadedState = JSON.parse(s);
        state = loadedState; // Directly assign loaded state
        console.log(`Loaded local draft for ${pifId}`);
        return true;
      } catch (e) {
        console.error("解析本機草稿時發生錯誤:", e);
        return false;
      }
    }
    return false;
  }

  // --- Main Initialization ---
  (function init(){
    const params = new URLSearchParams(window.location.search);
    const pifId = params.get('id');

    // 1. Load local draft first if it exists. This has the most recent user edits.
    if (pifId) {
      loadLocal(pifId);
    } else {
      // If no pifId, just render the empty state
      updateAIDefaults('leaveon_face');
      render();
      return;
    }
    
    // 2. Authenticate and sync with cloud (which will rebuild and graft data)
    onAuthStateChanged(auth, user => {
      $(".auth-zone").style.display = user ? 'flex' : 'none';
      $("#user-info").textContent = user ? user.email : '';
      if (user) {
          loadCloudData(pifId);
      } else {
          // If not logged in, still render with local + URL data
          const productName = params.get('productName');
          const companyName = params.get('companyName');
          state.product.pifId = pifId;
          if (productName) state.product.name = productName;
          if (companyName) state.product.brandName = companyName;
          if(!state.rows.length) {
            state.rows.push({name:"(請登入以同步雲端配方...)", C:"", NOAEL:"", DA:"100", note:""});
          }
          updateAIDefaults(state.product.ptype);
          render();
      }
    });
    
    // --- Event Listeners ---
    document.addEventListener('input', handleStateChange);
    $("#logout-btn").addEventListener("click", () => signOut(auth));
    $("#save-to-cloud-btn").addEventListener("click", saveToCloud);
    $("#ai-fill-btn").addEventListener("click", aiFill);
    $("#add-row-btn").addEventListener("click", () => {
        state.rows.push({name:"", C:"", NOAEL:"", DA:"100", note:""});
        saveLocal();
        renderTable();
    });
    $("#table-host").addEventListener('click', e => {
      if (e.target.classList.contains('remove-row-btn')) {
        state.rows.splice(e.target.dataset.idx, 1);
        saveLocal();
        renderTable();
      }
    });
  })();
</script>
</body>
</html>
