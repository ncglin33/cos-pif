<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員權限設定 - 步驟 2</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { text-align: center; background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; }
        h1 { color: #1c1e21; margin-bottom: 1rem; }
        p { color: #606770; font-size: 1.1rem; line-height: 1.6; }
        .url-box { 
            background-color: #f5f6f7;
            border: 1px solid #ccd0d5;
            padding: 1rem;
            margin: 2rem 0;
            word-wrap: break-word;
            font-family: "Courier New", Courier, monospace;
            font-size: 1.05rem; 
            text-align: left;
            border-radius: 6px;
        }
        .copy-btn {
            font-size: 1rem;
            padding: .6rem 1.2rem;
            border-radius: .375rem;
            cursor: pointer;
            border: 1px solid #1877f2;
            font-weight: 600;
            background-color: #1877f2;
            color: white;
            transition: background-color .2s;
        }
        .copy-btn:hover { background-color: #166fe5; }
        #copy-feedback { color: #34A853; font-weight: 500; margin-top: 1rem; opacity: 0; transition: opacity .3s; }
    </style>
</head>
<body>
    <div class="container">
        <h1>環境限制，請在新分頁中操作</h1>
        <p>我們發現 IDE 的預覽環境限制了登入功能。請複製下方完整的網址，並在您的瀏覽器中打開一個全新的分頁來完成管理員設定。</p>
        <div id="url-container" class="url-box">正在產生網址...</div>
        <button id="copy-button" class="copy-btn">複製網址</button>
        <div id="copy-feedback">已成功複製！</div>
    </div>
    <script>
        const urlContainer = document.getElementById('url-container');
        const copyButton = document.getElementById('copy-button');
        const copyFeedback = document.getElementById('copy-feedback');

        // Construct the full URL for the admin setup tool page
        const toolUrl = `${window.location.origin}/admin_setup_final.html`;
        urlContainer.textContent = toolUrl;

        copyButton.addEventListener('click', () => {
            navigator.clipboard.writeText(toolUrl).then(() => {
                copyFeedback.style.opacity = 1;
                setTimeout(() => { copyFeedback.style.opacity = 0; }, 2000);
            }, (err) => {
                urlContainer.textContent = '複製失敗，請手動選取並複製。';
            });
        });
    </script>
    
    
</body>
</html>
