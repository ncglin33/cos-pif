<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIF 09-2｜各成分之理化特性 (AI 智慧版)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css">
<style>
  html { scroll-behavior: smooth; }
  body { background-color: #f0f2f5; }
  .container { padding: 1rem; }

  #ai-editor-panel {
    background: #fff; border-radius: 8px; margin-bottom: 2rem; 
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out, padding 0.5s ease-out; padding: 0;
  }
  #ai-editor-panel.open { padding: 1.5rem; max-height: 1000px; }
  #ai-editor-header { font-size: 1.5rem; font-weight: 600; color: #111827; margin-bottom: 1rem; }
  #ai-editor-body { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.25rem; }
  #ai-editor-footer { padding-top: 1.5rem; text-align: right; }

  #cards-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
  .ingredient-card { background: #fff; border: 2px solid transparent; border-radius: 8px; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); display: flex; flex-direction: column; transition: all 0.3s ease; }
  .ingredient-card.editing { border-color: var(--brand); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }

  .card-header h3 { font-size: 1.2rem; }
  .card-header p { font-size: 0.9rem; }
  .card-body { padding: 1rem; flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1rem; }
  .data-point .label { font-weight: 500; }
  .value.no-data { font-style: italic; }
</style>
</head>
<body>

<header class="no-print"><div class="wrap"><h1 id="project-title">PIF 09-2</h1><div class="controls header-right"><div id="user-info"></div><button id="btnSignOut" class="btn btn-danger">登出</button></div></div></header>
<div class="container">
    <header><h2>各成分之物理及化學特性 (AI 智慧版)</h2><p class="subtitle">此工作台將自動比對您的配方，並允許使用 AI 輔助填寫各成分的理化特性。</p></header>
    <div class="toolbar no-print"><a id="back-link" href="#" class="btn"><i class="fa-solid fa-arrow-left"></i> 返回</a><button onclick="window.print()" class="btn"><i class="fa-solid fa-print"></i> 列印</button></div>
    
    <div id="ai-editor-panel">
        <h3 id="ai-editor-header"></h3>
        <div id="ai-editor-body"></div>
        <div id="ai-editor-footer">
            <button id="ai-editor-cancel" class="btn">取消</button>
            <button id="ai-editor-save" class="btn primary">儲存變更</button>
        </div>
    </div>

    <div id="report-container">
        <div id="status-container"><i class="fa-solid fa-spinner fa-spin"></i> 正在準備...</div>
        <div id="cards-container"></div>
    </div>
</div>

<script type="module">
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { db, auth } from './firebase-config.js';

  const $ = sel => document.querySelector(sel);
  const PHYSCHEM_COLLECTION = "physchem_properties";
  let pageContext = {};
  let recipeCache = [];
  let propertiesCache = new Map();
  let currentEditingInci = null;

  const ALL_FIELDS = { 
    state: '外觀狀態', color: '顏色', odor: '氣味',
    solubility_water: '水中溶解度', ph: 'pH 值', melting_point: '熔點 (°C)',
    boiling_point: '沸點 (°C)', flash_point: '閃火點 (°C)', density: '密度 (g/cm³)',
    viscosity: '黏度 (cps)',
  };
  const AI_NO_DATA = "AI 輔助無資料";

  async function main() {
      onAuthStateChanged(auth, user => {
          if (user) initPage(user); 
          else window.location.href = 'login.html';
      });
  }

  function initPage(user) {
    pageContext = setupPageContext();
    setupUI(user, pageContext);
    initializeWorkspace();
  }

  function setupPageContext() {
    const urlParams = new URLSearchParams(window.location.search);
    return { pifId: urlParams.get('id'), companyName: decodeURIComponent(urlParams.get('companyName')||''), productName: decodeURIComponent(urlParams.get('productName')||'') };
  }

  function setupUI(user, context) {
      $('#project-title').textContent = `${context.companyName} - ${context.productName}`;
      $('#user-info').textContent = user.email;
      $('#btnSignOut').addEventListener('click', () => signOut(auth));
      $('#back-link').href = `pifs.html?id=${context.pifId}`;
      $('#ai-editor-cancel').addEventListener('click', closeAiEditor);
      $('#cards-container').addEventListener('click', e => {
          const button = e.target.closest('.btn-ai-edit');
          if (button) openAiEditor({ inci: button.dataset.inci, cas: button.dataset.cas });
      });
  }

  async function initializeWorkspace() {
    showStatus('載入中...');
    await loadPropertiesData();
    const pifDocSnap = await getDoc(doc(db, "pifs", pageContext.pifId));
    if (!pifDocSnap.exists() || !pifDocSnap.data().pif03?.recipe?.length) {
        showStatus('<h3><i class="fa-solid fa-box-open"></i> 缺少 PIF 03 配方</h3><p>請先前往 PIF 03 填寫產品配方，才能在此處編輯各成分的理化特性。</p>', 'error');
        return;
    }
    recipeCache = pifDocSnap.data().pif03.recipe;
    renderIngredientCards(recipeCache);
    showStatus('', 'success');
  }

  async function loadPropertiesData() {
    const querySnapshot = await getDocs(collection(db, PHYSCHEM_COLLECTION));
    querySnapshot.forEach(doc => {
        const data = doc.data();
        if (data.inciName) propertiesCache.set(data.inciName.trim().toLowerCase(), {id: doc.id, ...data});
    });
  }

  function renderIngredientCards(recipe) {
    $('#cards-container').innerHTML = recipe.map(ing => generateCard(ing)).join('');
  }

  function generateCard(ing) {
    const inci = ing.inci || '[未命名]';
    const cas = ing.cas || 'N/A';
    const propData = propertiesCache.get(inci.trim().toLowerCase()) || null;

    return `
    <div class="ingredient-card" data-inci-name="${inci}">
      <div class="card-header"><h3>${inci}</h3><p>CAS: ${cas}</p></div>
      <div class="card-body">
        ${Object.entries(ALL_FIELDS).map(([key, name]) => {
            const value = propData?.[key] || '-';
            return `<div class="data-point"><span class="label">${name}</span><span class="value ${!propData || !value || value === '-' ? 'no-data' : ''}">${value}</span></div>`;
        }).join('')}
      </div>
      <div class="card-footer"><button class="btn btn-ai-edit" data-inci="${inci}" data-cas="${cas}"><i class="fa-solid fa-magic-sparkles"></i> AI 編輯</button></div>
    </div>`;
  }
  
  async function openAiEditor(ingredient) {
    currentEditingInci = ingredient.inci;
    document.querySelectorAll('.ingredient-card.editing').forEach(c => c.classList.remove('editing'));
    const card = $(`div[data-inci-name="${ingredient.inci}"]`);
    if (card) {
        card.classList.add('editing');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    const editorPanel = $('#ai-editor-panel');
    editorPanel.classList.add('open');
    if(window.scrollY > editorPanel.offsetTop) {
        window.scrollTo(0, editorPanel.offsetTop - 20);
    }

    $('#ai-editor-header').textContent = `AI 智慧編輯: ${ingredient.inci}`;
    $('#ai-editor-body').innerHTML = '<div id="ai-editor-loader"><i class="fa-solid fa-spinner fa-spin"></i> AI 正在提供建議...</div>';

    const existingData = propertiesCache.get(ingredient.inci.trim().toLowerCase()) || {};
    const suggestions = await getAiSuggestions(ingredient);
    
    let formHtml = Object.entries(ALL_FIELDS).map(([key, name]) => {
        const value = existingData[key] || suggestions[key] || AI_NO_DATA;
        return `<div class="form-group"><label>${name}</label><input id="ai-field-${key}" value="${value}"></div>`;
    }).join('');
    $('#ai-editor-body').innerHTML = formHtml;

    const saveButton = $('#ai-editor-save');
    const newSaveButton = saveButton.cloneNode(true);
    saveButton.parentNode.replaceChild(newSaveButton, saveButton);
    newSaveButton.addEventListener('click', () => handleSaveAiData(ingredient));
  }
  
  function closeAiEditor() {
    $('#ai-editor-panel').classList.remove('open');
    document.querySelectorAll('.ingredient-card.editing').forEach(c => c.classList.remove('editing'));
    currentEditingInci = null;
  }

  async function handleSaveAiData(ingredient) {
      const saveButton = $('#ai-editor-save');
      saveButton.disabled = true; saveButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
      const newData = { inciName: ingredient.inci, cas: ingredient.cas };
      Object.keys(ALL_FIELDS).forEach(key => newData[key] = $(`#ai-field-${key}`).value.trim());

      try {
          const docId = ingredient.inci.trim().toLowerCase().replace(/[\s/]/g, '_');
          await setDoc(doc(db, PHYSCHEM_COLLECTION, docId), newData);
          propertiesCache.set(ingredient.inci.trim().toLowerCase(), { id: docId, ...newData });
          
          const card = $(`div[data-inci-name="${ingredient.inci}"]`);
          const originalRecipeItem = recipeCache.find(r => r.inci === ingredient.inci);
          if (card && originalRecipeItem) card.outerHTML = generateCard(originalRecipeItem);
          
          closeAiEditor();
          showStatus(`成功更新了 ${ingredient.inci} 的資料！`, 'success');
      } catch (error) {
          alert(`儲存失敗: ${error.message}`);
      } finally {
          saveButton.disabled = false; saveButton.innerHTML = '儲存變更';
      }
  }

  async function getAiSuggestions(ingredient) {
    await new Promise(r => setTimeout(r, 1000));
    const lowerInci = ingredient.inci.toLowerCase();
    const knowledge = {
        'aqua': { state: '液體', color: '無色', odor: '無味', ph: '約 7.0', melting_point: '0', boiling_point: '100', density: '1.0' },
        'butylene glycol': { state: '液體', color: '無色', odor: '無味', boiling_point: '197', density: '1.004', viscosity: '103.9' },
        'glycerin': { state: '黏稠液體', color: '無色', odor: '無味', boiling_point: '290', density: '1.261', viscosity: '1412' },
        'dimethicone': { state: '液體', color: '無色', odor: '無味', density: '0.96-0.97', viscosity: '50-1000' },
        'petrolatum': { state: '半固體', color: '白色/黃色', odor: '無味', melting_point: '38-60', density: '0.815–0.880' },
        'phenoxyethanol': { state: '油狀液體', color: '無色', odor: '輕微玫瑰香', boiling_point: '247', density: '1.102' },
        'ethylhexylglycerin': { state: '液體', color: '無色', odor: '輕微', boiling_point: '160-170 (5 hPa)', density: '0.962' }
    };
    return knowledge[lowerInci] || {};
  }

  function showStatus(message, type='info') {
      const sc = $('#status-container'); 
      sc.innerHTML = message;
      sc.className = `status-message ${type}`;
      sc.style.display = message ? 'block' : 'none';
      if(type === 'success') setTimeout(() => sc.style.display = 'none', 2000);
  }
  main();

</script>
</body>
</html>
