<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIF 附錄 A｜參考文獻與法規依據</title>
<style>
  :root{
    --fg: #111; --muted: #666; --line: #e5e7eb; --brand: #2563eb; 
    --warn-bg: #fffbeb; --warn-fg: #b45309; --warn-border: #fcd34d;
    --ok-bg: #f0fdf4; --ok-fg: #15803d; --ok-border: #a7f3d0;
  }
  body{font-family: ui-sans-serif, system-ui, -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Segoe UI, Roboto, Arial, sans-serif; background: #f9fafb; color: var(--fg); margin: 0;}
  .container{max-width: 1200px; margin: 0 auto; padding: 1.25rem;}
  h1{font-size: 1.5rem; margin-bottom: .5rem;}
  .toolbar{ position: sticky; top: 0; background: rgba(255,255,255,.95); backdrop-filter: blur(4px); z-index: 10; padding: .75rem 1.25rem; border-bottom: 1px solid var(--line); margin: -1.25rem -1.25rem 1.25rem; display: flex; align-items: center; gap: 1rem; }
  button{border: 1px solid var(--line); background: #fff; padding: .5rem .8rem; border-radius: .5rem; cursor: pointer; font-size: .9rem;}
  button.primary{ background: var(--brand); color: #fff; border-color: var(--brand); }
  #status{ text-align: center; padding: 2rem; color: var(--muted); }
  .card { background: #fff; border: 1px solid var(--line); border-radius: .75rem; margin-bottom: 1rem; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); break-inside: avoid; }
  .card-header { padding: .8rem 1.2rem; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .card-header h2 { font-size: 1.1rem; margin: 0; font-weight: 600; }
  .card-body { padding: 1.2rem; }
  .status-tag { display: inline-block; padding: .1rem .5rem; border-radius: .5rem; font-size: .8rem; font-weight: 500; }
  .status-ok { background: var(--ok-bg); color: var(--ok-fg); border: 1px solid var(--ok-border); }
  .status-warn { background: var(--warn-bg); color: var(--warn-fg); border: 1px solid var(--warn-border); }
  .data-section { margin-bottom: 1.5rem; }
  .data-section:last-child { margin-bottom: 0; }
  .data-section h3 { font-size: 1rem; color: var(--brand); border-bottom: 1px solid var(--line); padding-bottom: .3rem; margin: 0 0 .7rem 0; }
  .data-list { list-style: none; padding-left: 0; margin: 0; }
  .data-list li { margin-bottom: .4rem; }
  .data-list .key { font-weight: 500; color: #333; }
  .data-list .value { color: var(--muted); padding-left: .5rem; }
  .no-print { }
  @media print{
    .no-print { display: none; }
    body { background: #fff; }
    .container { max-width: none; padding: 0; }
    .toolbar { display: none; }
    .card { box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>附錄 A｜參考文獻與法規依據</h1>
    <p class="muted">此報告已與您的雲端資料庫即時連動，將根據 PIF 03 的配方，自動查詢並列出各成分的毒理學與法規資料。</p>
  </header>
  
  <div class="toolbar no-print">
    <button onclick="window.location.href='pif03.html'">返回 PIF 03</button>
    <button onclick="window.print()" class="primary">列印 / 匯出 PDF</button>
  </div>

  <div id="report-container">
    <div id="status">正在初始化，請稍候...</div>
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

  const PIF09_KEY = 'pif09_inci_list';
  const $ = sel => document.querySelector(sel);

  const firebaseConfig = {
    apiKey: "AIzaSyCwlaU1as4KQQABJYCfudKCwUt38TbaNek",
    authDomain: "my-pif-64857823-900de.firebaseapp.com",
    projectId: "my-pif-64857823-900de",
    storageBucket: "my-pif-64857823-900de.appspot.com",
    messagingSenderId: "143235873399",
    appId: "1:143235873399:web:536efc772d9c29706c6472"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const dbCollection = collection(db, 'cosmetic_toxics');

  function renderSection(sectionData, title) {
      if (!sectionData || Object.keys(sectionData).length === 0) return '';
      const listItems = Object.entries(sectionData)
        .map(([key, value]) => {
          if (!value) return '';
          return `<li><span class="key">${key}:</span><span class="value">${value}</span></li>`;
        })
        .join('');

      if (!listItems) return '';
      return `
        <div class="data-section">
          <h3>${title}</h3>
          <ul class="data-list">${listItems}</ul>
        </div>
      `;
  }

  async function main() {
    const statusEl = $('#status');
    const containerEl = $('#report-container');

    const inciListJSON = localStorage.getItem(PIF09_KEY);
    if (!inciListJSON) {
      statusEl.innerHTML = '找不到從 PIF 03 傳來的成分列表。<br/>請先回到 <a href="pif03.html">PIF 03</a> 頁面，點擊「產生 PIF 09-2 報告」按鈕。';
      return;
    }

    const inciList = JSON.parse(inciListJSON);
    if (!Array.isArray(inciList) || inciList.length === 0) {
        statusEl.textContent = '成分列表是空的。';
        return;
    }

    statusEl.textContent = `正在從雲端資料庫查詢 ${inciList.length} 種成分的文獻與法規資料...`;
    
    try {
      const q = query(dbCollection, where('identity.inci', 'in', inciList));
      const querySnapshot = await getDocs(q);
      
      const foundData = {};
      querySnapshot.forEach(doc => {
        const data = doc.data();
        if (data.identity && data.identity.inci) {
          foundData[data.identity.inci.toLowerCase()] = data;
        }
      });

      statusEl.style.display = 'none';

      const reportHtml = inciList.map(inci => {
        const data = foundData[inci.toLowerCase()];
        
        let statusHtml, toxicHtml = '', regHtml = '';

        if (data) {
          statusHtml = `<span class="status-tag status-ok">資料庫存在</span>`;
          toxicHtml = renderSection(data.toxicology, '毒理學資料');
          regHtml = renderSection(data.regulatory, '法規依據');

          if(!toxicHtml && !regHtml){
             toxicHtml = '<p class="muted">此成分在資料庫中無毒理學或法規資料。</p>';
          }
        } else {
          statusHtml = `<span class="status-tag status-warn">資料庫中不存在</span>`;
        }

        return `
          <div class="card">
            <div class="card-header">
              <h2>${inci}</h2>
              ${statusHtml}
            </div>
            <div class="card-body">
              ${toxicHtml}
              ${regHtml}
            </div>
          </div>
        `;
      }).join('');

      containerEl.innerHTML = reportHtml;

    } catch (error) {
      console.error("Error fetching data from Firestore:", error);
      statusEl.textContent = '從雲端資料庫讀取資料時發生錯誤。請檢查瀏覽器主控台中的詳細資訊。';
    }
  }

  main();
</script>

</body>
</html>
