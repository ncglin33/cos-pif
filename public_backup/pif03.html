
<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIF 03 全成分名稱及其各別含量</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
:root{--bg:#fff;--ink:#111;--muted:#666;--line:#ddd;--brand:#2563eb;--ok:#16a34a;--warn:#b45309;--err:#dc2626;--accent:#4f46e5;}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC",Helvetica,Arial,sans-serif;color:var(--ink);background-color: #f9fafb;padding:0;line-height:1.5; opacity: 0; transition: opacity 0.4s ease-in-out;}
.app-wrap{max-width:1200px; margin: 0 auto; padding: 24px;}
header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:16px}
h1{font-size:1.5rem;margin:0}
.controls{display:flex;gap:1rem;align-items:center;}
.badge{font-size:.8rem;padding:2px 8px;border-radius:9999px;background:#eef2ff;color:#3730a3}
.toolbar{position:sticky;top:0;background:rgba(249,250,251,.9);backdrop-filter:blur(8px);z-index:10;border-bottom:1px solid var(--line);padding:8px 16px;display:flex;flex-wrap:wrap;gap:8px;}
.btn{padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: var(--ink);}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand);}
.btn.accent{background:var(--accent); color:white; border-color:var(--accent); font-weight:bold;}
button:disabled{opacity:.5;cursor:not-allowed;}
.meta{font-size:.85rem;color:var(--muted)}
.table-wrap{border:1px solid var(--line);border-radius:12px;overflow:hidden; margin-top: 16px; background: #fff; box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
table{width:100%;border-collapse:collapse;table-layout:fixed}
th,td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
th{background:#f8fafc;text-align:left;font-size:.9rem;color:#374151}
tr:hover td{background:#fafafa}
input[type="number"],input[type="text"],textarea{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;background:#fff;font-family:inherit;font-size:14px;transition: all .2s;}
input:focus, textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(37,99,235,.2); outline: none; }
textarea{resize:vertical}
.tfoot{background:#fcfcff}
.sum-ok{color:var(--ok);font-weight:600}
.sum-warn{color:var(--warn);font-weight:600}
.sum-err{color:var(--err);font-weight:700}
.right{margin-left:auto}
.status-bar { padding: 12px 0; display: flex; align-items: center; justify-content: space-between; font-size: .9rem; color: var(--muted); }
.status-light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: #9ca3af; margin-right: 8px; }
.status-light.syncing { background-color: #f59e0b; animation: pulse 1.5s infinite; }
.status-light.synced { background-color: #22c55e; }
.status-light.error { background-color: #ef4444; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
#global-error { text-align: center; padding: 2rem; color: red; }
.drag-handle { cursor: grab; color: #ccc; } .dragging { background: #eef2ff; } 
</style>
</head>
<body>

<div id="app-container" style="display: none;">
    <div class="toolbar no-print">
        <a id="back-link" href="#" class="btn"><i class="fa-solid fa-arrow-left"></i> 返回 PIF 檔案</a>
        <button id="btnSaveChanges" class="btn accent"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存配方至雲端</button>
        <div class="right">
          <div id="user-info" style="display: inline-block; margin-right: 1rem; font-size: .9rem;"></div>
          <button id="btnSignOut" class="btn btn-danger">登出</button>
        </div>
    </div>
    <div class="app-wrap">
        <header>
            <div>
                <h1 id="main-title">03 全成分名稱及其各別含量</h1>
                <div id="project-subtitle" class="meta"></div>
            </div>
            <div><span class="badge">PIF 模組 03</span></div>
        </header>

        <div class="status-bar">
            <div>
                <span id="status-light" class="status-light"></span>
                <span id="status-text">正在初始化...</span>
            </div>
            <div>
                <button id="btnAdd" class="btn"><i class="fa-solid fa-plus"></i> 新增成分</button>
                <button id="btnSort" class="btn"><i class="fa-solid fa-sort-amount-down"></i> 依含量排序</button>
                <label class="btn" for="imp"><i class="fa-solid fa-file-import"></i> 匯入 JSON</label>
                <input id="imp" type="file" accept=".json" hidden>
                <button id="btnExport" class="btn"><i class="fa-solid fa-file-export"></i> 匯出 JSON</button>
            </div>
        </div>

        <div class="table-wrap">
            <table id="tbl">
              <colgroup>
                <col style="width:40px">
                <col style="width:40px">
                <col style="width:25%">
                <col>
                <col style="width:150px">
                <col style="width:150px">
                <col style="width:56px">
              </colgroup>
              <thead>
                <tr><th></th><th>#</th><th>INCI 名稱</th><th>CAS No.</th><th>功能 / 用途</th><th>含量（% w/w）</th><th class="no-print">操作</th></tr>
              </thead>
              <tbody id="rows"></tbody>
              <tfoot>
                <tr class="tfoot"><td></td><td></td><td colspan="3" style="text-align:right; font-weight: bold;">合計（Σ % w/w）</td><td id="sumCell" style="font-weight: bold;">0.0000%</td><td></td></tr>
              </tfoot>
            </table>
        </div>
    </div>
</div>

<div id="global-error"></div>

<script type="module">
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc, setDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { auth, db } from './firebase-config.js';

    const $ = sel => document.querySelector(sel);
    let pifDocRef;
    let ingredients = [];
    let pageContext = {};
    let hasUnsavedChanges = false;

    const status = {
        light: $("#status-light"),
        text: $("#status-text"),
        set: function(state, msg) {
            this.light.className = `status-light ${state}`;
            this.text.textContent = msg;
            if(state === 'synced' || state === 'error'){
                setTimeout(() => this.set('ready', '就緒'), 3000);
            }
        },
        markUnsaved: function(){
            this.set('syncing', '有未儲存的變更');
            hasUnsavedChanges = true;
        }
    };

    function startAuthFlow() {
        onAuthStateChanged(auth, user => {
            if (user) {
                try {
                    pageContext = setupPageContext();
                    pifDocRef = doc(db, 'pifs', pageContext.pifId);
                    setupUIForUser(user);
                    initializeData();
                    $('#app-container').style.display = 'block';
                } catch (e) {
                    $('#global-error').innerHTML = `<strong>啟動錯誤：</strong> ${e.message}。`;
                }
                document.body.style.opacity = '1';
            } else {
                window.location.href = 'login.html';
            }
        });
    }

    function setupPageContext() {
        const urlParams = new URLSearchParams(window.location.search);
        const context = {
            pifId: urlParams.get('id'),
            companyName: decodeURIComponent(urlParams.get('companyName') || ''),
            productName: decodeURIComponent(urlParams.get('productName') || '')
        };
        if (!context.pifId) throw new Error('網址中缺少專案ID');
        return context;
    }
    
    function setupUIForUser(user) {
        $('#user-info').textContent = user.email;
        $('#btnSignOut').addEventListener('click', () => signOut(auth).then(() => window.location.href = 'login.html'));
        const backLinkParams = new URLSearchParams({ id: pageContext.pifId, companyName: pageContext.companyName, productName: pageContext.productName });
        $('#back-link').href = `pifs.html?${backLinkParams.toString()}`;
        $('#project-subtitle').textContent = `${pageContext.companyName} - ${pageContext.productName}`;

        $('#btnAdd').addEventListener('click', addIngredient);
        $('#btnSort').addEventListener('click', sortByPct);
        $('#btnExport').addEventListener('click', exportIngredients);
        $('#imp').addEventListener('change', (e) => importIngredients(e.target.files));
        $('#btnSaveChanges').addEventListener('click', savePif03Data);
        window.addEventListener('beforeunload', (e) => {
            if (hasUnsavedChanges) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    }

    async function initializeData() {
        try {
            status.set('syncing', '正在從雲端讀取配方...');
            const docSnap = await getDoc(pifDocRef);
            if (docSnap.exists() && docSnap.data().pif03 && docSnap.data().pif03.recipe) {
                ingredients = docSnap.data().pif03.recipe.map(item => ({...item, id: crypto.randomUUID()}));
                status.set('synced', '配方讀取成功');
            } else {
                ingredients = [];
                status.set('ready', '尚未建立配方，請新增成分');
            }
            render();
        } catch (err) {
            console.error("Initialization failed: ", err);
            status.set('error', `讀取失敗: ${err.message}`);
        }
    }

    function render() {
        const tbody = $('#rows');
        tbody.innerHTML = '';
        ingredients.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.dataset.id = item.id;
            tr.innerHTML = createRowHtml(item, index + 1);
            tbody.appendChild(tr);
        });
        attachRowListeners();
        updateSum();
    }
    
    function createRowHtml(item, index) {
        return `
            <td class="drag-handle no-print"><i class="fa-solid fa-grip-vertical"></i></td>
            <td>${index}</td>
            <td><textarea class="cell-input" data-field="inci" rows="1" placeholder="例如：Aqua">${item.inci || ''}</textarea></td>
            <td><textarea class="cell-input" data-field="cas" rows="1" placeholder="例如：7732-18-5">${item.cas || ''}</textarea></td>
            <td><textarea class="cell-input" data-field="func" rows="1" placeholder="請依原料實際用途填寫">${item.func || ''}</textarea></td>
            <td><input type="number" class="cell-input" data-field="concentration" min="0" max="100" step="0.0001" value="${(parseFloat(item.concentration) || 0).toFixed(4)}"></td>
            <td class="no-print"><button class="btn del"><i class="fa-solid fa-trash"></i></button></td>
        `;
    }

    function attachRowListeners() {
        $('#rows').querySelectorAll('tr').forEach(tr => {
            const id = tr.dataset.id;
            tr.querySelectorAll('.cell-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const field = e.target.dataset.field;
                    const value = e.target.value;
                    const index = ingredients.findIndex(item => item.id === id);
                    if (index > -1) {
                        ingredients[index][field] = value;
                        updateSum();
                        status.markUnsaved();
                    }
                });
            });
            tr.querySelector('.del').addEventListener('click', () => deleteIngredient(id));
        });
    }

    function addIngredient() {
        const newItem = { id: crypto.randomUUID(), inci: '', cas: '', func: '', concentration: 0 };
        ingredients.push(newItem);
        const tr = document.createElement('tr');
        tr.dataset.id = newItem.id;
        tr.innerHTML = createRowHtml(newItem, ingredients.length);
        $('#rows').appendChild(tr);
        attachRowListeners();
        status.markUnsaved();
    }

    function deleteIngredient(id) {
        if (!confirm('確定要刪除此成分嗎？')) return;
        ingredients = ingredients.filter(item => item.id !== id);
        render();
        status.markUnsaved();
    }
    
    async function savePif03Data() {
        status.set('syncing', '正在儲存配方至雲端...');
        const recipeToSave = ingredients.map(({id, ...rest}) => rest); // Exclude temporary client-side ID
        try {
            await setDoc(pifDocRef, { pif03: { recipe: recipeToSave, lastModified: Timestamp.now() } }, { merge: true });
            status.set('synced', '配方已成功儲存！');
            hasUnsavedChanges = false;
        } catch (err) {
            console.error("Failed to save PIF 03 data: ", err);
            status.set('error', `儲存失敗: ${err.message}`);
        }
    }

    function sortByPct(){
        ingredients.sort((a,b) => (parseFloat(b.concentration) || 0) - (parseFloat(a.concentration) || 0));
        render();
        status.markUnsaved();
    }
    
    function updateSum() {
        let sum = ingredients.reduce((acc, item) => acc + (parseFloat(item.concentration) || 0), 0);
        $('#sumCell').textContent = `${sum.toFixed(4)}%`;
    }

    function exportIngredients() {
        const data = ingredients.map(({id, ...rest}) => rest);
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${pageContext.pifId}_pif03_recipe.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    async function importIngredients(files) {
        if (!files.length) return;
        const file = files[0];
        try {
            const text = await file.text();
            const data = JSON.parse(text);
            if(!Array.isArray(data)) throw new Error("JSON 檔案必須是一個陣列");

            if (!confirm(`即將從檔案匯入 ${data.length} 種成分，這將覆蓋目前的列表。確定嗎？`)) return;
            
            ingredients = data.map(item => ({...item, id: crypto.randomUUID()}));
            render();
            status.markUnsaved();

        } catch (err) {
            alert(`匯入失敗: ${err.message}`);
        } finally {
            $('#imp').value = '';
        }
    }

    startAuthFlow();

</script>
</body>
</html>
