<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PIF 09-1｜產品之物理及化學特性</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
  .container{max-width:1100px;}
  h2{font-size:1.1rem; margin:1rem 0 .5rem}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom: 1rem;}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom: 1rem;}
  .grid{display:grid; grid-template-columns:repeat(12,1fr); gap:12px}
  .col-3{grid-column: span 3}
  .col-6{grid-column: span 6}
  .col-12{grid-column: span 12}
  .label{font-size:.9rem; color:var(--muted); margin-bottom:4px; display: block;}
  @media (max-width: 900px){ .col-3, .col-6 { grid-column: span 6 } }
  @media (max-width: 600px){ .col-3, .col-6 { grid-column: span 12 } }
  .print-only{display:none}
  @media print{ 
    body { font-size: 10px; }
    .noprint{display:none !important} 
    .print-only{display:block} 
    .container { max-width: 100%; padding: 0; }
    h1 { font-size: 1.2rem; }
    .card { border: 1px solid #ccc; padding: 12px; }
  }
</style>
</head>
<body>

<nav-bar></nav-bar>
<top-bar></top-bar>

<div class="container">
  <status-bar></status-bar>

  <div class="toolbar noprint">
    <button id="btnSave" class="primary"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存變更</button>
    <button id="btnAiFill"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 填充 (模擬)</button>
    <button id="btnImportJSON"><i class="fa-solid fa-file-import"></i> 匯入 JSON</button>
    <button id="btnImportCSV"><i class="fa-solid fa-file-csv"></i> 匯入 CSV</button>
    <button id="btnExportJSON"><i class="fa-solid fa-file-export"></i> 匯出 JSON</button>
    <button id="btnPrint"><i class="fa-solid fa-print"></i> 列印 / PDF</button>
  </div>

  <section id="product" class="card">
    <h2>成品物理/化學特性</h2>
    <div class="grid">
      <div class="col-12"><div class="label">產品名稱</div><input id="p_name" type="text" placeholder="請輸入產品名稱" /></div>
      <div class="col-3"><div class="label">外觀 / 顏色</div><input id="p_appearance" type="text" placeholder="例：乳白色乳液狀" /></div>
      <div class="col-3"><div class="label">氣味</div><input id="p_odor" type="text" placeholder="例：淡花香" /></div>
      <div class="col-3"><div class="label">pH (25°C)</div><input id="p_ph" type="text" placeholder="例：5.5 ± 0.3" /></div>
      <div class="col-3"><div class="label">黏度 cP (25°C)</div><input id="p_visc" type="text" placeholder="例：3,000 cP (RV,20rpm)" /></div>
      <div class="col-3"><div class="label">密度 / 比重</div><input id="p_density" type="text" placeholder="例：1.02 g/mL (25°C)" /></div>
      <div class="col-3"><div class="label">折射率 nD</div><input id="p_ri" type="text" placeholder="例：1.335 (25°C)" /></div>
      <div class="col-3"><div class="label">固形物 (%)</div><input id="p_solids" type="number" step="0.01" /></div>
      <div class="col-3"><div class="label">水活性 aw</div><input id="p_aw" type="text" /></div>
      <div class="col-3"><div class="label">粒徑 (如為分散體)</div><input id="p_particle" type="text" placeholder="例：D90 < 5 μm" /></div>
      <div class="col-3"><div class="label">閃點 (如含溶劑)</div><input id="p_fp" type="text" placeholder="例：> 60°C (封閉杯)" /></div>
      <div class="col-6"><div class="label">溶解度 / 相容性</div><textarea id="p_sol" placeholder="例：水可混；乙醇 70% 可混；油相不混"></textarea></div>
      <div class="col-6"><div class="label">穩定性與保存建議</div><textarea id="p_stability" placeholder="例：5~45°C 安定；凍融 3 循環無異常；避光、緊閉保存"></textarea></div>
      <div class="col-12"><div class="label">備註</div><textarea id="p_notes"></textarea></div>
    </div>
  </section>

  <div class="toolbar noprint">
     <button id="btnSave-bottom" class="primary" style="font-size: 1.1rem; padding: .5rem 1.5rem;"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存本頁所有變更</button>
  </div>

  <div id="print-container" class="print-only"></div>

</div>

<script type="module">
import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import "./components.js";

const byId = id => document.getElementById(id);
const safeCall = (tagName, selector, callback) => {
    customElements.whenDefined(tagName).then(() => { const el = document.querySelector(selector); if(el) callback(el); });
};
const showStatus = (message, type, duration) => safeCall('status-bar', 'status-bar', el => el.show(message, type, duration));

let pifId, user, pif_docRef, companyName, productName;
const state = { product: {} };
const fields = ['name', 'appearance', 'odor', 'ph', 'visc', 'density', 'ri', 'solids', 'aw', 'particle', 'fp', 'sol', 'stability', 'notes'];

const initPage = () => {
    const params = new URLSearchParams(window.location.search);
    pifId = params.get("id");
    companyName = params.get("companyName");
    productName = params.get("productName");

    if (!pifId) {
        showStatus("錯誤：URL 中缺少 PIF ID。", "error", -1);
        document.querySelector('.container').innerHTML = '<p class="muted" style="text-align: center; padding: 2rem;">無效的連結，請從主控台重新進入。</p>';
        return;
    }

    // Disable save buttons by default. They will be enabled upon successful login.
    document.querySelectorAll('#btnSave, #btnSave-bottom').forEach(b => b.disabled = true);

    safeCall('top-bar', 'top-bar', el => el.setInfo(pifId, companyName, productName, "09-1 產品物理及化學特性"));
    document.body.addEventListener('logout-request', () => signOut(auth).catch(error => showStatus(`登出失敗: ${error.message}`, 'error')));

    onAuthStateChanged(auth, u => {
        user = u;
        if (user) {
            // User is logged in
            safeCall('top-bar', 'top-bar', el => el.setUser(user));
            pif_docRef = doc(db, 'pifs', pifId);
            document.querySelectorAll('#btnSave, #btnSave-bottom').forEach(b => b.disabled = false);
            loadData();
        } else {
            // User is not logged in
            safeCall('top-bar', 'top-bar', el => el.setUser(null));
            showStatus("您尚未登入，雲端功能（載入/儲存）已停用。", "warning", -1);
            // Pre-fill with basic info since we can't load from cloud
            fields.forEach(f => state.product[f] = '');
            state.product.name = productName; 
            updateForm();
        }
    });
    bindEvents();
};

const loadData = async () => {
    if (!user) return; // Should not happen if called correctly
    showStatus("正在載入資料...", "loading", 0);
    try {
        const pif_snap = await getDoc(pif_docRef);
        const cloudData = pif_snap.exists() ? pif_snap.data()?.pif09_1 : null;
        if (cloudData && cloudData.product) { state.product = cloudData.product; } 
        else { fields.forEach(f => state.product[f] = ''); state.product.name = productName; }
        updateForm();
        showStatus("資料載入完成！", "success");
    } catch (error) { console.error("Load Data:", error); showStatus(`載入失敗: ${error.message}`, "error", -1); }
};

const saveData = async () => {
    if (!user) {
        showStatus("請先登入以儲存您的變更。", "error");
        return;
    }
    showStatus("正在儲存變更...", "loading", 0);
    document.querySelectorAll('#btnSave, #btnSave-bottom').forEach(b => b.disabled = true);
    try {
        updateStateFromForm();
        await setDoc(pif_docRef, { 
            pif09_1: { product: state.product },
            lastModified: serverTimestamp(),
            productName: state.product.name
        }, { merge: true });
        showStatus("所有變更已成功儲存！", "success");
        safeCall('top-bar', 'top-bar', el => el.setInfo(pifId, companyName, state.product.name, "09-1 產品物理及化學特性"));
    } catch (error) { console.error("Save Data:", error); showStatus(`儲存失敗: ${error.message}`, "error", -1); }
    finally { document.querySelectorAll('#btnSave, #btnSave-bottom').forEach(b => b.disabled = false); }
};

const updateForm = () => fields.forEach(key => { const el = byId(`p_${key}`); if(el) el.value = state.product[key] || ''; });
const updateStateFromForm = () => fields.forEach(key => { const el = byId(`p_${key}`); if(el) state.product[key] = el.value; });

// --- Feature Functions (largely unchanged) ---

async function aiFill() {
    const productName = byId('p_name').value.trim();
    if (!productName) return showStatus('請先輸入產品名稱，再使用 AI 填充功能。', 'warning');
    const btn = byId('btnAiFill');
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 查詢中...';
    showStatus('AI 正在查詢建議規格(模擬)... ', 'loading');
    try {
        await new Promise(resolve => setTimeout(resolve, 1000));
        const type = productName.includes('精華') ? 'serum' : productName.includes('霜') ? 'cream' : 'default';
        const mockData = {
            serum: { appearance: '透明凝露狀', ph: '6.0 ± 0.5', visc: '1,500 cP', density: '1.01 g/mL' },
            cream: { appearance: '白色乳霜狀', ph: '5.5 ± 0.5', visc: '8,000 cP', density: '0.98 g/mL' },
            default: { appearance: '乳白色乳液狀', ph: '5.0-7.0', visc: '3,000-15,000 cP' }
        };
        Object.assign(state.product, mockData[type]);
        updateForm();
        showStatus('AI 已填充建議規格 (模擬資料)，請確認後儲存。', 'info');
    } catch (err) { showStatus(`AI 查詢失敗: ${err.message}`, 'error'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> AI 填充 (模擬)'; }
}

function exportJSON() {
    updateStateFromForm();
    const blob = new Blob([JSON.stringify({ product: state.product }, null, 2)], { type: 'application/json;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `pif09-1_${pifId}.json`; a.click(); URL.revokeObjectURL(a.href);
}

function importJSON() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json,application/json';
    input.onchange = () => {
        const file = input.files && input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            try {
                const obj = JSON.parse(String(reader.result || '{}'));
                if (obj.product) { Object.assign(state.product, obj.product); updateForm(); showStatus('JSON 資料已匯入，請檢查後儲存。', 'info'); }
            } catch (err) { showStatus(`JSON 解析失敗: ${err.message}`, 'error'); }
        };
        reader.readAsText(file, 'UTF-8');
    };
    input.click();
}

function parseCSV(text){
    const out=[], row=[]; let cur='', inQ=false, i=0;
    while(i<text.length){
        const c=text[i], next=text[i+1];
        if(inQ){ if(c==='"'&&next==='"'){cur+='"'; i+=2;} else if(c==='"'){inQ=false; i++;} else{cur+=c; i++;} }
        else if(c=== '"'){inQ=true; i++;}
        else if(c===','){row.push(cur.trim()); cur=''; i++;}
        else if(c==='\n'||c==='\r'){ row.push(cur.trim()); out.push([...row]); row.length=0; cur=''; if(c==='\r'&&next==='\n') i++; i++;}
        else{cur+=c; i++;}
    }
    if(cur||row.length) { row.push(cur.trim()); out.push(row); }
    return out.filter(r=>r.some(cell=>cell));
}

function applyCSV(text) {
    const lines = text.split(/\r?\n/);
    if(lines.length > 0 && /^#\s*產品名稱\s*：/.test(lines[0])){
      state.product.name = lines[0].replace(/^#\s*產品名稱\s*：\s*/, '').trim();
    }
    const csvContent = lines[0].startsWith('#') ? lines.slice(1).join('\n') : text;
    const rows = parseCSV(csvContent);
    if(rows.length < 2) throw new Error('CSV 檔案需要包含標頭列與至少一列資料列。');

    const header = rows[0].map(h => h.toLowerCase());
    const dataRow = rows[1];
    const mapping = { name:'產品名稱', appearance:'外觀', odor:'氣味', ph:'ph', visc:'黏度', density:'密度', ri:'折射率', solids:'固形物', aw:'水活性', particle:'粒徑', fp:'閃點', sol:'溶解度', stability:'穩定性', notes:'備註' };

    fields.forEach(key => {
        const colName = mapping[key];
        const index = header.findIndex(h => h.includes(colName));
        if(index !== -1 && dataRow[index] !== undefined) {
            state.product[key] = dataRow[index];
        }
    });
    
    updateForm();
    showStatus('CSV 資料已成功匯入，請檢查後儲存。', 'info');
}

function importCSV() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.csv,text/csv';
    input.onchange = () => {
        const file = input.files && input.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = () => { try { applyCSV(String(reader.result || '')); } catch (err) { showStatus(`CSV 處理失敗: ${err.message}`, 'error'); } };
        reader.readAsText(file, 'UTF-8');
    };
    input.click();
}

function printPage() {
    updateStateFromForm();
    const container = byId('print-container');
    let html = `<h1>PIF 09-1｜產品物理及化學特性</h1><p class="muted">PIF ID: ${pifId}<br>產品名稱: ${state.product.name || '-'}</p><hr><div class="grid">`;
    const labels = { name: '產品名稱', appearance: '外觀 / 顏色', odor: '氣味', ph: 'pH (25°C)', visc: '黏度 cP (25°C)', density: '密度 / 比重', ri: '折射率 nD', solids: '固形物 (%)', aw: '水活性 aw', particle: '粒徑', fp: '閃點', sol: '溶解度 / 相容性', stability: '穩定性與保存建議', notes: '備註' };
    fields.forEach(key => {
      html += `<div class="col-6" style="margin-bottom: 8px;"><div class="label">${labels[key]}</div><div style="font-weight: 500;">${state.product[key] || '-'}</div></div>`;
    });
    container.innerHTML = html + '</div>';
    window.print();
}

function bindEvents() {
    byId('btnSave').addEventListener('click', saveData);
    byId('btnSave-bottom').addEventListener('click', saveData);
    byId('btnAiFill').addEventListener('click', aiFill);
    byId('btnExportJSON').addEventListener('click', exportJSON);
    byId('btnImportJSON').addEventListener('click', importJSON);
    byId('btnImportCSV').addEventListener('click', importCSV);
    byId('btnPrint').addEventListener('click', printPage);
}

initPage();

</script>
</body>
</html>
