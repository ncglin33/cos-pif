<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIF 11｜產品安定性試驗報告</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
  .container { max-width: 1200px; }
  h2 { font-size: 1.1rem; margin: 1rem 0 .5rem; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 1rem; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
  .grid-top { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 1rem; margin-bottom: 1rem; }
  label { font-size: .9rem; color: var(--muted); margin-bottom: 4px; display: block; }
  .meta { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .card h3 { margin: 0 0 .8rem; font-size: 1.05rem; display: flex; justify-content: space-between; align-items: center; }
  .card .body { padding: 0; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid var(--line); padding: .5rem .6rem; font-size: .92rem; vertical-align: top; }
  th { background: #f8fafc; text-align: left; }
  td input, td select, td textarea { width: 100%; border: 1px solid var(--line); border-radius: .4rem; padding: .4rem .5rem; background: #fff; }
  .pass { background: #f0fdf4; }
  .fail { background: #fff1f2; }
  .center { text-align: center; }
  .foot { margin-top: 1rem; color: var(--muted); font-size: .86rem; }
  .sign-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .print-only { display: none; }

  @media print {
    body { font-size: 9px; }
    .noprint { display: none !important; }
    .print-only { display: block; }
    .container { max-width: 100%; padding: 0; }
    h1 { font-size: 1.2rem; }
    .card { border: 1px solid #ccc; padding: 12px; break-inside: avoid; }
    th, td { padding: .3rem .4rem; }
    input, textarea, select { border: none !important; background: transparent !important; }
    .grid-top { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<pif-nav></pif-nav>
<top-bar></top-bar>

<div class="container">
  <status-bar></status-bar>

  <div class="toolbar noprint">
    <button id="btnSave" class="primary"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存變更</button>
    <button id="addCondition"><i class="fa-solid fa-plus"></i> 新增試驗條件</button>
    <button id="addItemToAll"><i class="fa-solid fa-vials"></i> 新增測試項目</button>
    <button id="addTimepointAll"><i class="fa-solid fa-clock"></i> 新增時間點</button>
    <div style="flex-grow:1"></div>
    <button id="btnImportCSV"><i class="fa-solid fa-file-csv"></i> 匯入 CSV</button>
    <button id="btnExportCSV"><i class="fa-solid fa-file-export"></i> 匯出 CSV</button>
    <button id="genAIConclusion"><i class="fa-solid fa-wand-magic-sparkles"></i> AI 總結</button>
    <button id="btnPrint"><i class="fa-solid fa-print"></i> 列印 / PDF</button>
  </div>

  <div class="grid-top">
    <div class="card">
        <div class="meta">
          <div><label>產品名稱</label><input id="productName" type="text" placeholder="請輸入產品名稱"></div>
          <div><label>批號</label><input id="batchNo" type="text" placeholder="例如：A240901"></div>
        </div>
    </div>
    <div class="card">
        <div class="meta">
          <div><label>樣品編號</label><input id="sampleNo" type="text" placeholder="例如：SUN-2025-01"></div>
          <div><label>製造日期</label><input id="mfgDate" type="date"></div>
        </div>
    </div>
  </div>

  <div id="conditionsHost"></div>

  <div class="card">
    <h3>試驗摘要與判定</h3>
    <div class="body">
      <textarea id="summary" rows="5" placeholder="可輸入摘要；或點選「AI 總結」自動生成。"></textarea>
    </div>
  </div>

  <div class="card">
    <h3>檢測與複核</h3>
    <div class="body sign-grid">
      <div>
        <label>檢測人員</label>
        <input id="tester" type="text" placeholder="檢測人員姓名">
      </div>
      <div>
        <label>檢測日期</label>
        <input id="testDate" type="date">
      </div>
      <div>
        <label>複核人員</label>
        <input id="reviewer" type="text" placeholder="複核人員姓名">
      </div>
      <div>
        <label>複核日期</label>
        <input id="reviewDate" type="date">
      </div>
    </div>
  </div>
  
  <div id="print-container" class="print-only"></div>

</div>

<script type="module">
import { auth, db } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import "./components.js";

const $ = sel => document.querySelector(sel);
const byId = id => document.getElementById(id);
const showStatus = (message, type, duration) => customElements.whenDefined('status-bar').then(() => document.querySelector('status-bar').show(message, type, duration));

let pifId, user, pifDocRef, companyName, productName;

const state = {
  product: { name: "", batch: "", sample: "", mfg: "", rpt: "", tester: "", testDate: "", reviewer: "", reviewDate: "" },
  conditions: [],
  summary: ""
};

const metaFields = ["productName", "batchNo", "sampleNo", "mfgDate", "rptDate", "tester", "testDate", "reviewer", "reviewDate"];
const productMap = { productName:"name", batchNo:"batch", sampleNo:"sample", mfgDate:"mfg", rptDate:"rpt", tester:"tester", testDate:"testDate", reviewer:"reviewer", reviewDate:"reviewDate" };

async function initPage() {
    const params = new URLSearchParams(window.location.search);
    pifId = params.get("id");
    companyName = params.get("companyName");
    productName = params.get("productName");

    if (!pifId) {
        showStatus("錯誤：URL 中缺少 PIF ID。", "error", -1);
        $('.container').innerHTML = '<p style="text-align:center; padding: 2rem;">無效的連結，請返回主控台重新進入。</p>';
        return;
    }

    customElements.whenDefined('top-bar').then(el => {
        const topBar = document.querySelector('top-bar');
        topBar.setInfo(pifId, companyName, productName, "11 產品安定性試驗報告");
    });
    
    document.body.addEventListener('logout-request', () => auth.signOut());

    onAuthStateChanged(auth, u => {
        user = u;
        if (user) {
            customElements.whenDefined('top-bar').then(el => document.querySelector('top-bar').setUser(user));
            byId('btnSave').disabled = false;
            pifDocRef = doc(db, 'pifs', pifId);
            loadData();
        } else {
            customElements.whenDefined('top-bar').then(el => document.querySelector('top-bar').setUser(null));
            showStatus("您尚未登入，雲端功能已停用。", "warning", -1);
            byId('btnSave').disabled = true;
            // Load sample data if not logged in
            if (state.conditions.length === 0) seedSampleData();
            render();
        }
    });
    bindEvents();
}

async function loadData() {
    if (!user) return;
    showStatus("正在載入資料...", "loading", 0);
    try {
        const docSnap = await getDoc(pifDocRef);
        if (docSnap.exists() && docSnap.data().pif11) {
            const data = docSnap.data().pif11;
            Object.assign(state.product, data.product || {});
            state.conditions = data.conditions || [];
            state.summary = data.summary || "";
            if (state.conditions.length === 0) seedSampleData();
        } else {
            if (state.conditions.length === 0) seedSampleData();
        }
        state.product.name = productName; // Always sync product name from URL
        render();
        showStatus("資料載入完成！", "success");
    } catch (error) {
        console.error("Load error:", error);
        showStatus(`載入失敗: ${error.message}`, "error", -1);
    }
}

async function saveData() {
    if (!user) {
        showStatus("請先登入才能儲存資料", "error");
        return;
    }
    showStatus("正在儲存變更...", "loading", 0);
    byId('btnSave').disabled = true;
    try {
        // Sync state from form before saving
        syncStateFromUI();
        await setDoc(pifDocRef, { 
            pif11: {
                product: state.product,
                conditions: state.conditions,
                summary: state.summary
            },
            lastModified: serverTimestamp()
        }, { merge: true });
        showStatus("所有變更已成功儲存！", "success");
    } catch (error) {
        console.error("Save error:", error);
        showStatus(`儲存失敗: ${error.message}`, "error", -1);
    } finally {
        byId('btnSave').disabled = false;
    }
}

function syncStateFromUI() {
    metaFields.forEach(id => {
        const key = productMap[id];
        if (key && byId(id)) state.product[key] = byId(id).value;
    });
    state.summary = byId('summary').value;
    // Table data is synced on input events
}

function render() {
    metaFields.forEach(id => {
      const el = byId(id);
      const key = productMap[id];
      if (el && state.product[key] !== undefined) el.value = state.product[key];
    });
    byId('productName').value = productName; // Override with value from URL
    byId('summary').value = state.summary || "";

    const host = byId("conditionsHost");
    host.innerHTML = "";
    state.conditions.forEach((cond, ci) => host.appendChild(renderCondition(cond, ci)));
}

function renderCondition(cond, ci) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <h3>
            <input type="text" value="${cond.name}" oninput="onCondMeta(${ci}, 'name', this.value)" placeholder="試驗條件名稱" style="font-size:1.05rem; font-weight:bold; border:none; background:transparent;">
            <button class="noprint" onclick="window.removeCondition(${ci})"><i class="fa-solid fa-trash-can"></i></button>
        </h3>
        <div class="body">
            <div class="meta" style="margin-bottom:1rem;">
                <div><label>容器/容量</label><input type="text" value="${cond.pack || ''}" oninput="onCondMeta(${ci}, 'pack', this.value)"></div>
                <div><label>備註</label><input type="text" value="${cond.note || ''}" oninput="onCondMeta(${ci}, 'note', this.value)"></div>
            </div>
            <div style="overflow-x:auto;">
                ${renderTableHTML(cond, ci)}
            </div>
        </div>
    `;
    return card;
}

function renderTableHTML(cond, ci) {
    const heads = cond.timepoints.map((t, i) => `<th class="center">${t}</th>`).join("");
    const rows = cond.items.map((it, ri) => {
        const cells = cond.timepoints.map((tp, ti) => {
            const val = it.values[ti] ?? "";
            const isPass = it._pass ? it._pass[ti] : true;
            return `<td class="${val !== '' ? (isPass ? 'pass' : 'fail') : ''}">
                <input id="v-${ci}-${ri}-${ti}" value="${val}" oninput="onItemValueChange(${ci}, ${ri}, ${ti}, this.value)">
            </td>`;
        }).join("");
        const judge = judgeRow(it, cond) ? '合格' : '不合格';
        return `<tr>
            <td><input id="name-${ci}-${ri}" value="${it.name}" oninput="onItemMetaChange(${ci}, ${ri}, 'name', this.value)"></td>
            <td><input id="spec-${ci}-${ri}" value="${it.spec || ''}" placeholder="例: 5.0–6.0" oninput="onItemMetaChange(${ci}, ${ri}, 'spec', this.value)"></td>
            <td><input id="unit-${ci}-${ri}" value="${it.unit || ''}" oninput="onItemMetaChange(${ci}, ${ri}, 'unit', this.value)"></td>
            ${cells}
            <td class="center ${judge === '合格' ? 'pass' : 'fail'}">${judge}</td>
            <td class="center noprint"><button onclick="window.removeItem(${ci}, ${ri})"><i class="fa-solid fa-minus"></i></button></td>
        </tr>`;
    }).join("");

    return `<table>
        <thead><tr><th>測試項目</th><th>規格</th><th>單位</th>${heads}<th>判定</th><th class="noprint">操作</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
}

// --- Logic from original script (adapted) ---
function num(v) { if (v == null) return null; if (typeof v === "number") return v; const s = String(v).trim().replace(/％/g, '%'); if (!s) return null; const s2 = s.replace(/,/g, '.').replace(/[^\\d.\\-]/g, ''); const n = parseFloat(s2); return isNaN(n) ? null : n; }
function buildSpecFn(specText) { if (!specText) return () => true; const s = specText.replace(/\\s+/g, '').replace('％', '%').toUpperCase(); let m = s.match(/^±(\\d+(?:\\.\\d+)?)%VS(T0|T\\w+)$/i); if (m) { const lim = parseFloat(m[1]); const ref = m[2].toUpperCase(); return (value, ctx) => { const base = ctx?.refs?.[ref]; const v = num(value), b = num(base); if (v == null || b == null || b === 0) return false; const diff = Math.abs((v - b) / b) * 100; return diff <= lim + 1e-9; }; } m = s.match(/^(≤|≦|<=)(\\d+(?:\\.\\d+)?)$/); if (m) { const lim = parseFloat(m[2]); return (v) => { const x = num(v); return x != null && x <= lim + 1e-9; }; } m = s.match(/^(≥|≧|>=)(\\d+(?:\\.\\d+)?)$/); if (m) { const lim = parseFloat(m[2]); return (v) => { const x = num(v); return x != null && x >= lim - 1e-9; }; } m = s.match(/^(\-?\\d+(?:\\.\\d+)?)-(\-?\\d+(?:\\.\\d+)?)$/); if (m) { const a = parseFloat(m[1]), b = parseFloat(m[2]); const lo = Math.min(a, b), hi = Math.max(a, b); return (v) => { const x = num(v); return x != null && x >= lo - 1e-9 && x <= hi + 1e-9; }; } if (["無變化", "通過", "不分層"].includes(specText)) { return (v) => String(v || "").includes("無變化") || String(v || "").includes("通過") || String(v || "").includes("不分層"); } return () => true; }
function buildRefsForItem(it, cond) { const refs = {}; cond.timepoints.forEach((tp, ti) => { refs["T" + tp.replace(/[^\\w]/g, '').toUpperCase()] = it.values[ti]; if (tp.toUpperCase() === "T0") refs["T0"] = it.values[ti]; }); if (!("T0" in refs) && cond.timepoints.length > 0) { refs["T0"] = it.values[0]; } return refs; }
function judgeRow(it, cond) { const fn = buildSpecFn((it.spec || "").trim()); const refs = buildRefsForItem(it, cond); it._pass = it._pass || []; let all = true; cond.timepoints.forEach((tp, ti) => { const ok = fn(it.values[ti], { refs }); it._pass[ti] = ok; if (!ok) all = false; }); return all; }
function computeJudgement(cond) { cond.items.forEach(it => judgeRow(it, cond)); }

// --- Event Handlers & Actions ---
window.onCondMeta = (ci, key, value) => { state.conditions[ci][key] = value; };
window.onItemMetaChange = (ci, ri, key, value) => { state.conditions[ci].items[ri][key] = value; computeJudgement(state.conditions[ci]); render(); };
window.onItemValueChange = (ci, ri, ti, value) => { state.conditions[ci].items[ri].values[ti] = value; computeJudgement(state.conditions[ci]); render(); };

window.addCondition = () => { const tp = ["0週", "4週", "8週", "12週"]; const cond = { name: "45℃ 恆溫", pack: "玻璃瓶 50g", note: "避光", timepoints: [...tp], items: sampleItems(tp) }; state.conditions.push(cond); computeJudgement(cond); render(); };
window.removeCondition = (ci) => { if (!confirm("確定刪除此試驗條件？")) return; state.conditions.splice(ci, 1); render(); };
window.addItemToAll = () => { const name = prompt("輸入測試項目名稱："); if (!name) return; state.conditions.forEach(c => { const it = { name, spec: "", unit: "", values: Array(c.timepoints.length).fill("") }; c.items.push(it); computeJudgement(c); }); render(); };
window.addTimepointAll = () => { const tp = prompt("輸入新的時間點名稱："); if (!tp) return; state.conditions.forEach(c => { c.timepoints.push(tp); c.items.forEach(it => it.values.push("")); computeJudgement(c); }); render(); };
window.removeItem = (ci, ri) => { state.conditions[ci].items.splice(ri, 1); computeJudgement(state.conditions[ci]); render(); };

function exportCSV() {
    syncStateFromUI();
    const rows = []; const p = state.product;
    state.conditions.forEach(c => {
        c.items.forEach(it => {
            c.timepoints.forEach((tp, ti) => {
                rows.push({ product: p.name, batch: p.batch, sample: p.sample, mfg: p.mfg, rpt: p.rpt, tester: p.tester, tester_date: p.testDate, reviewer: p.reviewer, review_date: p.reviewDate, condition: c.name, pack: c.pack || "", note: c.note || "", item: it.name, spec: it.spec || "", unit: it.unit || "", timepoint: tp, value: it.values[ti] ?? "", passed: (it._pass && it._pass[ti]) ? "PASS" : "FAIL" });
            });
        });
    });
    const headers = Object.keys(rows[0] || {});
    if (headers.length === 0) {
        showStatus("沒有資料可匯出", "warning");
        return;
    }
    const csvContent = [headers.join(",")].concat(rows.map(r => headers.map(k => {
        const s = String(r[k] ?? "");
        return (s.includes('"') || s.includes(',')) ? `"${s.replace(/"/g, '""')}"` : s;
    }).join(","))).join("\r\n");
    
    const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `pif11_安定性報告_${pifId}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
    showStatus("CSV 檔案已匯出", "success");
}

function genAIConclusion() {
    syncStateFromUI();
    const lines = [];
    state.conditions.forEach(c => {
        const failRows = [];
        c.items.forEach(it => {
            if ((it._pass || []).some(x => x === false)) {
                const which = (it._pass || []).map((ok, i) => ok ? null : c.timepoints[i]).filter(Boolean).join("、");
                failRows.push(`・${it.name} (不符合於: ${which})`);
            }
        });
        if (failRows.length) {
            lines.push(`【${c.name}】有不符合項目：\n` + failRows.join("\n"));
        } else {
            lines.push(`【${c.name}】所有測試項目皆符合規格。`);
        }
    });
    const overallFail = state.conditions.some(c => c.items.some(it => (it._pass || []).some(x => x === false)));
    lines.unshift(`總結：本批樣品於各條件與時點${overallFail ? "部份不符合" : "均符合"}規格。`);
    lines.push(`\n結論：${overallFail ? "建議持續監測或調整配方/製程。" : "可判定安定性良好，符合上市條件。"}`);
    byId("summary").value = lines.join("\n\n");
    state.summary = byId("summary").value;
    showStatus("AI 總結已產生", "info");
}

function printPage() {
    syncStateFromUI();
    let printContent = `<h1>PIF 11｜產品安定性試驗報告</h1>`;
    printContent += `<p>產品名稱: ${state.product.name || '-'}<br>批號: ${state.product.batch || '-'}<br>報告日期: ${state.product.rpt || '-'}</p><hr>`;
    
    state.conditions.forEach(cond => {
        printContent += `<div class="card"><h3>${cond.name}</h3>`;
        printContent += `<p class="small">容器: ${cond.pack || '-'} | 備註: ${cond.note || '-'}</p>`;
        printContent += `<table><thead><tr><th>項目</th><th>規格</th><th>單位</th>${cond.timepoints.map(t => `<th>${t}</th>`).join('')}<th>判定</th></tr></thead><tbody>`;
        cond.items.forEach(item => {
            const judge = judgeRow(item, cond) ? '合格' : '不合格';
            printContent += `<tr>
                <td>${item.name}</td><td>${item.spec}</td><td>${item.unit}</td>
                ${item.values.map(v => `<td>${v ?? ''}</td>`).join('')}
                <td>${judge}</td>
            </tr>`;
        });
        printContent += `</tbody></table></div>`;
    });

    printContent += `<div class="card"><h3>試驗摘要與判定</h3><p>${state.summary.replace(/\\n/g, '<br>') || '無'}</p></div>`;
    printContent += `<div class="card"><h3>檢測與複核</h3>
        <p>檢測人員: ${state.product.tester || '-'} (${state.product.testDate || '-'})</p>
        <p>複核人員: ${state.product.reviewer || '-'} (${state.product.reviewDate || '-'})</p>
    </div>`;

    byId('print-container').innerHTML = printContent;
    window.print();
}

function bindEvents() {
    byId('btnSave').addEventListener('click', saveData);
    byId('addCondition').addEventListener('click', window.addCondition);
    byId('addItemToAll').addEventListener('click', window.addItemToAll);
    byId('addTimepointAll').addEventListener('click', window.addTimepointAll);
    byId('btnExportCSV').addEventListener('click', exportCSV);
byId('genAIConclusion').addEventListener('click', genAIConclusion);
    byId('btnPrint').addEventListener('click', printPage);
    // TODO: CSV Import
}

function seedSampleData() {
    const today = new Date().toISOString().slice(0, 10);
    state.product = { name: productName, batch: "A240901", sample: "SUN-2025-01", mfg: today, rpt: today, tester: "", testDate: today, reviewer: "", reviewDate: "" };
    const TP = ["0週", "4週", "8週", "12週"];
    const c1 = { name: "25℃ 留樣 (實時)", pack: "玻璃瓶 50g", note: "避光", timepoints: [...TP], items: sampleItems(TP) };
    const c2 = { name: "45℃ 加速", pack: "玻璃瓶 50g", note: "恆溫箱", timepoints: [...TP], items: sampleItems(TP) };
    state.conditions = [c1, c2];
    state.conditions.forEach(c => computeJudgement(c));
}
function sampleItems(tp) { const ph = ["5.60", "5.55", "5.52", "5.50"].slice(0, tp.length); const vis = ["4500", "4400", "4300", "4200"].slice(0, tp.length); const pass = Array(tp.length).fill("通過"); const none = Array(tp.length).fill("無變化"); return [{ name: "外觀", spec: "無變化", unit: "—", values: [...none] }, { name: "氣味", spec: "無變化", unit: "—", values: [...none] }, { name: "pH (25℃)", spec: "5.2–6.0", unit: "", values: [...ph] }, { name: "黏度 (mPa·s)", spec: "≥ 3000", unit: "mPa·s", values: [...vis] }]; }

initPage();
</script>
</body>
</html>
