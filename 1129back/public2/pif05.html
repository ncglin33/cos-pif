<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIF 05｜GMP 證明文件</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="./style.css">
<style>
  body { opacity: 0; transition: opacity 0.4s ease-in-out; background-color: #f9fafb; }
  .app-wrap{max-width:1200px; margin: 0 auto; padding: 24px;}
  .status-bar { padding: 12px 0; display: flex; align-items: center; justify-content: space-between; font-size: .9rem; color: var(--muted); }
  .status-light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: #9ca3af; margin-right: 8px; }
  .status-light.syncing { background-color: #f59e0b; animation: pulse 1.5s infinite; }
  .status-light.synced { background-color: #22c55e; }
  .status-light.error { background-color: #ef4444; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  #global-error { text-align: center; padding: 2rem; color: red; }
  
  .attachment-card .row { display:grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap:8px; align-items:end; margin-top: .75rem;}
  .attachment-card .row .col-span-2 { grid-column: span 2; }
  .attachment-card .row .col-span-3 { grid-column: span 3; }
  .attachment-card .row .col-span-4 { grid-column: span 4; }
  .attachment-card .row .col-span-6 { grid-column: span 6; }

  .preview-box { border:1px dashed #cbd5e1; border-radius:8px; padding:8px; min-height:80px; display:flex; align-items:center; justify-content:center; overflow:hidden; background: #fafafa; color: var(--muted);}
  .preview-box img { max-width:100%; max-height:220px; display:block; }
  .help { font-size:.8rem; color:#64748b; }

  #upload-status-pdf { 
      display: none; 
      padding: 0.75rem 1.25rem; 
      margin-top: 1rem; 
      border-radius: 8px; 
      font-weight: 500; 
      text-align: center; 
  }
  .status-info { background-color: #e0e7ff; color: #3730a3; }
  .status-success { background-color: #dcfce7; color: #166534; }
  .status-error { background-color: #fee2e2; color: #991b1b; }
  #upload-status-pdf i { margin-right: 0.5rem; }

  /* 列印優化：隱藏編輯工具，讓基本資料更緊密 */
  @media print {
    body {
      opacity: 1 !important;
      background-color: #ffffff;
    }
    .no-print {
      display: none !important;
    }
    .app-wrap {
      padding: 0 8mm;
    }
    header {
      margin-bottom: 6px;
    }
    .card {
      margin-top: .5rem !important;
      box-shadow: none !important;
    }
    .card .body {
      padding: .5rem .75rem !important;
    }
    .grid-form {
      row-gap: 4px;
      column-gap: 8px;
    }
    .grid-form label {
      margin-bottom: 2px;
      font-size: .85rem;
    }
    .grid-form .cell-input,
    .grid-form textarea {
      padding-top: 2px;
      padding-bottom: 2px;
      font-size: .9rem;
    }
  }
</style>
</head>
<body>

<div id="app-container" style="display: none;">
    <div class="toolbar no-print">
        <a id="back-link" href="#" class="btn"><i class="fa-solid fa-arrow-left"></i> 返回 PIF 檔案</a>
        <button id="btnSaveChanges" class="btn accent"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存變更至雲端</button>
        <div class="right">
          <div id="user-info" style="display: inline-block; margin-right: 1rem; font-size: .9rem;"></div>
          <button id="btnSignOut" class="btn btn-danger">登出</button>
        </div>
    </div>
    <div class="app-wrap">
        <header>
            <div>
                <h1><i class="fa-solid fa-award" style="color:var(--primary-color)"></i> PIF 05｜GMP 證明文件</h1>
                <div id="project-subtitle" class="meta">彙整製造場所符合化妝品 GMP / ISO 22716 等標準之「證明文件」或「聲明書」。</div>
            </div>
            <div><span id="pif-id-badge" class="badge"></span></div>
        </header>

        <!-- 加上 no-print，整列不列印 -->
        <div class="status-bar no-print">
            <div>
                <span id="status-light" class="status-light"></span>
                <span id="status-text">正在初始化...</span>
            </div>
            <div style="display:flex; gap: 0.5rem;">
                <button id="btnAdd" class="btn"><i class="fa-solid fa-plus"></i> 新增附件</button>
                <button id="btnUploadPdf" class="btn"><i class="fa-solid fa-file-arrow-up"></i> 上傳本頁 PDF</button>
                <input type="file" id="pdfUploader" accept="application/pdf" style="display:none;">
                <button onclick="window.print()" class="btn"><i class="fa-solid fa-print"></i> 列印</button>
            </div>
        </div>
        <div id="upload-status-pdf" class="no-print"></div>

        <div class="card" style="margin-top: 1rem;">
            <div class="body">
                 <h2>基本資料（製造場所）</h2>
                  
                  <div class="grid-form">
                    <div>
                      <label>統一編號查詢</label>
                      <div class="input-group">
                        <input id="tax" class="cell-input" data-scope="basic" data-field="tax" placeholder="輸入統一編號後點擊查詢">
                        <button type="button" id="lookup-tax-btn" class="btn no-print">
                          <i class="fa-solid fa-search"></i> 查詢
                        </button>
                      </div>
                      <div class="help">自「廠商資料庫」帶入製造場所名稱與地址</div>
                    </div>
                    <div class="col-2">
                      <label>製造場所名稱</label>
                      <textarea id="siteName" class="cell-input" data-scope="basic" data-field="siteName" rows="2" placeholder="例：XX 生技股份有限公司 第三廠"></textarea>
                    </div>
                    <div>
                      <label>國別/地區</label>
                      <input id="country" class="cell-input" data-scope="basic" data-field="country" placeholder="例：Taiwan">
                    </div>
                    <div class="col-3">
                      <label>製造場所地址</label>
                      <textarea id="address" class="cell-input" data-scope="basic" data-field="address" rows="2" placeholder="例：台南市XXX區XXX路XXX號"></textarea>
                    </div>
                    <div>
                      <label>適用準則 / 標準</label>
                      <input id="standard" class="cell-input" data-scope="basic" data-field="standard" placeholder="例：ISO 22716:2007 或 化妝品 GMP">
                    </div>
                    <div class="col-4">
                      <label>備註</label>
                      <input id="basicNote" class="cell-input" data-scope="basic" data-field="notes" placeholder="（選填）其他補充說明">
                    </div>
                  </div>

            </div>
        </div>

        <h2 style="margin-top: 2rem;">證明文件 / 聲明書</h2>
        <div id="list" style="margin-top:1rem; display: grid; gap: 1.5rem;"></div>
    </div>
</div>

<div id="global-error"></div>

<script type="module">
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, setDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { ref, uploadBytes, getDownloadURL, deleteObject, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
  import { auth, db, storage } from './firebase-config.js';

  const $ = sel => document.querySelector(sel);
  let pifDocRef;
  let state = { basic: {}, attachments: [] };
  let pageContext = {};
  let hasUnsavedChanges = false;

  const status = {
      light: $("#status-light"),
      text: $("#status-text"),
      set: function(state, msg) {
          this.light.className = `status-light ${state}`;
          this.text.textContent = msg;
          if(state === 'synced' || state === 'error'){
              setTimeout(() => this.set('ready', '就緒'), 3000);
          }
      },
      markUnsaved: function(){
          this.set('syncing', '有未儲存的變更');
          hasUnsavedChanges = true;
          $('#btnSaveChanges').disabled = false;
      }
  };

  function startAuthFlow() {
      onAuthStateChanged(auth, user => {
          if (user) {
              try {
                  pageContext = setupPageContext();
                  if (pageContext.companyName && pageContext.productName) {
                    $('#project-subtitle').textContent = `${pageContext.companyName} - ${pageContext.productName}`;
                  }
                  if (pageContext.pifId) {
                      $('#pif-id-badge').textContent = pageContext.pifId;
                  }
                  
                  pifDocRef = doc(db, 'pifs', pageContext.pifId);
                  setupUIForUser(user);
                  initializeData();
                  $('#app-container').style.display = 'block';
              } catch (e) {
                  $('#global-error').innerHTML = `<strong>啟動錯誤：</strong> ${e.message}。`;
              }
              document.body.style.opacity = '1';
          } else {
              window.location.href = 'login.html';
          }
      });
  }

  function setupPageContext() {
      const urlParams = new URLSearchParams(window.location.search);
      const context = { 
          pifId: urlParams.get('id'),
          companyName: urlParams.get('companyName'),
          productName: urlParams.get('productName')
      };
      if (!context.pifId) throw new Error('網址中缺少專案ID');
      return context;
  }

  function setupUIForUser(user) {
      $('#user-info').textContent = user.email;
      $('#btnSignOut').addEventListener('click', () => signOut(auth).then(() => window.location.href = 'login.html'));
      const backLinkParams = new URLSearchParams({ id: pageContext.pifId, companyName: pageContext.companyName, productName: pageContext.productName });
      $('#back-link').href = `pif-i.html?${backLinkParams.toString()}`;

      $('#btnAdd').addEventListener('click', addAttachment);
      $('#btnSaveChanges').addEventListener('click', saveData);
      $('#btnSaveChanges').disabled = true;

      $('#btnUploadPdf').addEventListener('click', () => $('#pdfUploader').click());
      $('#pdfUploader').addEventListener('change', handlePdfUpload);
      
      const lookupTaxBtn = document.getElementById('lookup-tax-btn');
      if (lookupTaxBtn) {
        lookupTaxBtn.addEventListener('click', lookupBasicVendor);
      }

      document.querySelectorAll('.cell-input[data-scope="basic"]').forEach(el => {
        el.addEventListener('input', () => {
            state.basic[el.dataset.field] = el.value;
            status.markUnsaved();
        });
      });

      window.addEventListener('beforeunload', e => {
          if (hasUnsavedChanges) {
              e.preventDefault();
              e.returnValue = '';
          }
      });
  }

  async function initializeData() {
      try {
          status.set('syncing', '正在從雲端讀取資料...');
          const docSnap = await getDoc(pifDocRef);
          if (docSnap.exists()) {
              const cloudData = docSnap.data();
              if (cloudData.pif05) {
                  state.basic = cloudData.pif05.basic || {};
                  state.attachments = (cloudData.pif05.attachments || []).map(item => ({...item, id: 'att_' + crypto.randomUUID()}));
              }
              status.set('synced', '資料讀取成功');
          } else {
             throw new Error("在資料庫中找不到對應的專案文件");
          }
          render();
      } catch (err) {
          console.error("Initialization failed: ", err);
          status.set('error', `讀取失敗: ${err.message}`);
          $('#global-error').textContent = `讀取資料時發生嚴重錯誤: ${err.message}`;
      }
  }

  function render() {
      // Render basic info
      for (const key in state.basic) {
        const el = $(`#${key}`);
        if(el) el.value = state.basic[key];
      }

      // Render attachments
      const listEl = $('#list');
      listEl.innerHTML = '';
      if (!state.attachments || state.attachments.length === 0) {
          listEl.innerHTML = '<div class="card"><div class="body center muted" style="padding: 2rem;">尚未新增任何證明文件</div></div>';
          return;
      }
      state.attachments.forEach(att => addAttachmentToDOM(att));
  }
  
  function addAttachmentToDOM(att) {
    const card = document.createElement('div');
    card.className = 'card attachment-card';
    card.setAttribute('data-id', att.id);

    card.innerHTML =`
      <div class="body">
        <h3>附件：證明文件 / 聲明書</h3>
        <div class="row">
            <div class="col-span-2"><label>本附件標題</label><input class="cell-input" data-field="title" value="${escapeHtml(att.title)}"></div>
            <div class="col-span-4"><label>發證單位</label><textarea class="cell-input" data-field="authority" rows="2">${escapeHtml(att.authority)}</textarea></div>
            <div class="col-span-2"><label>文號 / 證書號</label><input class="cell-input" data-field="docNo" value="${escapeHtml(att.docNo)}"></div>
            <div><label>發證日期</label><input class="cell-input" data-field="issueDate" type="date" value="${att.issueDate || ''}"></div>
            <div><label>有效期限</label><input class="cell-input" data-field="expiryDate" type="date" value="${att.expiryDate || ''}"></div>
            <div class="col-span-2"><label>備註</label><input class="cell-input" data-field="notes" value="${escapeHtml(att.notes)}"></div>
        </div>
        <div class="row">
            <div class="col-span-3 preview-box">尚未上傳檔案</div>
            <!-- 整塊工具區加上 no-print，列印只保留左側預覽 -->
            <div class="col-span-3 no-print">
                <label class="btn primary btn-sm upload-btn no-print" style="display:block; text-align:center;"><i class="fa-solid fa-upload"></i> 上傳檔案 (JPG/PNG/PDF)<input class="file-input" type="file" accept="image/*,.pdf" hidden></label>
                <div class="help" style="margin-top: .5rem">建議 140–200% 以確保列印清晰；列印時版面改為單欄，圖片可放大至頁寬。</div>
                <label>顯示寬度（%）</label>
                <div style="display:flex; gap:8px; align-items:center;">
                    <input class="scale-range-input" type="range" min="20" max="200" step="5" value="${att.scale || 100}">
                    <input class="cell-input" data-field="scale" type="number" min="20" max="200" step="5" value="${att.scale || 100}" style="max-width: 80px;">
                </div>
            </div>
        </div>
      </div>
      <div class="card-footer no-print">
          <span class="filename muted small">${att.filename ? `<i class="fa-solid fa-paperclip"></i> ${escapeHtml(att.filename)}` : ''}</span>
          <button class="btn btn-danger btn-sm delete-btn"><i class="fa-solid fa-trash"></i> 刪除</button>
      </div>`;

    $('#list').appendChild(card);

    card.querySelectorAll('.cell-input:not([data-scope="basic"])').forEach(el => {
        el.addEventListener('input', () => {
            const field = el.dataset.field;
            const attIndex = state.attachments.findIndex(a => a.id === att.id);
            if (attIndex > -1) {
                state.attachments[attIndex][field] = el.value;
                 if(field === 'scale'){
                    const img = card.querySelector('.preview-box img');
                    if(img) img.style.width = el.value + '%';
                    card.querySelector('.scale-range-input').value = el.value;
                }
                status.markUnsaved();
            }
        });
    });
    
    card.querySelector('.scale-range-input').addEventListener('input', (e) => {
        const scaleInput = card.querySelector('input[data-field="scale"]');
        scaleInput.value = e.target.value;
        scaleInput.dispatchEvent(new Event('input'));
    });
    
    card.querySelector('.file-input').addEventListener('change', (e) => handleFileUpload(e, att.id));
    card.querySelector('.delete-btn').addEventListener('click', () => deleteAttachment(att.id));

    renderPreview(card, att);
  }

  async function handleFileUpload(event, attachmentId) {
      const file = event.target.files[0];
      if (!pifDocRef || !file) return;

      const card = $(`[data-id="${attachmentId}"]`);
      const previewBox = card.querySelector('.preview-box');
      previewBox.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 上傳中...`;
      
      const filePath = `pifs/${pageContext.pifId}/pif05/${attachmentId}-${file.name.replace(/[^a-zA-Z0-9_.-]/g, '_')}`;
      const fileRef = ref(storage, filePath);

      try {
          const uploadResult = await uploadBytes(fileRef, file);
          const downloadURL = await getDownloadURL(uploadResult.ref);
          const attIndex = state.attachments.findIndex(a => a.id === attachmentId);
          if (attIndex > -1) {
               const oldStoragePath = state.attachments[attIndex].storagePath;
              if(oldStoragePath && oldStoragePath !== filePath){
                 try { await deleteObject(ref(storage, oldStoragePath)); } catch(e){ console.warn("Could not delete old file", e); }
              }

              state.attachments[attIndex] = {
                  ...state.attachments[attIndex],
                  storagePath: filePath,
                  downloadURL: downloadURL,
                  filename: file.name,
                  fileKind: file.type.startsWith('image/') ? 'image' : 'pdf',
              };
              renderPreview(card, state.attachments[attIndex]);
              status.markUnsaved();
          }
      } catch (error) {
          console.error("Upload failed", error);
          previewBox.innerHTML = `上傳失敗`;
          status.set('error', '檔案上傳失敗');
      }
  }
  
  function renderPreview(card, att) {
      const previewBox = card.querySelector('.preview-box');
      const filenameEl = card.querySelector('.filename');
      
      if (att.downloadURL && att.fileKind === 'image') {
          previewBox.innerHTML = `<a href="${att.downloadURL}" target="_blank"><img src="${att.downloadURL}" alt="${escapeHtml(att.title)}" style="width:${att.scale || 100}%"></a>`;
      } else if (att.downloadURL && att.fileKind === 'pdf') {
          previewBox.innerHTML = `<a href="${att.downloadURL}" target="_blank" class="pdf-placeholder"><i class="fa-solid fa-file-pdf fa-2x"></i><span style="margin-top: .5rem">PDF 文件</span></a>`;
      } else {
          previewBox.innerHTML = `尚未上傳檔案`;
      }
      filenameEl.innerHTML = att.filename ? `<i class="fa-solid fa-paperclip"></i> ${escapeHtml(att.filename)}` : '';
  }

  function addAttachment() {
      const newAtt = {
        id: 'att_' + crypto.randomUUID(),
        title: '', authority: '', docNo: '', issueDate: new Date().toISOString().slice(0,10), expiryDate: '', notes: '',
        fileKind: '', storagePath: null, downloadURL: null, scale: 100, filename: ''
      };
      state.attachments.unshift(newAtt);
      render();
      status.markUnsaved();
  }

  async function deleteAttachment(id) {
    if (!confirm('確定刪除此附件？此操作將在儲存後生效。')) return;
    const attIndex = state.attachments.findIndex(a => a.id === id);
    if(attIndex === -1) return;
    state.attachments.splice(attIndex, 1);
    render();
    status.markUnsaved();
  }

  async function saveData() {
      status.set('syncing', '正在儲存至雲端...');
      $('#btnSaveChanges').disabled = true;

      const dataToSave = {
          basic: state.basic,
          attachments: state.attachments.map(({ id, ...rest }) => rest),
          lastModified: Timestamp.now()
      };
      
      try {
          await setDoc(pifDocRef, { pif05: dataToSave }, { merge: true });
          status.set('synced', '資料已成功儲存！');
          hasUnsavedChanges = false;
      } catch (err) {
          console.error("Failed to save data: ", err);
          status.set('error', `儲存失敗: ${err.message}`);
          $('#btnSaveChanges').disabled = false;
      }
  }

  function handlePdfUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (file.type !== "application/pdf") {
          alert("請僅上傳 PDF 檔案。");
          return;
      }
      uploadMainPdf(file, `pifs/${pageContext.pifId}/05.pdf`);
  }

  function uploadMainPdf(file, storagePath) {
      const uploadTask = uploadBytesResumable(ref(storage, storagePath), file);
      const button = $('#btnUploadPdf');
      button.disabled = true;

      uploadTask.on('state_changed', 
          (snapshot) => {
              const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
              setUploadStatusPdf(`<i class="fa-solid fa-upload"></i> 正在上傳 PDF... ${Math.round(progress)}%`, 'status-info');
          }, 
          (error) => {
              console.error("Main PDF Upload failed:", error);
              setUploadStatusPdf(`<i class="fa-solid fa-triangle-exclamation"></i> PDF 上傳失敗: ${error.code}`, 'status-error');
              button.disabled = false;
          }, 
          () => {
              setUploadStatusPdf('<i class="fa-solid fa-check-circle"></i> 本項 PDF 已成功上傳雲端！PIFs儀表板狀態將會更新。', 'status-success');
              button.disabled = false;
              $('#pdfUploader').value = ''; // Reset file input
              setTimeout(() => setUploadStatusPdf('', 'none'), 5000);
          }
      );
  }

  function setUploadStatusPdf(msg, styleClass) {
      const statusEl = $('#upload-status-pdf');
      if (!msg || styleClass === 'none') {
          statusEl.style.display = 'none';
      } else {
          statusEl.innerHTML = msg;
          statusEl.className = `no-print ${styleClass}`;
          statusEl.style.display = 'block';
      }
  }

  
  async function lookupBasicVendor() {
      const taxIdInput = $('#tax');
      const taxId = (taxIdInput?.value || '').trim();
      if (!taxId) {
          alert('請先輸入統一編號。');
          return;
      }
      const btn = $('#lookup-tax-btn');
      if (!btn) return;

      const originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 查詢中...';

      try {
          const vendorRef = doc(db, 'vendors', taxId);
          const docSnap = await getDoc(vendorRef);
          if (docSnap.exists()) {
              const vendor = docSnap.data();

              const siteNameEl = $('#siteName');
              const addressEl = $('#address');
              const countryEl = $('#country');

              if (siteNameEl) {
                  siteNameEl.value = vendor.companyName || '';
                  state.basic.siteName = siteNameEl.value;
              }
              if (addressEl) {
                  addressEl.value = vendor.address || '';
                  state.basic.address = addressEl.value;
              }
              if (countryEl) {
                  countryEl.value = vendor.country || countryEl.value || 'Taiwan';
                  state.basic.country = countryEl.value;
              }

              state.basic.tax = taxId;
              status.markUnsaved();
              alert('廠商資料已成功帶入！');
          } else {
              alert('在廠商資料庫中找不到此統一編號的資料。');
          }
      } catch (error) {
          console.error("Error looking up vendor for pif05: ", error);
          alert(`查詢時發生錯誤: ${error.message}`);
      } finally {
          btn.disabled = false;
          btn.innerHTML = originalHtml;
      }
  }

const escapeHtml = (str) => {
    return (str || '').replace(/[&<>"']/g, s => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[s]));
  }

  startAuthFlow();
</script>
