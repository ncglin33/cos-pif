<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIF 01-3｜產品基本資料</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="./pif01-3.css">
<style>
  #upload-status-pdf { 
      display: none; 
      padding: 0.75rem 1.25rem; 
      margin-top: 1rem; 
      border-radius: 8px; 
      font-weight: 500; 
      text-align: center; 
  }
  .status-info { background-color: #e0e7ff; color: #3730a3; }
  .status-success { background-color: #dcfce7; color: #166534; }
  .status-error { background-color: #fee2e2; color: #991b1b; }
  #upload-status-pdf i { margin-right: 0.5rem; }
</style>
</head>
<body>

<div id="app-container" style="display: none;">
    <div class="toolbar no-print">
        <a id="back-link" href="#" class="btn"><i class="fa-solid fa-arrow-left"></i> 返回 PIF 列表</a>
        <button id="btnSaveChanges" class="btn primary"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存變更至雲端</button>
        <div class="right">
          <div id="user-info" style="display: inline-block; margin-right: 1rem; font-size: .9rem;"></div>
          <button id="btnSignOut" class="btn danger">登出</button>
        </div>
    </div>
    <div class="app-wrap">
        <header style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1><i class="fa-solid fa-id-card"></i> PIF 01-3｜產品基本資料</h1>
                <div id="project-subtitle" class="text-secondary" style="margin-top: 0.25rem;">此頁面包含產品基本資料與照片。照片的任何變更都需要手動儲存。</div>
            </div>
            <div id="pif-id-badge" class="badge" style="font-size: 1rem; padding: .5rem .8rem; border-radius: .5rem;"></div>
        </header>

        <div class="status-bar">
            <div>
                <span id="status-light" class="status-light"></span>
                <span id="status-text">正在初始化...</span>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button id="btnUploadPdf" class="btn"><i class="fa-solid fa-file-arrow-up"></i> 上傳本頁 PDF</button>
                <input type="file" id="pdfUploader" accept="application/pdf" style="display:none;">
                <button onclick="window.print()" class="btn"><i class="fa-solid fa-print"></i> 列印 / 匯出 PDF</button>
            </div>
        </div>
        <div id="upload-status-pdf" class="no-print"></div>

        <!-- Product Basic Info -->
        <div id="product-info-container"></div>

        <!-- Vendor Info Container -->
        <div class="vendor-info-container">
            <div id="responsible-vendor-container"></div>
            <div id="sites-container"></div>
        </div>

        <!-- Photo Grid -->
        <h2 style="margin-top: 2.5rem; padding-bottom: .5rem; border-bottom: 1px solid #e5e7eb;">產品照片</h2>
        <div id="photo-grid" class="photo-grid">
            <div class="photo-card" data-photo-type="front">
                <h3>① 產品正面照</h3>
                <div class="body"><div class="preview-box"><i class="fa-solid fa-image placeholder-icon"></i><span class="placeholder-text">尚未上傳</span><button class="delete-btn no-print"><i class="fa-solid fa-trash"></i></button></div><label class="btn secondary upload-btn no-print"><i class="fa-solid fa-upload"></i> 選擇或更換檔案<input class="file-input" type="file" accept="image/*" hidden></label></div>
            </div>
            <div class="photo-card" data-photo-type="back">
                <h3>② 產品背面照</h3>
                <div class="body"><div class="preview-box"><i class="fa-solid fa-image placeholder-icon"></i><span class="placeholder-text">尚未上傳</span><button class="delete-btn no-print"><i class="fa-solid fa-trash"></i></button></div><label class="btn secondary upload-btn no-print"><i class="fa-solid fa-upload"></i> 選擇或更換檔案<input class="file-input" type="file" accept="image/*" hidden></label></div>
            </div>
            <div class="photo-card" data-photo-type="box">
                <h3>③ 產品瓶器</h3>
                <div class="body"><div class="preview-box"><i class="fa-solid fa-image placeholder-icon"></i><span class="placeholder-text">尚未上傳</span><button class="delete-btn no-print"><i class="fa-solid fa-trash"></i></button></div><label class="btn secondary upload-btn no-print"><i class="fa-solid fa-upload"></i> 選擇或更換檔案<input class="file-input" type="file" accept="image/*" hidden></label></div>
            </div>
            <div class="photo-card" data-photo-type="other">
                <h3>④ 其他補充照片</h3>
                <div class="body"><div class="preview-box"><i class="fa-solid fa-image placeholder-icon"></i><span class="placeholder-text">尚未上傳</span><button class="delete-btn no-print"><i class="fa-solid fa-trash"></i></button></div><label class="btn secondary upload-btn no-print"><i class="fa-solid fa-upload"></i> 選擇或更換檔案<input class="file-input" type="file" accept="image/*" hidden></label></div>
            </div>
        </div>
    </div>
</div>

<div id="global-error" style="display:none;"></div>

<script type="module">
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, setDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { ref, uploadBytes, getDownloadURL, deleteObject, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
  import { auth, db, storage } from './firebase-config.js';

  const $ = sel => document.querySelector(sel);
  let pifDocRef;
  let state = {}; // Holds pif01_3 photo data
  let pif01State = {}; // Holds pif01 data (用來存備註)
  let pageContext = {};
  let localFiles = {};
  let hasUnsavedChanges = false;

  const status = {
      light: $("#status-light"),
      text: $("#status-text"),
      set: function(state, msg) {
          this.light.className = `status-light ${state}`;
          this.text.textContent = msg;
          $('#btnSaveChanges').disabled = (state === 'syncing');
          if(state === 'synced' || state === 'error'){
              setTimeout(() => this.set('ready', '就緒'), 3000);
          }
      },
      markUnsaved: function() {
          if (hasUnsavedChanges) return;
          this.set('syncing', '有未儲存的變更');
          hasUnsavedChanges = true;
          $('#btnSaveChanges').disabled = false;
      }
  };

  // --- Initialization ---
  function startAuthFlow() {
      onAuthStateChanged(auth, user => {
          if (user) {
              try {
                  pageContext = setupPageContext();
                  pifDocRef = doc(db, 'pifs', pageContext.pifId);
                  setupUIForUser(user);
                  initializeData();
                  $('#app-container').style.display = 'block';
              } catch (e) {
                  $('#global-error').textContent = `啟動錯誤：${e.message}。請確認網址是否正確。`;
                  $('#global-error').style.display = 'block';
              }
          } else {
              window.location.href = `login.html?redirect=${encodeURIComponent(window.location.href)}`;
          }
          document.body.style.opacity = '1';
      });
  }

  function setupPageContext() {
      const urlParams = new URLSearchParams(window.location.search);
      const context = { 
          pifId: urlParams.get('id'),
          companyName: urlParams.get('companyName'),
          productName: urlParams.get('productName')
      };
      if (!context.pifId) throw new Error('網址中缺少專案 ID');
      return context;
  }

  function setupUIForUser(user) {
      $('#user-info').textContent = user.email;
      $('#pif-id-badge').textContent = pageContext.pifId;

      $('#btnSignOut').addEventListener('click', () => signOut(auth));
      
      // Construct the back-link href with URL parameters
      const params = new URLSearchParams({
          id: pageContext.pifId,
          companyName: pageContext.companyName,
          productName: pageContext.productName
      });
      $('#back-link').href = `pif-i.html?${params.toString()}`;

      $('#btnSaveChanges').addEventListener('click', saveData);
      $('#btnSaveChanges').disabled = true;

      $('#btnUploadPdf').addEventListener('click', () => $('#pdfUploader').click());
      $('#pdfUploader').addEventListener('change', handlePdfUpload);

      document.querySelectorAll('.photo-card').forEach(card => {
          const photoType = card.dataset.photoType;
          card.querySelector('.file-input').addEventListener('change', e => handleFileSelection(e, photoType));
          card.querySelector('.delete-btn').addEventListener('click', () => deletePhoto(photoType));
      });

      window.addEventListener('beforeunload', e => {
          if (hasUnsavedChanges) {
              e.preventDefault();
              e.returnValue = '';
          }
      });
  }

  async function initializeData() {
      try {
          status.set('syncing', '正在從雲端讀取資料...');
          const docSnap = await getDoc(pifDocRef);
          if (docSnap.exists()) {
              const cloudData = docSnap.data();
              pif01State = cloudData.pif01 || {};
              renderBasicInfo(pif01State, cloudData);
              state = cloudData.pif01_3 || {};
              renderAllPhotos();
              status.set('synced', '資料讀取成功');
          } else {
             console.warn("在資料庫中找不到對應的專案文件，將會建立新的。");
             pif01State = {};
             status.set('ready', '就緒 (新檔案)');
          }
      } catch (err) {
          console.error("Initialization failed: ", err);
          status.set('error', `讀取失敗: ${err.message}`);
      }
  }
  
  // --- Rendering (Final, Compatible Version) ---
  function renderBasicInfo(pif01Data, rootData) {
      const escape = str => str ? String(str).replace(/[&<>"'/]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[s]) : '—';
      
      // 1. Basic Product Info
      const productName = rootData.productName || pif01Data.basic?.name;
      const productNameEn = rootData.productNameEn || pif01Data.basic?.productNameEn; // Correctly get English name
      const weight = pif01Data.basic?.weight;
      const category = pif01Data.basic?.category;
      const form = pif01Data.basic?.form;
      const remarks = pif01Data.basic?.remarks;

      const productInfoContainer = $('#product-info-container');
      productInfoContainer.innerHTML = `
        <div class="info-card">
            <div class="info-grid">
                <div><label>產品中文名稱</label><div class="value">${escape(productName)}</div></div>
                <div><label>產品英文名稱</label><div class="value">${escape(productNameEn)}</div></div>
                <div><label>重量</label><div class="value">${escape(weight)}</div></div>
                <div><label>產品類別</label><div class="value">${escape(category)}</div></div>
                <div><label>產品形式</label><div class="value">${escape(form)}</div></div>
                <div style="grid-column: 1 / -1;">
                    <label>備註</label>
                    <div class="value multiline" id="remarks-field" contenteditable="true">${escape(remarks)}</div>
                </div>
            </div>
        </div>
      `;

      // 備註欄位：可編輯，寫回 pif01State.basic.remarks
      const remarksEl = document.getElementById('remarks-field');
      if (remarksEl) {
          remarksEl.addEventListener('input', () => {
              if (!pif01State.basic) pif01State.basic = {};
              pif01State.basic.remarks = remarksEl.innerText.trim();
              status.markUnsaved();
          });
      }

      const createField = (label, value) => {
          if (!value || String(value).trim() === '') return '';
          return `<div class="vendor-field"><span class="label">${escape(label)}</span><span class="value">${escape(value)}</span></div>`;
      };

      // 2. Responsible Vendor (Maker)
      const maker = pif01Data.maker;
      const respVendorContainer = $('#responsible-vendor-container');
      if (maker) {
          respVendorContainer.innerHTML = `
              <div class="vendor-block">
                  <h3 class="vendor-block-title"><i class="fa-solid fa-user-tie"></i> 責任業者</h3>
                  <div class="vendor-details-grid">
                      ${createField('名稱', maker.name || maker.companyName)}
                      ${createField('地址', maker.addr)}
                      ${createField('電話', maker.tel)}
                      ${createField('統一編號', maker.tax)}
                  </div>
              </div>
          `;
      }

      // 3. Manufacturing and Packaging Sites
      const sitesContainer = $('#sites-container');
      let sitesHtml = '';
      const mfgSites = pif01Data.mfg || [];
      const pkgSites = pif01Data.pkg || [];

      const createSiteItem = (site, title) => {
          if (!site) return '';
          return `
              <div class="vendor-list-item">
                  <h4 class="vendor-list-item-title">${escape(title)}</h4>
                  <div class="vendor-details-grid">
                      ${createField('名稱', site.name || site.companyName)}
                      ${createField('地址', site.addr)}
                      ${createField('國別', site.country)}
                      ${createField('統一編號', site.taxId)}
                  </div>
              </div>
          `;
      };

      if (mfgSites.length > 0 || pkgSites.length > 0) {
          sitesHtml += '<div class="vendor-block">';
          sitesHtml += '<h3 class="vendor-block-title"><i class="fa-solid fa-industry"></i> 製造 / 包裝場所</h3>';
          
          mfgSites.forEach((site, index) => {
              sitesHtml += createSiteItem(site, `製造場所 #${index + 1}`);
          });

          pkgSites.forEach((site, index) => {
              sitesHtml += createSiteItem(site, `包裝場所 #${index + 1}`);
          });
          
          sitesHtml += '</div>';
      }
      sitesContainer.innerHTML = sitesHtml;

      const companyName = rootData.companyName || pageContext.companyName || '';
      $('#project-subtitle').textContent = `${companyName} - ${productName || '產品資料'}`;
  }


  function renderAllPhotos() {
      document.querySelectorAll('.photo-card').forEach(card => {
          const photoType = card.dataset.photoType;
          renderPhotoCard(photoType);
      });
  }

  function renderPhotoCard(photoType) {
      const card = $(`[data-photo-type="${photoType}"]`);
      if (!card) return;
      
      const previewBox = card.querySelector('.preview-box');
      const deleteBtn = card.querySelector('.delete-btn');
      const photoData = state[photoType];

      if (photoData && photoData.downloadURL) {
          previewBox.innerHTML = `<img src="${photoData.downloadURL}" alt="${photoType}">`;
          previewBox.appendChild(deleteBtn);
          deleteBtn.style.display = 'none'; 
      } else {
          previewBox.innerHTML = `
              <i class="fa-solid fa-image placeholder-icon"></i>
              <span class="placeholder-text">尚未上傳</span>
          `;
           previewBox.appendChild(deleteBtn);
      }
  }

  // --- Actions & Event Handlers ---
  function handleFileSelection(event, photoType) {
      const file = event.target.files[0];
      if (!file) return;

      localFiles[photoType] = file;
      
      const previewUrl = URL.createObjectURL(file);
      const card = $(`[data-photo-type="${photoType}"]`);
      const previewBox = card.querySelector('.preview-box');
      const deleteBtn = card.querySelector('.delete-btn');
      previewBox.innerHTML = `<img src="${previewUrl}" alt="Local preview">`;
      previewBox.appendChild(deleteBtn);

      status.markUnsaved();
  }

  function deletePhoto(photoType) {
      if (!confirm(`確定要刪除「${photoType}」照片嗎？\n此操作需要儲存後才會同步至雲端。`)) return;

      state[photoType] = { _deleted: true }; 
      localFiles[photoType] = { _deleted: true };

      const card = $(`[data-photo-type="${photoType}"]`);
      const previewBox = card.querySelector('.preview-box');
      const deleteBtn = card.querySelector('.delete-btn');
      previewBox.innerHTML = `
          <i class="fa-solid fa-image placeholder-icon"></i>
          <span class="placeholder-text">已標示為刪除</span>
      `;
      previewBox.appendChild(deleteBtn);

      status.markUnsaved();
  }
  
  async function saveData() {
      status.set('syncing', '正在儲存至雲端...');
      
      for (const photoType in localFiles) {
          const file = localFiles[photoType];
          
          if (file._deleted) {
              const oldStoragePath = state[photoType]?.storagePath;
              if (oldStoragePath) {
                  try {
                      await deleteObject(ref(storage, oldStoragePath));
                  } catch (e) {
                      console.warn(`Could not delete old file ${oldStoragePath}:`, e);
                  }
              }
              delete state[photoType];
          } else {
              const filePath = `pifs/${pageContext.pifId}/pif01-3/${photoType}-${file.name}`;
              const fileRef = ref(storage, filePath);
              
              try {
                  const uploadResult = await uploadBytes(fileRef, file);
                  const downloadURL = await getDownloadURL(uploadResult.ref);
                  
                  const oldStoragePath = state[photoType]?.storagePath;
                  if (oldStoragePath && oldStoragePath !== filePath) {
                      try { await deleteObject(ref(storage, oldStoragePath)); } catch (e) { console.warn("Could not delete old file:", e); }
                  }

                  state[photoType] = {
                      downloadURL: downloadURL,
                      storagePath: filePath,
                      filename: file.name,
                      lastModified: Timestamp.now()
                  };
              } catch (err) {
                  status.set('error', `檔案 ${file.name} 上傳失敗: ${err.message}`);
                  console.error("Upload failed:", err);
                  return;
              }
          }
      }

      // 同時儲存 pif01_3（照片）與 pif01（含備註）
      const payload = { pif01_3: state };
      if (pif01State && Object.keys(pif01State).length > 0) {
          payload.pif01 = pif01State;
      }

      try {
          await setDoc(pifDocRef, payload, { merge: true });
          status.set('synced', '資料已成功儲存！');
          hasUnsavedChanges = false;
          localFiles = {};
          initializeData(); 
      } catch (err) {
          status.set('error', `資料庫儲存失敗: ${err.message}`);
          console.error("Firestore save failed: ", err);
      }
  }

  function handlePdfUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (file.type !== "application/pdf") {
          alert("請僅上傳 PDF 檔案。");
          return;
      }
      uploadPdf(file, `pifs/${pageContext.pifId}/01-3.pdf`);
  }

  function uploadPdf(file, storagePath) {
      const uploadTask = uploadBytesResumable(ref(storage, storagePath), file);
      const button = $('#btnUploadPdf');
      button.disabled = true;

      uploadTask.on('state_changed', 
          (snapshot) => {
              const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
              setUploadStatusPdf(`<i class="fa-solid fa-upload"></i> 正在上傳 PDF... ${Math.round(progress)}%`, 'status-info');
          }, 
          (error) => {
              console.error("PDF Upload failed:", error);
              setUploadStatusPdf(`<i class="fa-solid fa-triangle-exclamation"></i> PDF 上傳失敗: ${error.code}`, 'status-error');
              button.disabled = false;
          }, 
          () => {
              setUploadStatusPdf('<i class="fa-solid fa-check-circle"></i> PDF 已成功上傳！儀表板狀態將會更新。', 'status-success');
              button.disabled = false;
              $('#pdfUploader').value = ''; // Reset file input
              setTimeout(() => setUploadStatusPdf('', 'none'), 5000);
          }
      );
  }

  function setUploadStatusPdf(msg, styleClass) {
      const statusEl = $('#upload-status-pdf');
      if (!msg || styleClass === 'none') {
          statusEl.style.display = 'none';
      } else {
          statusEl.innerHTML = msg;
          statusEl.className = `no-print ${styleClass}`;
          statusEl.style.display = 'block';
      }
  }

  startAuthFlow();
</script>
</body>
</html>
