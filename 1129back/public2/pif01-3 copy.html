
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PIF 01 產品基本資料</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>
:root{--bg:#fff;--ink:#111;--muted:#666;--line:#e2e8f0;--brand:#2563eb;--danger:#dc2626;}
*{box-sizing:border-box}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC",Helvetica,Arial,sans-serif;color:var(--ink);background-color:#f8fafc;padding:0;line-height:1.6; opacity: 0; transition: opacity 0.4s ease-in-out;}
.app-wrap{max-width:900px; margin: 24px auto;}
.toolbar{position:sticky;top:0;background:rgba(248,250,252,.9);backdrop-filter:blur(4px);z-index:10;border-bottom:1px solid var(--line);padding:8px;margin-bottom:24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;}
.btn{padding:8px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: var(--ink);}
.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand);}
.btn.danger{background:var(--danger);color:#fff;border-color:var(--danger);}

/* --- Base Cover Styles --- */
.cover-page-container { background: #fff; padding: 40px; border: 1px solid var(--line); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); position: relative; }
.cover-page { min-height: 1050px; display: flex; flex-direction: column; }
.cover-title { font-size: 2.2rem; font-weight: bold; text-align: center; margin: 20px 0 40px 0; border-bottom: 2px solid var(--ink); padding-bottom: 16px;}
.section{margin-bottom: 24px;}
.section-title{font-size:1.0rem;font-weight:700;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:16px;}
.info-grid{display:grid;grid-template-columns:120px 1fr;gap:12px;font-size:1.0rem;}
.info-grid dt{font-weight:bold;color:var(--muted);}
#loading-spinner { font-size: 2rem; text-align: center; padding: 4rem; color: var(--muted); }

/* --- Photo Upload Styles --- */
#photo-upload-area { text-align: center; border: 2px dashed var(--line); padding: 40px; border-radius: 10px; background-color: #f8fafc; }
#photo-preview-container { margin-bottom: 20px; min-height: 200px; display: flex; justify-content: center; align-items: center; }
#photo-preview { max-width: 100%; max-height: 400px; display: none; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
#photo-placeholder { color: var(--muted); }
#upload-status { margin-top: 10px; font-size: 0.9rem; }


@media print {
    @page { size: A4; margin: 20mm; }
    body { background-color: #fff; padding: 0; margin: 0; }
    .app-wrap { max-width: 100%; margin: 0; }
    .toolbar, .no-print { display: none !important; }
    .cover-page-container { border: none; box-shadow: none; padding: 0; }
    .cover-page { min-height: 0; page-break-after: always; }
    #photo-upload-area { border: 1px solid var(--line); background-color: #fff; }
}
</style>
</head>
<body>

<div id="app-container" style="display: none;">
    <div class="app-wrap">
        <div class="toolbar no-print">
            <a id="back-link" href="pifs.html" class="btn"><i class="fa-solid fa-arrow-left"></i> 返回專案儀表板</a>
            <div style="display: flex; gap: 8px; align-items: center; margin-left: auto;">
                <button id="btnPrint" class="btn primary"><i class="fa-solid fa-print"></i> 列印</button>
            </div>
        </div>

        <div id="preview-container" class="cover-page-container">
            <div id="cover-page" class="cover-page">
                <div id="loading-spinner">
                    <i class="fa-solid fa-spinner fa-spin"></i> 正在載入資料...
                </div>
                <div id="cover-content" style="display: none; flex-direction: column; flex-grow: 1;">
                    <h1 class="cover-title">產品基本資料</h1>
                    
                    <div class="section">
                        <dl class="info-grid">
                            <dt>公司名稱</dt><dd id="info-companyName"></dd>
                            <dt>產品名稱</dt><dd id="info-productName"></dd>
                            <dt>PIF ID</dt><dd id="info-pifId"></dd>
                        </dl>
                    </div>

                    <div class="section">
                        <h2 class="section-title">產品照片上傳</h2>
                        <div id="photo-upload-area">
                            <div id="photo-preview-container">
                                 <img id="photo-preview" src="" alt="產品照片預覽">
                                 <p id="photo-placeholder">尚未上傳照片</p>
                            </div>
                            <input type="file" id="photo-input" accept="image/*" style="display: none;">
                            <button id="btnUploadPhoto" class="btn primary no-print"><i class="fa-solid fa-upload"></i> 選擇並上傳照片</button>
                            <button id="btnDeletePhoto" class="btn danger no-print" style="display: none;"><i class="fa-solid fa-trash"></i> 刪除照片</button>
                            <p id="upload-status"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
    import { auth, db, storage } from './firebase-config.js';

    const $ = sel => document.querySelector(sel);
    
    let pifId = null;
    let currentPifData = null;

    function startApp() {
        onAuthStateChanged(auth, user => {
            if (user) {
                $('#app-container').style.display = 'block';
                document.body.style.opacity = '1';
                initializePage().catch(handlePageError);
            } else {
                window.location.href = 'login.html';
            }
        });
    }

    async function initializePage() {
        const urlParams = new URLSearchParams(window.location.search);
        pifId = urlParams.get('id');
        if (!pifId) throw new Error("網址中缺少 PIF ID。");

        const backLinkParams = new URLSearchParams({ id: pifId, companyName: urlParams.get('companyName'), productName: urlParams.get('productName') });
        $('#back-link').href = `pifs.html?${backLinkParams.toString()}`;

        const docRef = doc(db, 'pifs', pifId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) throw new Error(`在資料庫中找不到 PIF 專案 (ID: ${pifId})`);
        
        currentPifData = docSnap.data();
        renderPage(currentPifData);

        $('#loading-spinner').style.display = 'none';
        $('#cover-content').style.display = 'flex';

        setupEventListeners();
    }
    
    function renderPage(pifData) {
        $('#info-companyName').textContent = pifData.companyName || '-';
        $('#info-productName').textContent = pifData.productName || '-';
        $('#info-pifId').textContent = pifData.pifId || '-';

        const photoURL = pifData.pif01p?.photoURL;
        updatePhotoPreview(photoURL);
    }

    function updatePhotoPreview(photoURL) {
        const preview = $('#photo-preview');
        const placeholder = $('#photo-placeholder');
        const btnDelete = $('#btnDeletePhoto');
        if (photoURL) {
            preview.src = photoURL;
            preview.style.display = 'block';
            placeholder.style.display = 'none';
            btnDelete.style.display = 'inline-flex';
        } else {
            preview.src = '';
            preview.style.display = 'none';
            placeholder.style.display = 'block';
            btnDelete.style.display = 'none';
        }
    }

    function setupEventListeners() {
        $('#btnPrint').addEventListener('click', () => window.print());
        $('#btnUploadPhoto').addEventListener('click', () => $('#photo-input').click());
        $('#photo-input').addEventListener('change', handleFileUpload);
        $('#btnDeletePhoto').addEventListener('click', handleFileDelete);
    }
    
    async function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        const statusEl = $('#upload-status');
        const storageRef = ref(storage, `pifs/${pifId}/product_photo`);
        
        statusEl.textContent = '上傳中...';
        statusEl.style.color = 'var(--ink)';

        try {
            const uploadTask = uploadBytesResumable(storageRef, file);
            await uploadTask;
            
            const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
            await updateDoc(doc(db, 'pifs', pifId), {
                'pif01p.photoURL': downloadURL
            });

            updatePhotoPreview(downloadURL);
            statusEl.textContent = '照片上傳成功！';
            statusEl.style.color = 'var(--brand)';

        } catch (error) {
            console.error("Upload failed:", error);
            statusEl.textContent = `上傳失敗: ${error.message}`;
            statusEl.style.color = 'var(--danger)';
        } finally {
            e.target.value = ''; // Reset file input
        }
    }

    async function handleFileDelete() {
        if (!confirm('您確定要刪除這張產品照片嗎？此操作無法復原。')) return;

        const statusEl = $('#upload-status');
        const storageRef = ref(storage, `pifs/${pifId}/product_photo`);
        statusEl.textContent = '刪除中...';

        try {
            await deleteObject(storageRef);
            await updateDoc(doc(db, 'pifs', pifId), {
                'pif01p.photoURL': null
            });
            
            updatePhotoPreview(null);
            statusEl.textContent = '照片已成功刪除。';
            statusEl.style.color = 'var(--ink)';
        } catch (error) {
            console.error("Deletion failed:", error);
            statusEl.textContent = `刪除失敗: ${error.message}`;
            statusEl.style.color = 'var(--danger)';
        }
    }

    function handlePageError(err) {
        console.error("Page failed to load:", err);
        $('#loading-spinner').innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> 載入失敗: ${err.message}`;
        $('#loading-spinner').style.color = 'var(--danger)';
    }

    startApp();
</script>
</body>
</html>
