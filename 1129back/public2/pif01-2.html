<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>產品資訊檔案(PIF)目錄</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            background-color: #f8f9fa;
        }
        .main-content {
            padding: 2rem;
            max-width: 1400px;
            margin: 2rem auto;
        }
        .page-header {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
        }
        .page-title-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color, #6d28d9);
            margin: 0;
        }
        .page-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .project-info { font-size: 0.95rem; color: #495057; }
        .project-info strong { color: #343a40; }
        .info-item { margin-bottom: 0.5rem; }
        .info-item i { margin-right: 8px; color: #868e96; width: 20px; text-align: center; }
        .form-section {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color, #6d28d9);
            margin-bottom: 1.5rem;
        }

        #cloud-status {
            display: none;
            margin: -1.5rem 0 1.5rem 0;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-weight: 500;
            text-align: center;
        }
        .status-info { background-color: #e0e7ff; color: #3730a3; }
        .status-success { background-color: #dcfce7; color: #166534; }
        .status-error { background-color: #fee2e2; color: #991b1b; }
        #cloud-status i { margin-right: 0.5rem; }

        @media print {
            header.no-print, .page-actions, .no-print, #pif0-root .toolbar, #pif0-root .del {
                display: none !important;
            }
            body { background-color: #fff; }
            .main-content { padding: 0; margin: 0; max-width: 100%; }
            .page-header { 
                box-shadow: none; 
                border-radius: 0; 
                border-bottom: 1px solid #dee2e6; 
                padding: 0 0 1rem 0;
                margin-bottom: 1.5rem;
            }
            .page-title-section { border-bottom: none; margin-bottom: 0.5rem; padding-bottom: 0; }
            .form-section { box-shadow: none; border: none; margin: 0; padding: 0; }
            @page { size: A4; margin: 1.5cm; }
        }
        
        #pif0-root { margin-top: 1.5rem; font-family: "Noto Serif TC", "Songti TC", PMingLiU, serif; }
        #pif0-root .toolbar button { border-radius: 12px; padding: 6px 12px; }
        #pif0-root .paper { max-width: 900px; margin: 0 auto 1.5rem; box-shadow: 0 6px 18px rgba(0,0,0,0.06); }
        #pif0-root .toc .row { display: grid; grid-template-columns: auto minmax(0, 1fr) minmax(80px, auto) auto; column-gap: 12px; align-items: center; padding: 4px 8px; border-top: 1px dotted #dee2e6; }
        #pif0-root .toc .row:first-child { border-top: none; }
        #pif0-root .toc .num { min-width: 3rem; }
        #pif0-root .toc .leader { border-bottom: 1px dotted #999; }
        #pif0-root .toc .page { text-align: right; min-width: 2.5rem; }
        #pif0-root .toc .del { margin-left: 4px; padding: 2px 10px; font-size: 0.85rem; border-radius: 999px; }

        /* 新增：目錄標題置中 */
        #pif0-root .title {
            text-align: center;
        }

        /* 新增：頁次標頭對齊到頁碼欄位上方 */
        #pif0-root .right-head {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) minmax(80px, auto) auto;
            column-gap: 12px;
            margin: 0 8px 4px 8px;
            font-size: 0.95rem;
        }
        #pif0-root .right-head span {
            grid-column: 4 / 5;
            text-align: right;
        }
    </style>
</head>
<body>

    <header class="no-print">
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><i class="fa-solid fa-shield-halved"></i> CosPIF</a>
                <ul class="nav-links">
                    <li><a href="pif-i.html">我的PIF</a></li>
                    <li><a href="vendors.html">廠商資料庫</a></li>
                </ul>
                <div class="nav-actions" style="display: flex; align-items: center;">
                    <span id="user-info" style="margin-right: 1.5rem; color: var(--text-muted);"></span>
                    <button id="btnSignOut" class="btn-login btn-danger no-print">登出</button>
                </div>
            </nav>
        </div>
    </header>

<div id="app-container" style="display: none;">
    <div class="main-content">
        <div class="page-header">
            <div class="page-title-section">
                 <h1 class="page-title">產品資訊檔案(PIF)目錄</h1>
                 <div class="page-actions">
                    <button id="btnPrint" class="btn-secondary"><i class="fa-solid fa-print"></i> 列印為 PDF</button>
                    <button id="btnSaveDataToCloud" class="btn-secondary" style="display: none;"><i class="fa-solid fa-cloud-arrow-up"></i> 儲存目錄資料</button>
                    <!-- 按鈕文字改為「上傳目錄PDF」 -->
                    <button id="btnUploadPdf" class="btn-submit" style="display: none;"><i class="fa-solid fa-file-arrow-up"></i> 上傳目錄PDF</button>
                    <input type="file" id="pdfUploader" accept="application/pdf" style="display: none;">
                 </div>
            </div>
            <div id="project-info-container" class="project-info"></div>
        </div>
        
        <div id="cloud-status"></div>

      <div class="form-section">
        <h2 class="section-title"><i class="fa-solid fa-list-check"></i> PIF 目錄</h2>
        <div id="pif0-root">
            <header class="toolbar no-print" role="toolbar" aria-label="工具列">
                <button id="btnAdd">新增項目</button>
                <button id="btnAddApx">新增附錄</button>
                <span style="margin-left:auto;color:var(--muted); font-size: 0.85rem;" id="local-save-status"></span>
            </header>

            <main class="paper" id="pdf-content">
              <h1 id="docTitle" class="title" contenteditable="true" spellcheck="false">目　錄</h1>
              <!-- 加 span 讓「頁次」能對齊到第 4 欄 -->
              <div class="right-head"><span>頁　次</span></div>
              <section id="toc" class="toc" aria-label="目錄清單"></section>
            </main>
        </div>
      </div>
</div>
</div>

<script>
// PIF0 Directory Management (Embedded)
(function(){
  const $ = sel => document.querySelector(sel);
  const tocEl = $('#toc');
  const statusEl = $('#local-save-status');
  const docTitleEl = $('#docTitle');
  const LOCAL_STORAGE_KEY = 'pif_toc_v1';
  let pifState = null;

  const defaultItems = [
    {type:'item', title:'產品基本資料', page:'2'}, {type:'item', title:'完成產品登錄之證明文件', page:'3'},
    {type:'item', title:'全成分名稱及其各別含量', page:'4'}, {type:'item', title:'產品標籤、仿單、外包裝或容器', page:'5'},
    {type:'item', title:'製造場所符合化妝品優良製造準則之證明文件或聲明書', page:'7'}, {type:'item', title:'製造方法、流程', page:'9'},
    {type:'item', title:'使用方法、部位、用量、頻率及族群', page:'10'}, {type:'item', title:'產品使用不良反應資料', page:'10'},
    {type:'item', title:'產品及各成分之物理及化學特性', page:'11'}, {type:'item', title:'成分之毒理資料', page:'25'},
    {type:'item', title:'產品安定性試驗報告', page:'45'}, {type:'item', title:'微生物檢測報告', page:'46'},
    {type:'item', title:'防腐效能試驗報告', page:'47'}, {type:'item', title:'功能評估佐證資料', page:'48'},
    {type:'item', title:'與產品接觸之包裝材質資料', page:'48'}, {type:'item', title:'產品安全資料', page:'49'}
  ];

  function render(){
    if(!tocEl || !pifState) return;
    tocEl.innerHTML = '';
    docTitleEl.innerText = pifState.title || '目　錄';
    let idx = 0, apx = 0;
    pifState.items.forEach((it, i) => {
      const row = document.createElement('div');
      row.className = 'row' + (it.type==='appendix' ? ' appendix' : '');
      row.dataset.index = i;

      const num = document.createElement('div');
      num.className='num';
      if(it.type==='appendix'){ num.textContent = '附錄 ' + (++apx) + '：'; }
      else { num.textContent = '（' + (++idx) + '）'; }

      const label = document.createElement('div');
      label.className='label';
      label.contentEditable = true; label.spellcheck = false; label.textContent = it.title || '';
      label.addEventListener('input', () => { it.title = label.innerText.trim(); autoSave(); });

      const leader = document.createElement('div'); leader.className='leader';

      const page = document.createElement('div');
      page.className='page';
      page.contentEditable = true; page.spellcheck = false; page.textContent = it.page || '';
      page.addEventListener('input', () => { it.page = page.innerText.replace(/\s+/g,'').replace(/[^0-9ivxlcdmIVXLCDM一二三四五六七八九十]/g,''); autoSave(); });

      const del = document.createElement('button'); del.className='del no-print'; del.textContent='刪除';
      del.addEventListener('click', () => { pifState.items.splice(i,1); render(); autoSave(); });

      row.append(num, label, leader, page, del);
      tocEl.appendChild(row);
    });
  }

  function autoSave(silent = false){
    if (window.pifAppMode === 'cloud') return; 
    try {
      pifState.title = docTitleEl.innerText.trim() || '目　錄';
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(pifState));
      if(!silent) flash('已自動儲存至本機');
    } catch(e) { console.warn('Autosave failed:', e); }
  }
  
  function flash(msg){ if(statusEl){ statusEl.textContent = msg; setTimeout(() => statusEl.textContent='', 1400); } }

  // Expose methods to the global scope for the main Firebase script to call
  window.pifDirectory = {
    init: (cloudData) => {
      if (cloudData) {
        pifState = cloudData;
      } else {
        const localData = localStorage.getItem(LOCAL_STORAGE_KEY);
        pifState = localData ? JSON.parse(localData) : { title: '目　錄', items: [...defaultItems] };
      }
      render();
    },
    getData: () => {
      pifState.title = docTitleEl.innerText.trim() || '目　錄';
      return pifState;
    }
  };

  $('#btnAdd').addEventListener('click', () => { pifState.items.push({type:'item', title:'新項目', page:''}); render(); autoSave(); });
  $('#btnAddApx').addEventListener('click', () => { pifState.items.push({type:'appendix', title:'新附錄標題', page:''}); render(); autoSave(); });
  docTitleEl.addEventListener('input', () => autoSave());
})();
</script>

<script type="module">
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
    import { auth, db, storage } from './firebase-config.js';

    const $ = sel => document.querySelector(sel);
    let pifId = null;

    onAuthStateChanged(auth, user => {
        document.body.style.opacity = '1';
        initializePage(user);
    });

    async function initializePage(user) {
        const urlParams = new URLSearchParams(window.location.search);
        pifId = urlParams.get('id');

        if (user && pifId) {
            // --- CLOUD MODE ---
            window.pifAppMode = 'cloud';
            $('#btnSaveDataToCloud').style.display = 'inline-block';
            $('#btnUploadPdf').style.display = 'inline-block';
            
            const companyName = decodeURIComponent(urlParams.get('companyName') || '');
            const productName = decodeURIComponent(urlParams.get('productName') || '');
            $('#project-info-container').innerHTML = `
                <div class="info-item"><i class="fa-solid fa-hashtag"></i><strong>PIF ID:</strong> <span>${pifId}</span></div>
                <div class="info-item"><i class="fa-solid fa-building"></i><strong>廠商名稱:</strong> <span>${companyName}</span></div>
                <div class="info-item"><i class="fa-solid fa-box"></i><strong>產品名稱:</strong> <span>${productName}</span></div>`;

            // Load data from Firestore
            const docRef = doc(db, "pifs", pifId, "pif_data", "01-2");
            const docSnap = await getDoc(docRef);
            window.pifDirectory.init(docSnap.exists() ? docSnap.data().tocData : null);

        } else {
            // --- LOCAL MODE ---
            window.pifAppMode = 'local';
            $('#project-info-container').innerHTML = '<p><strong>單機離線模式：</strong> 目錄內容會自動儲存於您的瀏覽器。點擊「列印為 PDF」即可儲存。';
            window.pifDirectory.init(null);
        }

        $('#app-container').style.display = 'block';
        if (user) {
          $('#user-info').textContent = `歡迎, ${user.displayName || user.email}`;
          $('#btnSignOut').addEventListener('click', () => signOut(auth));
        }
        
        // --- EVENT LISTENERS ---
        $('#btnPrint').addEventListener('click', () => window.print());
        $('#btnSaveDataToCloud').addEventListener('click', saveDataToCloud);
        $('#btnUploadPdf').addEventListener('click', () => $('#pdfUploader').click());
        $('#pdfUploader').addEventListener('change', handlePdfUpload);
    }
    
    async function saveDataToCloud() {
        if (!pifId) return alert('錯誤：缺少專案 ID。');
        
        const tocData = window.pifDirectory.getData();
        const docRef = doc(db, "pifs", pifId, "pif_data", "01-2");
        const button = $('#btnSaveDataToCloud');

        button.disabled = true;
        setStatus('<i class="fa-solid fa-spinner fa-spin"></i> 正在儲存資料...', 'status-info');

        try {
            await setDoc(docRef, { tocData });
            setStatus('<i class="fa-solid fa-check-circle"></i> 目錄資料已成功儲存至雲端！', 'status-success');
        } catch (error) {
            console.error("Error saving data:", error);
            setStatus(`<i class="fa-solid fa-triangle-exclamation"></i> 資料儲存失敗: ${error.message}`, 'status-error');
        } finally {
            button.disabled = false;
            setTimeout(() => setStatus('', 'none'), 5000);
        }
    }

    function handlePdfUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.type !== "application/pdf") return alert("請選擇一個 PDF 檔案。");
        
        const storagePath = `pifs/${pifId}/01-2.pdf`;
        uploadFile(file, storagePath);
    }

    function uploadFile(file, storagePath) {
        if (!pifId) return alert('錯誤：缺少專案 ID。');

        const storageRef = ref(storage, storagePath);
        const uploadTask = uploadBytesResumable(storageRef, file);
        const button = $('#btnUploadPdf');
        button.disabled = true;

        uploadTask.on('state_changed', 
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                setStatus(`<i class="fa-solid fa-upload"></i> 正在上傳 PDF... ${Math.round(progress)}%`, 'status-info');
            }, 
            (error) => {
                console.error("Upload failed:", error);
                setStatus(`<i class="fa-solid fa-triangle-exclamation"></i> 上傳失敗: ${error.code}`, 'status-error');
                button.disabled = false;
            }, 
            () => {
                setStatus('<i class="fa-solid fa-check-circle"></i> PDF 已成功上傳！儀表板狀態將會更新。', 'status-success');
                button.disabled = false;
                $('#pdfUploader').value = ''; // Reset file input
                setTimeout(() => setStatus('', 'none'), 5000);
            }
        );
    }

    function setStatus(msg, styleClass) {
        const statusEl = $('#cloud-status');
        if (styleClass === 'none') {
            statusEl.style.display = 'none';
        } else {
            statusEl.innerHTML = msg;
            statusEl.className = styleClass;
            statusEl.style.display = 'block';
        }
    }

</script>

</body>
</html>
