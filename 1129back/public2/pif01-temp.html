<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PIF 01 產品基本資料</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <style>
      body {
        opacity: 0;
        transition: opacity 0.4s ease-in-out;
        background-color: #f9fafb;
      }
      .main-content {
        padding: 2rem;
      }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo"><i class="fa-solid fa-shield-halved"></i> CosPIF</a>
                <ul class="nav-links">
                    <li><a href="pif-i.html">我的專案</a></li>
                    <li><a href="vendors.html">廠商資料庫</a></li>
                </ul>
                <div class="nav-actions" style="display: flex; align-items: center;">
                    <span id="user-info" style="margin-right: 1.5rem; color: var(--text-muted);"></span>
                    <button id="btnSignOut" class="btn-login btn-danger">登出</button>
                </div>
            </nav>
        </div>
    </header>

<div id="app-container" style="display: none;">
    <div class="main-content">
        <div class="page-header">
            <div>
                <h1 id="page-title">01 產品基本資料</h1>
                <p id="project-subtitle" class="text-muted"></p>
            </div>
            <div class="page-actions">
                <a id="back-link" href="pif-i.html" class="btn-secondary"><i class="fa-solid fa-arrow-left"></i> 返回指揮中心</a>
                <button id="btnPrint" class="btn-secondary"><i class="fa-solid fa-print"></i> 列印</button>
                <button id="btnSave" class="btn-submit"><i class="fa-solid fa-save"></i> 儲存資料</button>
            </div>
        </div>
        <span id="autosaveHint" class="text-sm text-muted" style="display: block; margin-top: -1rem; margin-bottom: 1.5rem; text-align: right;"></span>

        <div class="card">
          <div class="card-header"><h2 class="card-title">(1) 產品基本資料</h2></div>
          <div class="card-body">
            <div class="form-grid">
              <div class="form-group">
                <label for="productName">產品名稱</label>
                <input type="text" id="productName" class="form-input">
              </div>
              <div class="form-group">
                <label for="companyName">公司名稱</label>
                <input type="text" id="companyName" class="form-input">
              </div>
              <div class="form-group">
                <label for="pifId">PIF ID</label>
                <input type="text" id="pifId" class="form-input" readonly placeholder="儲存後自動產生">
              </div>
              <div class="form-group">
                <label for="pifPrefix">PIF 字首</label>
                <input type="text" id="pifPrefix" class="form-input" placeholder="請輸入 2 位大寫英文字母代碼" maxlength="2" style="text-transform: uppercase;">
              </div>
               <div class="form-group form-group-full">
                <label for="prodUse">用途</label>
                <input id="prodUse" type="text" class="form-input" placeholder="例：防曬、清潔、保濕…">
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h2 class="card-title">製造作業場所資訊</h2></div>
          <div class="card-body">
            <div class="table-container">
                <table class="table" id="tblMfg">
                    <thead><tr><th class="col-idx">#</th><th style="width: 200px;">廠商查詢 (統一編號)</th><th>製造廠名稱</th><th>地址</th><th style="width:150px">國別</th><th style="width:80px" class="no-print">操作</th></tr></thead>
                    <tbody id="mfgBody"></tbody>
                </table>
            </div>
          </div>
          <div class="card-footer">
             <button id="btnAddMfg" class="btn-secondary no-print"><i class="fa-solid fa-plus"></i> 新增製造場所</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h2 class="card-title">包裝作業場所資訊</h2></div>
           <div class="card-body">
            <div class="table-container">
                <table class="table" id="tblPkg">
                    <thead><tr><th class="col-idx">#</th><th style="width: 200px;">廠商查詢 (統一編號)</th><th>包裝廠名稱</th><th>地址</th><th style="width:150px">國別</th><th style="width:80px" class="no-print">操作</th></tr></thead>
                    <tbody id="pkgBody"></tbody>
                </table>
            </div>
          </div>
          <div class="card-footer">
             <button id="btnAddPkg" class="btn-secondary no-print"><i class="fa-solid fa-plus"></i> 新增包裝場所</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h2 class="card-title">產品責任業者資訊</h2></div>
          <div class="card-body">
             <div class="form-grid">
                <div class="form-group form-group-full">
                    <label for="makerName">責任業者名稱</label>
                    <input id="makerName" type="text" class="form-input" placeholder="可由統一編號查詢帶入">
                </div>
                <div class="form-group form-group-full">
                    <label for="makerAddr">地址</label>
                    <textarea id="makerAddr" rows="2" class="form-input" placeholder="可由統一編號查詢帶入"></textarea>
                </div>
                 <div class="form-group">
                    <label for="makerTel">聯絡電話</label>
                    <input id="makerTel" type="tel" class="form-input" placeholder="可由統一編號查詢帶入">
                </div>
                <div class="form-group">
                    <label for="makerTax">統一編號</label>
                    <div class="input-group">
                      <input id="makerTax" type="text" class="form-input" placeholder="輸入統一編號後點擊查詢">
                      <button type="button" id="lookup-maker-btn" class="btn-secondary"><i class="fa-solid fa-search"></i> 查詢</button>
                    </div>
                </div>
            </div>
          </div>
        </div>
    </div>
</div>

<div id="global-error"></div>

<script type="module">
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js";
    import { auth, db, functions } from './firebase-config.js';

    const $ = sel => document.querySelector(sel);
    
    // --- Page State ---
    let pageMode = 'loading'; // loading, create, edit
    let currentPifId = null;
    let isSaving = false;

    // --- Firebase Callable Functions ---
    const generatePifId = httpsCallable(functions, 'generatePifId');
    const createPifProject = httpsCallable(functions, 'createPifProject');

    // --- App Initialization ---
    function startApp() {
        onAuthStateChanged(auth, user => {
            if (user) {
                try {
                    initializePage();
                    $('#user-info').textContent = `歡迎, ${user.displayName || user.email}`;
                    $('#btnSignOut').addEventListener('click', () => { signOut(auth).then(() => { window.location.href = 'login.html'; }); });

                } catch (e) {
                    console.error("Error during page initialization:", e);
                    showGlobalError(`頁面初始化錯誤：${e.message}`);
                }
                document.body.style.opacity = '1';
            } else {
                window.location.href = 'login.html';
            }
        });
    }

    async function initializePage() {
        const urlParams = new URLSearchParams(window.location.search);
        currentPifId = urlParams.get('id');

        if (currentPifId) {
            pageMode = 'edit';
            await loadAndRenderPifData();
        } else {
            pageMode = 'create';
            renderForCreateMode();
        }
        
        setupEventListeners();
        $('#app-container').style.display = 'block';
    }

    // --- Data Loading and Rendering ---
    async function loadAndRenderPifData() {
        $('#page-title').textContent = '編輯產品資料';
        const docRef = doc(db, 'pifs', currentPifId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
            throw new Error(`找不到 PIF 專案 (ID: ${currentPifId})。`);
        }

        const pifData = docSnap.data();
        const pif01Data = pifData.pif01 || {};

        // Render header and static content
        document.title = `PIF 01 - ${pifData.productName}`;
        $('#project-subtitle').textContent = `專案: ${pifData.companyName} - ${pifData.productName}`;
        const backLinkParams = new URLSearchParams({id: currentPifId, companyName: encodeURIComponent(pifData.companyName), productName: encodeURIComponent(pifData.productName) });
        $('#back-link').href = `pifs.html?${backLinkParams.toString()}`;

        // Render form fields
        $('#productName').value = pifData.productName || '';
        $('#companyName').value = pifData.companyName || '';
        $('#pifId').value = pifData.pifId || currentPifId;

        // In edit mode, company, product name and prefix are read-only
        $('#productName').readOnly = true;
        $('#companyName').readOnly = true;
        $('#pifPrefix').readOnly = true;

        renderForm(pif01Data);
    }

    function renderForCreateMode() {
        document.title = "建立新 PIF 專案";
        $('#page-title').textContent = "建立新 PIF 專案";
        $('#project-subtitle').textContent = "請填寫以下產品資訊，儲存後將自動產生 PIF ID。";
        
        $('#productName').readOnly = false;
        $('#companyName').readOnly = false;
        $('#pifPrefix').readOnly = false;
        $('#back-link').href = `pif-i.html`; // Go back to dashboard in create mode

        renderForm({}); // Render an empty form
    }

    function renderForm(pif01Data) {
        const state = {
            basic: pif01Data.basic || { use: '' },
            mfg: pif01Data.mfg && pif01Data.mfg.length > 0 ? pif01Data.mfg : [{name: '', addr: '', country: '', taxId: ''}],
            pkg: pif01Data.pkg && pif01Data.pkg.length > 0 ? pif01Data.pkg : [{name: '', addr: '', country: '', taxId: ''}],
            maker: pif01Data.maker || {}
        };

        $('#prodUse').value = state.basic.use || '';
        if (pageMode === 'edit' && currentPifId) {
            const prefixMatch = currentPifId.match(/^[A-Z]{2}/);
            if (prefixMatch) {
                $('#pifPrefix').value = prefixMatch[0];
            }
        }
        
        renderTable('mfg', state.mfg);
        renderTable('pkg', state.pkg);
        $('#makerName').value = state.maker.name || '';
        $('#makerAddr').value = state.maker.addr || '';
        $('#makerTel').value = state.maker.tel || '';
        $('#makerTax').value = state.maker.tax || '';
    }

    // --- UI and Event Listeners ---
    function setupEventListeners() {
        $('#btnAddMfg').addEventListener('click', () => addRow('mfg'));
        $('#btnAddPkg').addEventListener('click', () => addRow('pkg'));
        $('#btnSave').addEventListener('click', saveController);
        $('#btnPrint').addEventListener('click', () => window.print());
        $('#lookup-maker-btn').addEventListener('click', lookupMaker);
    }

    function renderTable(kind, items) {
        const tbody = $(`#${kind}Body`);
        tbody.innerHTML = '';
        items.forEach((item, index) => addRow(kind, item, index));
    }

    function addRow(kind, item = {}, index = -1) {
        const tbody = $(`#${kind}Body`);
        const newIndex = index === -1 ? tbody.rows.length : index;
        const tr = tbody.insertRow(index);
        tr.innerHTML = `
            <td class="col-idx">${newIndex + 1}</td>
            <td>
                <div class="input-group">
                    <input type="text" class="form-input taxId" placeholder="統一編號" value="${item.taxId || ''}">
                    <button type="button" class="btn-secondary btn-sm lookup-row-btn"><i class="fa-solid fa-search"></i></button>
                </div>
            </td>
            <td><input type="text" class="form-input name" placeholder="${kind === 'mfg' ? '製造廠名稱' : '包裝廠名稱'}" value="${item.name || ''}"></td>
            <td><textarea class="form-input addr" rows="1" placeholder="地址">${item.addr || ''}</textarea></td>
            <td><input type="text" class="form-input country" placeholder="國別" value="${item.country || ''}"></td>
            <td class="no-print"><button class="btn-danger btn-sm del"><i class="fa-solid fa-trash"></i></button></td>
        `;
        tr.querySelector('.del').addEventListener('click', () => {
            tr.remove();
            Array.from(tbody.rows).forEach((r, i) => r.cells[0].textContent = i + 1);
        });
        tr.querySelector('.lookup-row-btn').addEventListener('click', (e) => lookupTableRow(e));
    }

    // --- Main Save Controller ---
    async function saveController() {
        if (isSaving) return;
        isSaving = true;
        const btn = $('#btnSave');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
        setSaveHint('儲存中...', 'var(--primary-color)');

        try {
            if (pageMode === 'create') {
                await createNewPif();
            } else {
                await updateExistingPif();
            }
        } catch (error) {
            console.error("Save failed:", error);
            setSaveHint(`儲存失敗: ${error.message}`, 'var(--danger-color)');
            alert(`儲存失敗: ${error.message}`);
        } finally {
            isSaving = false;
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-save"></i> 儲存資料';
        }
    }

    async function createNewPif() {
        const productName = $('#productName').value.trim();
        const companyName = $('#companyName').value.trim();
        const pifPrefix = $('#pifPrefix').value.trim().toUpperCase();

        if (!productName || !companyName) throw new Error("請務必填寫「產品名稱」和「公司名稱」。");
        if (!pifPrefix || !/^[A-Z]{2}$/.test(pifPrefix)) throw new Error("請務必填寫 2 位大寫英文字母的「PIF 字首」。");

        setSaveHint('正在產生專案 ID...');
        const idResult = await generatePifId({ prefix: pifPrefix });
        if (!idResult.data.success || !idResult.data.pifId) {
            throw new Error(idResult.data.error || '從後端獲取新 PIF ID 失敗。');
        }
        const newPifId = idResult.data.pifId;

        const fullPifData = {
            pifId: newPifId,
            productName: productName,
            companyName: companyName,
            createdAt: new Date().toISOString(),
            pif01: getPif01DataFromForm(newPifId, productName, companyName)
        };

        setSaveHint('正在建立專案...');
        const createResult = await createPifProject(fullPifData);
        if (!createResult.data.success) {
            throw new Error(createResult.data.error || '建立專案時後端發生錯誤。');
        }

        setSaveHint('專案建立成功！正在導向專案入口...', 'var(--success-color)');
        alert('專案已成功建立！');
        const params = new URLSearchParams({ id: newPifId, companyName: encodeURIComponent(companyName), productName: encodeURIComponent(productName) });
        window.location.href = `pifs.html?${params.toString()}`;
    }

    async function updateExistingPif() {
        setSaveHint('正在更新資料...');
        const pif01Data = getPif01DataFromForm(currentPifId, $('#productName').value, $('#companyName').value);
        const docRef = doc(db, "pifs", currentPifId);
        await setDoc(docRef, { pif01: pif01Data, updatedAt: new Date().toISOString() }, { merge: true });
        setSaveHint('所有變更已儲存！', 'var(--success-color)');
    }

    // --- Data Gathering from Form ---
    function getPif01DataFromForm(pifId, productName, companyName) {
        const pifPrefix = $('#pifPrefix').value.trim().toUpperCase();
        return {
            basic: { pifId: pifId, prefix: pifPrefix, name: productName, use: $('#prodUse').value },
            mfg: Array.from($('#mfgBody').rows).map(row => ({ 
                taxId: row.querySelector('.taxId').value, 
                name: row.querySelector('.name').value, 
                addr: row.querySelector('.addr').value, 
                country: row.querySelector('.country').value 
            })),
            pkg: Array.from($('#pkgBody').rows).map(row => ({ 
                taxId: row.querySelector('.taxId').value, 
                name: row.querySelector('.name').value, 
                addr: row.querySelector('.addr').value, 
                country: row.querySelector('.country').value 
            })),
            maker: { name: $('#makerName').value, addr: $('#makerAddr').value, tel: $('#makerTel').value, tax: $('#makerTax').value }
        };
    }

    // --- Utility Functions ---
    function setSaveHint(text, color = 'var(--text-muted)') {
        const hintEl = $('#autosaveHint');
        hintEl.textContent = text;
        hintEl.style.color = color;
    }

    function showGlobalError(message) {
        $('#app-container').style.display = 'none';
        $('#global-error').innerHTML = `<strong>錯誤：</strong> ${message}`;
        $('#global-error').style.display = 'block';
    }
    
    async function lookupTableRow(event) {
        const btn = event.currentTarget;
        const row = btn.closest('tr');
        const taxIdInput = row.querySelector('.taxId');
        const nameInput = row.querySelector('.name');
        const addrInput = row.querySelector('.addr');
        const taxId = taxIdInput.value.trim();

        if (!taxId) { alert('請先輸入統一編號。'); return; }
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

        try {
            const vendorRef = doc(db, 'vendors', taxId);
            const docSnap = await getDoc(vendorRef);
            if (docSnap.exists()) {
                const vendor = docSnap.data();
                nameInput.value = vendor.companyName || '';
                addrInput.value = vendor.address || '';
            } else {
                alert('在廠商資料庫中找不到此統一編號的資料。');
            }
        } catch (error) {
            console.error("Error looking up vendor in table: ", error);
            alert('查詢時發生錯誤。');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-search"></i>';
        }
    }

    async function lookupMaker() {
        const taxId = $('#makerTax').value.trim();
        if (!taxId) { alert('請先輸入統一編號。'); return; }
        const lookupBtn = $('#lookup-maker-btn');
        lookupBtn.disabled = true;
        lookupBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 查詢中...';
        try {
            const vendorRef = doc(db, 'vendors', taxId);
            const docSnap = await getDoc(vendorRef);
            if (docSnap.exists()) {
                const vendor = docSnap.data();
                $('#makerName').value = vendor.companyName || '';
                $('#makerAddr').value = vendor.address || '';
                $('#makerTel').value = vendor.phone || '';
                alert('廠商資料已成功帶入！');
            } else {
                alert('在中央廠商資料庫中找不到此統一編號的資料。');
            }
        } catch (error) {
            console.error("Error looking up vendor: ", error);
            alert('查詢時發生錯誤。');
        } finally {
            lookupBtn.disabled = false;
            lookupBtn.innerHTML = '<i class="fa-solid fa-search"></i> 查詢';
        }
    }

    startApp();
</script>
</body>
</html>
