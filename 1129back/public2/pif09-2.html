<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIF 09-2｜各成分之理化特性 (AI 智慧版)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="style.css">
<style>
  html { scroll-behavior: smooth; }
  body { background-color: #f0f2f5; }
  .container { padding: 1rem; max-width: 1200px; margin: 0 auto; }

  #ai-editor-panel {
    background: #fff; border-radius: 8px; margin-bottom: 2rem; 
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out, padding 0.5s ease-out; padding: 0;
  }
  #ai-editor-panel.open { padding: 1.5rem; max-height: 1000px; }
  #ai-editor-header { font-size: 1.5rem; font-weight: 600; color: #111827; margin-bottom: 1rem; }
  #ai-editor-body { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.25rem; }
  #ai-editor-footer { padding-top: 1.5rem; text-align: right; }

  #cards-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
  .ingredient-card { background: #fff; border: 2px solid transparent; border-radius: 8px; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); display: flex; flex-direction: column; transition: all 0.3s ease; }
  .ingredient-card.editing { border-color: var(--brand); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }

  .card-header h3 { font-size: 1.2rem; }
  .card-header p { font-size: 0.9rem; }
  .card-body { padding: 1rem; flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1rem; }
  .data-point .label { font-weight: 500; }
  .value.no-data { font-style: italic; }
  
  #upload-status-pdf { 
      display: none; padding: 0.75rem 1.25rem; margin-top: 1rem; border-radius: 8px; 
      font-weight: 500; text-align: center; 
  }
  .status-info { background-color: #e0e7ff; color: #3730a3; }
  .status-success { background-color: #dcfce7; color: #166534; }
  .status-error { background-color: #fee2e2; color: #991b1b; }
  #upload-status-pdf i { margin-right: 0.5rem; }
  
  @media print {
      body { background-color: #fff; }
      .noprint { display: none !important; }
      .container { max-width: 100%; padding: 0; }
      #ai-editor-panel { display: none; }
      .ingredient-card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
      .card-footer { display: none; }
  }

</style>
</head>
<body>
<pif-nav></pif-nav>
<top-bar></top-bar>

<div class="container">
    <status-bar></status-bar>

    <div class="toolbar noprint">
      <button id="btnUploadPdf"><i class="fa-solid fa-file-arrow-up"></i> 上傳本頁 PDF</button>
      <input type="file" id="pdfUploader" accept="application/pdf" style="display:none;">
      <div style="flex-grow: 1"></div>
      <button id="btnPrint"><i class="fa-solid fa-print"></i> 列印</button>
    </div>
    <div id="upload-status-pdf" class="noprint"></div>
    
    <div id="ai-editor-panel" class="noprint">
        <h3 id="ai-editor-header"></h3>
        <div id="ai-editor-body"></div>
        <div id="ai-editor-footer">
            <button id="ai-editor-cancel">取消</button>
            <button id="ai-editor-save" class="primary">儲存變更</button>
        </div>
    </div>

    <div id="report-container">
        <div id="cards-container"></div>
    </div>
</div>

<script type="module">
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, setDoc, collection, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
  import { db, auth, storage } from './firebase-config.js';
  import "./components.js";

  const $ = sel => document.querySelector(sel);
  const showStatus = (message, type, duration) => customElements.whenDefined('status-bar').then(() => document.querySelector('status-bar').show(message, type, duration));
  
  const PHYSCHEM_COLLECTION = "physchem_properties";
  let pageContext = {};
  let pifDocRef;
  let recipeCache = [];
  let propertiesCache = new Map();
  let currentEditingInci = null;

  const ALL_FIELDS = { 
    state: '外觀狀態', color: '顏色', odor: '氣味',
    solubility_water: '水中溶解度', ph: 'pH 值', melting_point: '熔點 (°C)',
    boiling_point: '沸點 (°C)', flash_point: '閃火點 (°C)', density: '密度 (g/cm³)',
    viscosity: '黏度 (cps)',
  };
  const AI_NO_DATA = "AI 輔助無資料";

  function main() {
      onAuthStateChanged(auth, user => {
          if (user) {
              initPage(user); 
          } else {
              const params = new URLSearchParams(window.location.search);
              const pifId = params.get('id');
              window.location.href = `login.html?redirect=pif09-2.html?${params.toString()}`;
          }
      });
  }

  function initPage(user) {
    pageContext = setupPageContext();
    if (!pageContext.pifId) {
        showStatus("錯誤：URL 中缺少 PIF ID。", "error", -1);
        $('#cards-container').innerHTML = '<p style="text-align:center; padding: 2rem;">無效的連結。</p>';
        return;
    }
    pifDocRef = doc(db, "pifs", pageContext.pifId);
    setupUI(user, pageContext);
    initializeWorkspace();
  }

  function setupPageContext() {
    const urlParams = new URLSearchParams(window.location.search);
    return { 
        pifId: urlParams.get('id'), 
        companyName: decodeURIComponent(urlParams.get('companyName') || ''), 
        productName: decodeURIComponent(urlParams.get('productName') || '') 
    };
  }

  function setupUI(user, context) {
      customElements.whenDefined('top-bar').then(() => {
        const topBar = $('top-bar');
        topBar.setInfo(context.pifId, context.companyName, context.productName, "PIF 09-2: 各成分之理化特性");
        topBar.setUser(user);
      });
      
      document.body.addEventListener('logout-request', () => signOut(auth));
      
      $('#ai-editor-cancel').addEventListener('click', closeAiEditor);
      $('#cards-container').addEventListener('click', e => {
          const button = e.target.closest('.btn-ai-edit');
          if (button) openAiEditor({ inci: button.dataset.inci, cas: button.dataset.cas });
      });

      $('#btnUploadPdf').addEventListener('click', () => $('#pdfUploader').click());
      $('#pdfUploader').addEventListener('change', handlePdfUpload);
      $('#btnPrint').addEventListener('click', () => window.print());
  }

  async function initializeWorkspace() {
    showStatus('正在載入配方與理化資料...', 'loading', 0);
    
    try {
        const pifDocSnap = await getDoc(pifDocRef);

        if (!pifDocSnap.exists()) {
            throw new Error('找不到指定的 PIF 文件。');
        }
        
        const pifData = pifDocSnap.data();
        updatePdfUploadStatus(pifData.pif09_2_pdfUrl);
        await loadPropertiesData();
        
        if (!pifData.pif03?.recipe?.length) {
            showStatus('<h3><i class="fa-solid fa-box-open"></i> 缺少 PIF 03 配方</h3><p>請先前往 PIF 03 填寫產品配方，才能在此處編輯各成分的理化特性。</p>', 'error', -1);
            $('#cards-container').innerHTML = '';
            return;
        }
        
        recipeCache = pifData.pif03.recipe;
        renderIngredientCards(recipeCache);
        showStatus('配方與理化資料載入完成！歡迎使用！', 'success', 3000);

    } catch (error) {
        console.error("Initialization Error:", error);
        showStatus(`初始化失敗: ${error.message}`, 'error', -1);
    }
  }

  async function loadPropertiesData() {
    const querySnapshot = await getDocs(collection(db, PHYSCHEM_COLLECTION));
    querySnapshot.forEach(doc => {
        const data = doc.data();
        if (data.inciName) propertiesCache.set(data.inciName.trim().toLowerCase(), {id: doc.id, ...data});
    });
  }

  function renderIngredientCards(recipe) {
    $('#cards-container').innerHTML = recipe.map(ing => generateCard(ing)).join('');
  }

  function generateCard(ing) {
    const inci = ing.inci || '[未命名]';
    const cas = ing.cas || 'N/A';
    const propData = propertiesCache.get(inci.trim().toLowerCase()) || null;

    return `
    <div class="ingredient-card" data-inci-name="${inci}">
      <div class="card-header"><h3>${inci}</h3><p>CAS: ${cas}</p></div>
      <div class="card-body">
        ${Object.entries(ALL_FIELDS).map(([key, name]) => {
            const value = propData?.[key] || '-';
            return `<div class="data-point"><span class="label">${name}</span><span class="value ${!propData || !value || value === '-' ? 'no-data' : ''}">${value}</span></div>`;
        }).join('')}
      </div>
      <div class="card-footer noprint"><button class="btn btn-ai-edit" data-inci="${inci}" data-cas="${cas}"><i class="fa-solid fa-magic-sparkles"></i> AI 編輯</button></div>
    </div>`;
  }
  
  async function openAiEditor(ingredient) {
    currentEditingInci = ingredient.inci;
    document.querySelectorAll('.ingredient-card.editing').forEach(c => c.classList.remove('editing'));
    const card = $(`div[data-inci-name="${ingredient.inci}"]`);
    if (card) {
        card.classList.add('editing');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    const editorPanel = $('#ai-editor-panel');
    editorPanel.classList.add('open');
    if(window.scrollY > editorPanel.offsetTop) {
        window.scrollTo(0, editorPanel.offsetTop - 20);
    }

    $('#ai-editor-header').textContent = `AI 智慧編輯: ${ingredient.inci}`;
    $('#ai-editor-body').innerHTML = '<div id="ai-editor-loader"><i class="fa-solid fa-spinner fa-spin"></i> AI 正在提供建議...</div>';

    const existingData = propertiesCache.get(ingredient.inci.trim().toLowerCase()) || {};
    const suggestions = await getAiSuggestions(ingredient);
    
    let formHtml = Object.entries(ALL_FIELDS).map(([key, name]) => {
        const value = existingData[key] || suggestions[key] || AI_NO_DATA;
        return `<div class="form-group"><label>${name}</label><input id="ai-field-${key}" value="${value}"></div>`;
    }).join('');
    $('#ai-editor-body').innerHTML = formHtml;

    const saveButton = $('#ai-editor-save');
    const newSaveButton = saveButton.cloneNode(true);
    saveButton.parentNode.replaceChild(newSaveButton, saveButton);
    newSaveButton.addEventListener('click', () => handleSaveAiData(ingredient));
  }
  
  function closeAiEditor() {
    $('#ai-editor-panel').classList.remove('open');
    document.querySelectorAll('.ingredient-card.editing').forEach(c => c.classList.remove('editing'));
    currentEditingInci = null;
  }

  async function handleSaveAiData(ingredient) {
      const saveButton = $('#ai-editor-save');
      saveButton.disabled = true; saveButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 儲存中...';
      const newData = { inciName: ingredient.inci, cas: ingredient.cas, lastUpdated: serverTimestamp() };
      Object.keys(ALL_FIELDS).forEach(key => newData[key] = $(`#ai-field-${key}`).value.trim());

      try {
          const docId = ingredient.inci.trim().toLowerCase().replace(/[\s/]/g, '_');
          await setDoc(doc(db, PHYSCHEM_COLLECTION, docId), newData, { merge: true });
          propertiesCache.set(ingredient.inci.trim().toLowerCase(), { id: docId, ...newData });
          
          const card = $(`div[data-inci-name="${ingredient.inci}"]`);
          const originalRecipeItem = recipeCache.find(r => r.inci === ingredient.inci);
          if (card && originalRecipeItem) card.outerHTML = generateCard(originalRecipeItem);
          
          closeAiEditor();
          showStatus(`成功更新了 ${ingredient.inci} 的資料！`, 'success', 4000);
      } catch (error) {
          showStatus(`儲存失敗: ${error.message}`, 'error', -1);
      } finally {
          saveButton.disabled = false; saveButton.innerHTML = '儲存變更';
      }
  }

  async function getAiSuggestions(ingredient) {
    await new Promise(r => setTimeout(r, 1000));
    const lowerInci = ingredient.inci.toLowerCase();
    const knowledge = {
        'aqua': { state: '液體', color: '無色', odor: '無味', ph: '約 7.0', melting_point: '0', boiling_point: '100', density: '1.0' },
        'butylene glycol': { state: '液體', color: '無色', odor: '無味', boiling_point: '197', density: '1.004', viscosity: '103.9' },
        'glycerin': { state: '黏稠液體', color: '無色', odor: '無味', boiling_point: '290', density: '1.261', viscosity: '1412' },
        'dimethicone': { state: '液體', color: '無色', odor: '無味', density: '0.96-0.97', viscosity: '50-1000' },
        'petrolatum': { state: '半固體', color: '白色/黃色', odor: '無味', melting_point: '38-60', density: '0.815–0.880' },
        'phenoxyethanol': { state: '油狀液體', color: '無色', odor: '輕微玫瑰香', boiling_point: '247', density: '1.102' },
        'ethylhexylglycerin': { state: '液體', color: '無色', odor: '輕微', boiling_point: '160-170 (5 hPa)', density: '0.962' }
    };
    return knowledge[lowerInci] || {};
  }

  function handlePdfUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.type !== "application/pdf") {
        setUploadStatusPdf("檔案格式錯誤，請僅上傳 PDF 檔案。", "status-error");
        return;
    }
    uploadMainPdf(file);
  }

  function uploadMainPdf(file) {
    const storagePath = `pifs/${pageContext.pifId}/09-2.pdf`;
    const storageRef = ref(storage, storagePath);
    const uploadTask = uploadBytesResumable(storageRef, file);
    const button = $('#btnUploadPdf');
    button.disabled = true;

    uploadTask.on('state_changed', 
        (snapshot) => {
            const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            setUploadStatusPdf(`<i class="fa-solid fa-upload"></i> 正在上傳 PDF... ${Math.round(progress)}%`, 'status-info');
        }, 
        (error) => {
            setUploadStatusPdf(`<i class="fa-solid fa-triangle-exclamation"></i> PDF 上傳失敗: ${error.code}`, 'status-error');
            button.disabled = false;
        }, 
        async () => {
            const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
            try {
                await setDoc(pifDocRef, { pif09_2_pdfUrl: downloadURL, lastModified: serverTimestamp() }, { merge: true });
                setUploadStatusPdf('<i class="fa-solid fa-check-circle"></i> PDF 已成功上傳！儀表板狀態將會更新。', 'status-success');
            } catch (dbError) {
                setUploadStatusPdf(`<i class="fa-solid fa-triangle-exclamation"></i> PDF 上傳成功，但更新資料庫紀錄時失敗: ${dbError.message}`, 'status-error');
            }
            button.disabled = false;
            $('#pdfUploader').value = '';
            setTimeout(() => setUploadStatusPdf('', 'none'), 5000);
        }
    );
  }

  function updatePdfUploadStatus(url) {
    if (url) {
        setUploadStatusPdf(`<i class="fa-solid fa-check-circle"></i> PDF 已上傳。<a href="${url}" target="_blank">預覽 <i class="fa-solid fa-arrow-up-right-from-square"></i></a>`, 'status-success');
    } else {
         setUploadStatusPdf('', 'none');
    }
  }

  function setUploadStatusPdf(msg, styleClass) {
      const statusEl = $('#upload-status-pdf');
      if (!msg || styleClass === 'none') {
          statusEl.style.display = 'none';
      } else {
          statusEl.innerHTML = msg;
          statusEl.className = `noprint ${styleClass}`;
          statusEl.style.display = 'block';
      }
  }
  
  main();

</script>
</body>
</html>
